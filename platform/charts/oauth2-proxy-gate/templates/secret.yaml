{{/*
Spec 137 T043: K8s Secret carrying the cookie secret + the Rauthy
client secret. Both pieces of material flow into the chart via
deployd-api's value builder (which received them in the
DeploymentRequest's `access_gate` descriptor — see
platform/services/deployd-api-rs/src/routes.rs).

deployd-api does NOT generate the cookie secret: stagecraft generates
it once per environment and persists it (spec 137 T043 invariant).
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "oauth2-proxy-gate.secretName" . }}
  labels:
    {{- include "oauth2-proxy-gate.labels" . | nindent 4 }}
type: Opaque
stringData:
  cookie-secret: {{ required "rauthy.cookieSecret is required when the gate is rendered" .Values.rauthy.cookieSecret | quote }}
  client-secret: {{ required "rauthy.clientSecret is required when the gate is rendered" .Values.rauthy.clientSecret | quote }}
