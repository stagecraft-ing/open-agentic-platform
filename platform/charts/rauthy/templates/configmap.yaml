apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "rauthy.fullname" . }}-config
  labels:
    {{- include "rauthy.labels" . | nindent 4 }}
data:
  config.toml: |
    # Minimal config — most settings provided via environment variables.
    # Rauthy >= 0.35.0 requires this file to exist and include [server].

    [server]
    pub_url = {{ include "rauthy.pubUrl" . | quote }}

    {{- range .Values.upstreamProviders }}
    [[upstream_auth_provider]]
    name = {{ .name | quote }}
    typ = {{ .typ | default "OIDC" | quote }}
    issuer = {{ .issuer | quote }}
    client_id = "$UPSTREAM_{{ .name | upper | replace "-" "_" }}_CLIENT_ID"
    client_secret = "$UPSTREAM_{{ .name | upper | replace "-" "_" }}_CLIENT_SECRET"
    {{- if .rootCertificates }}
    root_certificates = {{ .rootCertificates | quote }}
    {{- end }}
    {{- if .scopes }}
    scope = {{ .scopes | quote }}
    {{- end }}
    {{- if .adminClaimPath }}
    admin_claim_path = {{ .adminClaimPath | quote }}
    {{- end }}
    {{- if .adminClaimValue }}
    admin_claim_value = {{ .adminClaimValue | quote }}
    {{- end }}

    {{- end }}
