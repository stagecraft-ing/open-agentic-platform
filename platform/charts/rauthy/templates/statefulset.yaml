apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "rauthy.fullname" . }}
  labels:
    {{- include "rauthy.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  serviceName: {{ include "rauthy.headlessName" . }}
  selector:
    matchLabels:
      {{- include "rauthy.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "rauthy.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        fsGroup: 10001
        runAsUser: 10001
        runAsGroup: 10001
      containers:
        - name: rauthy
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: raft
              containerPort: 8100
              protocol: TCP
            - name: hql-api
              containerPort: 8200
              protocol: TCP
          env:
            - name: LOG_LEVEL
              value: "info"
            - name: LISTEN_ADDRESS
              value: "0.0.0.0"
            - name: LISTEN_PORT_HTTP
              value: "8080"
            - name: LISTEN_SCHEME
              value: "http"
            {{- if .Values.proxyMode }}
            - name: PROXY_MODE
              value: "true"
            - name: TRUSTED_PROXIES
              value: {{ join "\n" .Values.trustedProxies | quote }}
            {{- end }}
            - name: PUB_URL
              value: {{ include "rauthy.pubUrl" . | quote }}
            - name: RP_ID
              value: {{ include "rauthy.pubUrl" . | quote }}
            - name: RP_ORIGIN
              value: {{ printf "https://%s:443" (include "rauthy.pubUrl" .) | quote }}
            {{- if .Values.raft.existingSecret }}
            - name: SECRET_RAFT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.raft.existingSecret }}
                  key: {{ .Values.raft.existingSecretKey }}
            {{- else }}
            - name: SECRET_RAFT
              value: {{ .Values.raft.secret | quote }}
            {{- end }}
            {{- if .Values.api.existingSecret }}
            - name: SECRET_API
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.existingSecret }}
                  key: {{ .Values.api.existingSecretKey }}
            {{- else }}
            - name: SECRET_API
              value: {{ .Values.api.secret | quote }}
            {{- end }}
            - name: BOOTSTRAP_ADMIN_EMAIL
              value: {{ .Values.bootstrap.adminEmail | quote }}
            - name: ENC_KEYS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.encryption.existingSecret }}
                  key: {{ .Values.encryption.existingSecretKeyEnc }}
            - name: ENC_KEY_ACTIVE
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.encryption.existingSecret }}
                  key: {{ .Values.encryption.existingSecretKeyActive }}
            {{- if .Values.bootstrap.existingSecret }}
            - name: BOOTSTRAP_ADMIN_PASSWORD_PLAIN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.bootstrap.existingSecret }}
                  key: {{ .Values.bootstrap.existingSecretKey }}
            {{- else }}
            - name: BOOTSTRAP_ADMIN_PASSWORD_PLAIN
              value: {{ .Values.bootstrap.adminPassword | quote }}
            {{- end }}
            - name: HQL_NODE_ID_FROM
              value: "k8s"
            - name: HQL_NODES
              value: {{ include "rauthy.hqlNodes" . | quote }}
            - name: HQL_DATA_DIR
              value: "/data/hiqlite"
            {{- range .Values.upstreamProviders }}
            {{- if .clientId }}
            - name: UPSTREAM_{{ .name | upper | replace "-" "_" }}_CLIENT_ID
              value: {{ .clientId | quote }}
            {{- end }}
            {{- if .existingSecret }}
            - name: UPSTREAM_{{ .name | upper | replace "-" "_" }}_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .existingSecret }}
                  key: {{ .existingSecretKey | default "client-secret" }}
            {{- end }}
            {{- end }}
            {{- if .Values.raft.existingSecret }}
            - name: HQL_SECRET_RAFT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.raft.existingSecret }}
                  key: {{ .Values.raft.existingSecretKey }}
            {{- else }}
            - name: HQL_SECRET_RAFT
              value: {{ .Values.raft.secret | quote }}
            {{- end }}
            {{- if .Values.api.existingSecret }}
            - name: HQL_SECRET_API
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.existingSecret }}
                  key: {{ .Values.api.existingSecretKey }}
            {{- else }}
            - name: HQL_SECRET_API
              value: {{ .Values.api.secret | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /auth/v1/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /auth/v1/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /app/config.toml
              subPath: config.toml
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ include "rauthy.fullname" . }}-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
