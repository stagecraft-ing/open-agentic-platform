replicas: 1

oidc:
  issuer: "https://auth.stagecraft.ing/auth/v1/"

ingress:
  enabled: true
  className: nginx
  host: auth.stagecraft.ing
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"

persistence:
  size: 2Gi

bootstrap:
  adminEmail: "admin@stagecraft.ing"
