replicas: 1

proxyMode: true
# Pod CIDR + Cloudflare IPv4 ranges (https://www.cloudflare.com/ips-v4/)
# Cloudflare edge IPs must be trusted so Rauthy reads the real client IP
# from X-Forwarded-For, preventing session IP mismatch on rotating edges.
trustedProxies:
  - "10.244.0.0/16"
  - "173.245.48.0/20"
  - "103.21.244.0/22"
  - "103.22.200.0/22"
  - "103.31.4.0/22"
  - "141.101.64.0/18"
  - "108.162.192.0/18"
  - "190.93.240.0/20"
  - "188.114.96.0/20"
  - "197.234.240.0/22"
  - "198.41.128.0/17"
  - "162.158.0.0/15"
  - "104.16.0.0/13"
  - "104.24.0.0/14"
  - "172.64.0.0/13"
  - "131.0.72.0/22"

oidc:
  # TODO: Set to your Rauthy public OIDC base URL (e.g. https://auth.yourdomain.com/auth/v1/)
  issuer: ""

ingress:
  enabled: true
  className: nginx
  # TODO: Set to your Rauthy public hostname (e.g. auth.yourdomain.com)
  host: ""
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"

persistence:
  size: 2Gi

bootstrap:
  adminEmail: ""  # Set to your admin email
