replicas: 1

proxyMode: true
# Pod CIDR + Cloudflare IPv4 ranges (https://www.cloudflare.com/ips-v4/)
# Cloudflare edge IPs must be trusted so Rauthy reads the real client IP
# from X-Forwarded-For, preventing session IP mismatch on rotating edges.
trustedProxies:
  - "10.244.0.0/16"
  - "173.245.48.0/20"
  - "103.21.244.0/22"
  - "103.22.200.0/22"
  - "103.31.4.0/22"
  - "141.101.64.0/18"
  - "108.162.192.0/18"
  - "190.93.240.0/20"
  - "188.114.96.0/20"
  - "197.234.240.0/22"
  - "198.41.128.0/17"
  - "162.158.0.0/15"
  - "104.16.0.0/13"
  - "104.24.0.0/14"
  - "172.64.0.0/13"
  - "131.0.72.0/22"

oidc:
  # Injected by setup.sh via --set from $DOMAIN
  issuer: ""

ingress:
  enabled: true
  className: nginx
  # Injected by setup.sh via --set from $DOMAIN
  host: ""
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"

persistence:
  size: 2Gi

bootstrap:
  adminEmail: ""  # Injected by setup.sh via --set from $DOMAIN

# Upstream auth providers are NOT declared here (spec 106 FR-001/FR-002).
#
# Rauthy 0.35 has no `upstream_auth_provider` config section — the field
# does not exist on RauthyConfig.Vars (src/data/src/rauthy_config.rs) and
# server startup has no bootstrap path that reads providers from config.
# Unknown TOML keys are silently ignored, so any attempt to declare them
# here is a no-op.
#
# Providers are created via `POST /auth/v1/providers` against Rauthy's
# admin API. The stagecraft seeder (spec 106 FR-002) owns this and reads
# GitHub OAuth App credentials from stagecraft-api-secrets env vars.
# The chart's `[[upstream_auth_provider]]` template block in
# templates/configmap.yaml and the matching UPSTREAM_*_CLIENT_ID/SECRET
# env-var injection in templates/statefulset.yaml are dormant: they only
# render when `upstreamProviders` is non-empty, which it isn't. They will
# be removed when FR-002 lands.
