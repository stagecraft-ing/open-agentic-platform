image:
  # TODO: Set to your GHCR (or other registry) image path before deploying
  repository: ghcr.io/your-org/open-agentic-platform/stagecraft
  tag: dev

imagePullSecrets: []

ingress:
  enabled: true
  className: nginx
  host: stagecraft.localdev.online
  annotations: {}

serviceAccount:
  name: stagecraft-api-sa
  annotations: {}

# Rauthy seed hook (spec 106 FR-002). Disabled by default until the GHCR
# image ships the Rauthy 0.35 API compatibility fix; re-enable per-env in
# values-<env>.yaml or via --set seedRauthy.enabled=true once the image
# contains the updated scripts/seed-rauthy.mjs.
seedRauthy:
  enabled: false

podLabels: {}

secrets:
  enabled: true
  provider: "k8s"  # "k8s" | "eso" | "csi-azure"
  mountPath: /mnt/secrets-store
  create: false
  data: {}
  # ESO-specific
  refreshInterval: "1h"
  storeRef:
    name: ""
    kind: ClusterSecretStore
  keys:
    - key: STAGECRAFT_DB_URL
      remoteKey: stagecraft-db-url
    - key: OIDC_M2M_CLIENT_ID
      remoteKey: oidc-m2m-client-id
    - key: OIDC_M2M_CLIENT_SECRET
      remoteKey: oidc-m2m-client-secret
    # AES-256-GCM key for PAT-at-rest encryption (api/auth/patCrypto.ts).
    # Must decode from base64 to exactly 32 bytes. Generate with:
    #   openssl rand -base64 32
    # Rotate only with care: existing factory_upstream_pats / project_pats
    # rows become undecryptable if the key changes.
    - key: PAT_ENCRYPTION_KEY
      remoteKey: pat-encryption-key

# Legacy Azure CSI driver opt-in (kept for backward compatibility)
secretsMount:
  enabled: false
  objects: []

# Legacy Azure workload identity (kept for backward compatibility)
workloadIdentity:
  clientId: ""

keyVault:
  name: ""
  tenantId: ""

oidc:
  endpoint: "https://rauthy.localdev.online"
  deploydAudience: "https://api.stagecraft.localdev.online"
  deploydScope: "deployd:deploy"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Spec 112 §5.3 — workspace dir for the scaffold subflow.
#
# Stagecraft's Create flow keeps a clone of the upstream `template` repo
# (~150MB after `npm install`) plus four prebuilt profile trees in a
# workspace directory. The dir is mounted at `STAGECRAFT_WORKSPACE_DIR`
# and survives pod restarts so warmup is skipped when on-disk state matches
# the upstream HEAD.
#
# Persistence defaults to ON. Disable only if the cluster's storage class
# is unavailable; with persistence off the warmup re-runs every restart.
#
# storageClass: leave blank to inherit the cluster default.
#   Per-cloud overrides land in values-{azure,aws,gcp,do,hetzner}.yaml
#   (e.g. "managed-csi" on Azure, "do-block-storage" on DigitalOcean).
workspace:
  dir: /var/stagecraft/workspace
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
    accessMode: ReadWriteOnce
