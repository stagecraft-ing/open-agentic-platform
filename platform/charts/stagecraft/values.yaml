image:
  repository: ghcr.io/open-agentic-platform/stagecraft
  tag: dev

ingress:
  host: stagecraft.localdev.online

serviceAccount:
  name: stagecraft-api-sa
  annotations: {}

podLabels: {}

secrets:
  enabled: true
  provider: "k8s"  # "k8s" | "eso" | "csi-azure"
  mountPath: /mnt/secrets-store
  create: false
  data: {}
  # ESO-specific
  refreshInterval: "1h"
  storeRef:
    name: ""
    kind: ClusterSecretStore
  keys:
    - key: STAGECRAFT_DB_URL
      remoteKey: stagecraft-db-url
    - key: LOGTO_M2M_CLIENT_ID
      remoteKey: logto-m2m-client-id
    - key: LOGTO_M2M_CLIENT_SECRET
      remoteKey: logto-m2m-client-secret

# Legacy Azure CSI driver opt-in (kept for backward compatibility)
secretsMount:
  enabled: false
  objects: []

# Legacy Azure workload identity (kept for backward compatibility)
workloadIdentity:
  clientId: ""

keyVault:
  name: ""
  tenantId: ""

logto:
  endpoint: "https://logto.localdev.online"
  deploydAudience: "https://api.stagecraft.localdev.online"
  deploydScope: "deployd:deploy"
