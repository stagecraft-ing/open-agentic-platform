{{- if and .Values.secrets.enabled (eq (default "k8s" .Values.secrets.provider) "k8s") }}
{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: stagecraft-api-secrets
type: Opaque
stringData:
{{- range $key, $value := .Values.secrets.data }}
  {{ $key }}: {{ $value | quote }}
{{- end }}
{{- end }}
{{- end }}
