{{/*
Spec 143 FR-010 — per-purpose-credential mount discipline.

Provisions the K8s Secret `stagecraft-knowledge-sweeper-credentials`
from the cluster SecretStore, exposing exactly two keys
(`CLIENT_ID`, `CLIENT_SECRET`) sourced from the
`stagecraft-knowledge-sweeper-client-id` /
`-client-secret` Key Vault entries.

Discipline: this Secret is the SOLE credential surface mounted into
the orphan-imported sweeper CronJob's pod. A leaked credential here
is bounded to that one sweeper's surface (Rauthy client
`stagecraft-knowledge-sweeper-m2m-app`, scope
`platform:knowledge:sweep`). FU-003's K8s CronJobs for spec 115 /
087 / 124 will follow this exact shape — separate ExternalSecret per
purpose, separate Secret per pod, no cross-purpose mounts. See spec
143 FR-010 self-hosted scheduler amendment + §12 L-004 / L-006.

Activated only when the chart is run against an ESO-backed cluster
(`secrets.provider == "eso"`). On Hetzner — the FU-001 production
target this beat — `secrets.provider == "k8s"` and `setup.sh`
materialises the same Secret directly via `kubectl create secret
generic` from `STAGECRAFT_KNOWLEDGE_SWEEPER_CLIENT_ID/_SECRET`.
Either path produces the same Secret name + key shape so the
CronJob template stays cluster-agnostic.
*/}}
{{- if and .Values.secrets.enabled (eq (default "k8s" .Values.secrets.provider) "eso") }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: stagecraft-knowledge-sweeper-credentials
  labels:
    app.kubernetes.io/name: knowledge-orphan-imported-sweeper
    app.kubernetes.io/part-of: stagecraft
    spec.oap/id: "143-presigned-upload-public-endpoint"
    spec.oap/fr: "FR-010"
spec:
  refreshInterval: {{ default "1h" .Values.secrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.secrets.storeRef.name }}
    kind: {{ default "ClusterSecretStore" .Values.secrets.storeRef.kind }}
  target:
    name: stagecraft-knowledge-sweeper-credentials
    creationPolicy: Owner
  data:
    - secretKey: CLIENT_ID
      remoteRef:
        key: stagecraft-knowledge-sweeper-client-id
    - secretKey: CLIENT_SECRET
      remoteRef:
        key: stagecraft-knowledge-sweeper-client-secret
{{- end }}
