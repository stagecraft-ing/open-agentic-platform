image:
  # TODO: Set to your GHCR (or other registry) image path
  repository: ghcr.io/your-org/open-agentic-platform/stagecraft
  tag: latest

imagePullSecrets:
  - name: ghcr-credentials

ingress:
  enabled: true
  className: nginx
  # TODO: Set to your stagecraft public hostname (e.g. stagecraft.yourdomain.com)
  host: ""
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"

secrets:
  provider: "k8s"
  create: false

oidc:
  # TODO: Set to your Rauthy public base URL (e.g. https://auth.yourdomain.com)
  endpoint: ""
  # TODO: Set to your deployd-api public URL (e.g. https://deploy.yourdomain.com)
  deploydAudience: ""
  deploydScope: "deployd:deploy"
