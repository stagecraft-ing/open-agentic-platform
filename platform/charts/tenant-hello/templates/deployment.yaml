apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tenant-hello.fullname" . }}
  labels:
    {{- include "tenant-hello.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      {{- include "tenant-hello.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tenant-hello.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "tenant-hello.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: tenant-hello
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          # C-003: PORT env injection. Tenant-hello (and any C-clause-
          # compliant tenant codebase) reads process.env.PORT.
          env:
            - name: PORT
              value: {{ .Values.service.port | quote }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          # C-002: probes hit /healthz. Both probes share the path; the
          # liveness probe runs at a longer interval so transient stalls
          # don't crash-loop the pod.
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          # C-001 readOnlyRootFilesystem requires writable mounts where
          # express needs them. Tenant-hello writes nothing to disk, but
          # node's tmpdir / npm cache may; mount /tmp as writable.
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
