image:
  # TODO: Set to your GHCR (or other registry) image path before deploying
  repository: ghcr.io/your-org/open-agentic-platform/deployd-api
  tag: dev

imagePullSecrets: []

ingress:
  enabled: true
  className: nginx
  host: deployd.localdev.online
  annotations: {}

serviceAccount:
  name: deployd-api-sa
  annotations: {}

podLabels: {}

# Spec 146: chart-default resources floor. cgroup limit is the load-bearing
# memory cap (Rust runtime — no managed-heap env-var to set). 1Gi covers
# steady-state ~250MB plus cold-start hiqlite WAL spikes (~750MB headroom).
# Operators with workload-specific budgets override per-environment.
resources:
  limits:
    memory: 1Gi
  requests:
    memory: 256Mi
    cpu: 100m

persistence:
  enabled: true
  size: 1Gi
  storageClass: ""

secrets:
  enabled: true
  provider: "k8s"  # "k8s" | "eso" | "csi-azure"
  mountPath: /mnt/secrets-store
  create: false
  data: {}
  # ESO-specific
  refreshInterval: "1h"
  storeRef:
    name: ""
    kind: ClusterSecretStore
  keys:
    - key: DEPLOYD_DB_URL
      remoteKey: deployd-db-url

secretsMount:
  enabled: false
  objects: []

workloadIdentity:
  clientId: ""

keyVault:
  name: ""
  tenantId: ""

oidc:
  endpoint: "https://rauthy.localdev.online"
  audience: "https://api.stagecraft.localdev.online"

requiredScope: "deployd:deploy"
