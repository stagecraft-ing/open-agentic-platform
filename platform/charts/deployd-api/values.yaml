image:
  repository: ghcr.io/open-agentic-platform/deployd-api
  tag: dev

ingress:
  enabled: true
  className: nginx
  host: deployd.localdev.online
  annotations: {}

serviceAccount:
  name: deployd-api-sa
  annotations: {}

podLabels: {}

secrets:
  enabled: true
  provider: "k8s"  # "k8s" | "eso" | "csi-azure"
  mountPath: /mnt/secrets-store
  create: false
  data: {}
  # ESO-specific
  refreshInterval: "1h"
  storeRef:
    name: ""
    kind: ClusterSecretStore
  keys:
    - key: DEPLOYD_DB_URL
      remoteKey: deployd-db-url

oidc:
  endpoint: "https://rauthy.localdev.online"
  audience: "https://api.stagecraft.localdev.online"

requiredScope: "deployd:deploy"
