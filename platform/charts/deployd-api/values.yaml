image:
  # TODO: Set to your GHCR (or other registry) image path before deploying
  repository: ghcr.io/your-org/open-agentic-platform/deployd-api
  tag: dev

imagePullSecrets: []

ingress:
  enabled: true
  className: nginx
  host: deployd.localdev.online
  annotations: {}

serviceAccount:
  name: deployd-api-sa
  annotations: {}

podLabels: {}

# region: resources
# Spec 146: chart-default resources floor. cgroup limit is the load-bearing
# memory cap (Rust runtime — no managed-heap env-var to set). 1Gi covers
# steady-state ~250MB plus cold-start hiqlite WAL spikes (~750MB headroom).
# Operators with workload-specific budgets override per-environment.
resources:
  limits:
    memory: 1Gi
  requests:
    memory: 256Mi
    cpu: 100m
# endregion resources

persistence:
  enabled: true
  size: 1Gi
  storageClass: ""

# Spec 145: deployd-api durability chain. Backup is opt-in — operators set
# `endpoint` and `bucket` (and per-provider secret keys) to enable encrypted
# S3 snapshots. Chart defaults below are safe (no projection without endpoint+
# bucket); per-env values files override. NFR-002 defaults: 6-hour cron,
# 28-day S3 retention. See docs/runbooks/deployd-api-durability.md.
backup:
  endpoint: ""              # operator-supplied per env (e.g. https://<hcloud-s3-region>.your-objectstorage.com)
  bucket: ""                # operator-supplied per env
  region: ""                # operator-supplied per env (e.g. "us-east-1" or hcloud equivalent)
  pathStyle: true           # most non-AWS S3-compatible endpoints prefer path-style
  schedule: "0 0 */6 * * *" # NFR-002 default — 6-field cron (Hiqlite parser); operator-overridable
  keep: 28                  # NFR-002 default — S3 retention days; operator-overridable
  # ESO operators inherit these four keys by chart default; SPC operators
  # add them to .Values.secretsMount.objects; k8s-provider operators
  # populate the pre-existing Secret manually (see runbook).
  secretKeys:
    - key: backup-s3-access-key
      remoteKey: deployd-backup-s3-access-key
    - key: backup-s3-secret-key
      remoteKey: deployd-backup-s3-secret-key
    - key: backup-cryptr-keyring        # multi-line value: <id>/<base64-32> per line
      remoteKey: deployd-backup-cryptr-keyring
    - key: backup-cryptr-active-key     # single key id, must match keyring entry
      remoteKey: deployd-backup-cryptr-active-key

secrets:
  enabled: true
  provider: "k8s"  # "k8s" | "eso" | "csi-azure"
  mountPath: /mnt/secrets-store
  create: false
  data: {}
  # ESO-specific
  refreshInterval: "1h"
  storeRef:
    name: ""
    kind: ClusterSecretStore
  keys:
    - key: DEPLOYD_DB_URL
      remoteKey: deployd-db-url

secretsMount:
  enabled: false
  objects: []

workloadIdentity:
  clientId: ""

keyVault:
  name: ""
  tenantId: ""

oidc:
  endpoint: "https://rauthy.localdev.online"
  audience: "https://api.stagecraft.localdev.online"

requiredScope: "deployd:deploy"
