image:
  # TODO: Set to your GHCR (or other registry) image path
  repository: ghcr.io/your-org/open-agentic-platform/deployd-api
  tag: latest

imagePullSecrets:
  - name: ghcr-pull-secret

ingress:
  enabled: true
  className: nginx
  # TODO: Set to your deployd-api public hostname (e.g. deploy.yourdomain.com)
  host: ""
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

secrets:
  provider: "k8s"
  create: false

oidc:
  # TODO: Set to your Rauthy public base URL (e.g. https://auth.yourdomain.com)
  endpoint: ""
  # TODO: Set to your deployd-api public URL (e.g. https://deploy.yourdomain.com)
  audience: ""

requiredScope: "deployd:deploy"
