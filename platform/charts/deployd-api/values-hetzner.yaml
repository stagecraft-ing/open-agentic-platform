image:
  repository: ghcr.io/stagecraft-ing/open-agentic-platform/deployd-api
  tag: latest

imagePullSecrets:
  - name: ghcr-pull-secret

# Surface hiqlite internals at debug level so the next cold-start hang
# reveals the stuck step — currently we only see "creating new file:
# meta.hql" and then 5 minutes of silence before SIGKILL exit 137.
rustLog: "info,hiqlite=debug,hiqlite_wal=debug"

ingress:
  enabled: true
  className: nginx
  # Injected by setup.sh via --set from $DOMAIN
  host: ""
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

secrets:
  provider: "k8s"
  create: false

oidc:
  # Injected by setup.sh via --set from $DOMAIN
  endpoint: ""
  # Injected by setup.sh via --set from $DOMAIN
  audience: ""

requiredScope: "deployd:deploy"

# Stealth stage: use emptyDir for hiqlite state. Deployment history is lost on
# pod restart, which is acceptable pre-GA. Flip to true and set a size/class
# when persistent deployment history is required.
persistence:
  enabled: false
