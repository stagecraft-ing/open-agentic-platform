image:
  repository: ghcr.io/stagecraft-ing/open-agentic-platform/deployd-api
  # tag is intentionally unset — CD owns the helm release and passes
  # --set image.tag=sha-${SHA} on every deploy. Pinning a value here
  # would clobber CD's authoritative tag. See spec 143 §12 L-003.
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-pull-secret

# Surface hiqlite internals at debug level so the next cold-start hang
# reveals the stuck step — currently we only see "creating new file:
# meta.hql" and then 5 minutes of silence before SIGKILL exit 137.
rustLog: "info,hiqlite=debug,hiqlite_wal=debug"

ingress:
  enabled: true
  className: nginx
  # Injected by setup.sh via --set from $DOMAIN
  host: ""
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

secrets:
  provider: "k8s"
  create: false

oidc:
  # Injected by setup.sh via --set from $DOMAIN
  endpoint: ""
  # Injected by setup.sh via --set from $DOMAIN
  audience: ""

requiredScope: "deployd:deploy"

# Persistent deployment history required from spec 145; size pinned to 10Gi
# (the hcloud CSI minimum — T002 verification 2026-05-10) and storage class
# pinned to `hcloud-volumes` rather than the cluster default to avoid silent
# re-binding if cluster StorageClass priorities are reordered.
persistence:
  enabled: true
  size: 10Gi
  storageClass: hcloud-volumes
