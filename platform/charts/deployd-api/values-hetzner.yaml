image:
  # TODO: Set to your GHCR (or other registry) image path
  repository: ghcr.io/your-org/open-agentic-platform/deployd-api
  tag: latest

imagePullSecrets:
  - name: ghcr-pull-secret

ingress:
  enabled: true
  className: nginx
  # Injected by setup.sh via --set from $DOMAIN
  host: ""
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

secrets:
  provider: "k8s"
  create: false

oidc:
  # Injected by setup.sh via --set from $DOMAIN
  endpoint: ""
  # Injected by setup.sh via --set from $DOMAIN
  audience: ""

requiredScope: "deployd:deploy"
