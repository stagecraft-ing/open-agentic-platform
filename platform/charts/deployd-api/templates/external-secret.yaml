{{- if and .Values.secrets.enabled (eq (default "k8s" .Values.secrets.provider) "eso") }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: deployd-api-secrets
spec:
  refreshInterval: {{ default "1h" .Values.secrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.secrets.storeRef.name }}
    kind: {{ default "ClusterSecretStore" .Values.secrets.storeRef.kind }}
  target:
    name: deployd-api-secrets
    creationPolicy: Owner
  data:
{{- range .Values.secrets.keys }}
    - secretKey: {{ .key }}
      remoteRef:
        key: {{ .remoteKey }}
{{- end }}
{{- if and .Values.backup.endpoint .Values.backup.bucket }}
{{- range .Values.backup.secretKeys }}
    - secretKey: {{ .key }}
      remoteRef:
        key: {{ .remoteKey }}
{{- end }}
{{- end }}
{{- end }}
