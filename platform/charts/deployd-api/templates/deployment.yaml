apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployd-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: deployd-api
  template:
    metadata:
      labels:
        app: deployd-api
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: deployd-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: SECRETS_DIR
              value: {{ .Values.secrets.mountPath | quote }}
            - name: OIDC_ENDPOINT
              value: {{ .Values.oidc.endpoint | quote }}
            - name: DEPLOYD_AUDIENCE
              value: {{ .Values.oidc.audience | quote }}
            - name: DEPLOYD_REQUIRED_SCOPE
              value: {{ .Values.requiredScope | quote }}
          envFrom:
            - secretRef:
                name: deployd-api-secrets
                optional: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: secrets-store
              mountPath: {{ .Values.secrets.mountPath | quote }}
              readOnly: true
      volumes:
        - name: secrets-store
          {{- if eq (default "k8s" .Values.secrets.provider) "csi-azure" }}
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: deployd-api-secrets
          {{- else }}
          secret:
            secretName: deployd-api-secrets
          {{- end }}
