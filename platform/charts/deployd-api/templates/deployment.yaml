apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployd-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: deployd-api
  template:
    metadata:
      labels:
        app: deployd-api
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: deployd-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: SECRETS_DIR
              value: {{ .Values.secrets.mountPath | quote }}
            - name: LOGTO_ENDPOINT
              value: {{ .Values.logto.endpoint | quote }}
            - name: DEPLOYD_AUDIENCE
              value: {{ .Values.logto.audience | quote }}
            - name: DEPLOYD_REQUIRED_SCOPE
              value: {{ .Values.requiredScope | quote }}
          volumeMounts:
            - name: secrets-store
              mountPath: {{ .Values.secrets.mountPath | quote }}
              readOnly: true
      volumes:
        - name: secrets-store
          {{- if eq (default "k8s" .Values.secrets.provider) "csi-azure" }}
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: deployd-api-secrets
          {{- else }}
          secret:
            secretName: deployd-api-secrets
          {{- end }}
