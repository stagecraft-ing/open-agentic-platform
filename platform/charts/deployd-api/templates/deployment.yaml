apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployd-api
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: deployd-api
  template:
    metadata:
      labels:
        app: deployd-api
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: deployd-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          command: ["/bin/sh", "-c"]
          args:
            - |
              rm -rf /var/lib/deployd/data/*
              exec /usr/local/bin/deployd-api
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: RUST_LOG
              value: {{ .Values.rustLog | default "info,hiqlite=info" | quote }}
            - name: SECRETS_DIR
              value: {{ .Values.secrets.mountPath | quote }}
            - name: OIDC_ENDPOINT
              value: {{ .Values.oidc.endpoint | quote }}
            - name: DEPLOYD_AUDIENCE
              value: {{ .Values.oidc.audience | quote }}
            - name: DEPLOYD_REQUIRED_SCOPE
              value: {{ .Values.requiredScope | quote }}
          envFrom:
            - secretRef:
                name: deployd-api-secrets
                optional: true
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: secrets-store
              mountPath: {{ .Values.secrets.mountPath | quote }}
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: data
              mountPath: /var/lib/deployd
      volumes:
        - name: secrets-store
          {{- if eq (default "k8s" .Values.secrets.provider) "csi-azure" }}
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: deployd-api-secrets
          {{- else }}
          secret:
            secretName: deployd-api-secrets
          {{- end }}
        - name: tmp
          emptyDir: {}
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: deployd-api-data
          {{- else }}
          emptyDir: {}
          {{- end }}
