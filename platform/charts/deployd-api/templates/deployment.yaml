apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployd-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: deployd-api
  template:
    metadata:
      labels:
        app: deployd-api
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: {{ .Values.workloadIdentity.serviceAccountName }}
      containers:
        - name: deployd-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: SECRETS_DIR
              value: {{ .Values.secretsMount.mountPath | quote }}
            - name: LOGTO_ENDPOINT
              value: {{ .Values.logto.endpoint | quote }}
            - name: DEPLOYD_AUDIENCE
              value: {{ .Values.logto.audience | quote }}
            - name: DEPLOYD_REQUIRED_SCOPE
              value: {{ .Values.requiredScope | quote }}
          volumeMounts:
            - name: secrets-store
              mountPath: {{ .Values.secretsMount.mountPath | quote }}
              readOnly: true
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: deployd-api-secrets
