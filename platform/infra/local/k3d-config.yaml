apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: oap-local
servers: 1
agents: 1
image: rancher/k3s:v1.31.4-k3s1
registries:
  create:
    name: registry.localhost
    host: "0.0.0.0"
    hostPort: "5050"
ports:
  - port: 80:80
    nodeFilters:
      - loadbalancer
  - port: 443:443
    nodeFilters:
      - loadbalancer
options:
  k3d:
    wait: true
    timeout: "120s"
  k3s:
    extraArgs:
      - arg: --disable=traefik
        nodeFilters:
          - server:*
  kubeconfig:
    updateDefaultKubeconfig: true
    switchCurrentContext: true
