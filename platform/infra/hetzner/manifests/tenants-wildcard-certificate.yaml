# Spec 137 — wildcard TLS cert for tenant Ingresses.
#
# A single wildcard cert covering `*.tenants.${DOMAIN}` + the apex
# `tenants.${DOMAIN}`. Both SANs are issued together so a tenant
# Ingress (one-label-deep host) and a future shared landing page on the
# apex both share the same cert lifecycle.
#
# Wildcard scope caveat (RFC 6125 / Let's Encrypt limits): one wildcard
# label only. `dev.tenants.${DOMAIN}` ✅, `dev.project1.tenants.${DOMAIN}` ✗.
# Spec 137 Decision 4's hostname pattern is therefore flattened to one
# label after `.tenants.`, e.g. `<env-slug>-<project-slug>-<org-slug>`
# (hyphens, not dots). See spec 137 §12 amendment.
#
# Replication (spec 137 Phase 4↔5 integration amendment, 2026-05-17):
# `spec.secretTemplate.annotations` carries kubernetes-reflector
# annotations. cert-manager propagates the secretTemplate verbatim onto
# the generated `tenants-wildcard-tls` Secret. Reflector then clones the
# Secret into every namespace matching `reflection-auto-namespaces`
# (currently the `.+` catch-all — every namespace gets a copy). Tenant
# Ingresses (rendered by deployd-api in per-app namespaces) reference
# `secretName: tenants-wildcard-tls` and find the replicated Secret in
# their own namespace at TLS-terminate time. No stagecraft side-write,
# no deployd-api kube-rs hand-rolled clone — the cluster takes care of
# replication declaratively.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: tenants-wildcard
  namespace: cert-manager
  labels:
    oap.spec: "137-tenant-environment-access-gates"
spec:
  secretName: tenants-wildcard-tls
  duration: 2160h    # 90 days (Let's Encrypt default)
  renewBefore: 360h  # 15 days before expiry
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  dnsNames:
    - "*.tenants.${DOMAIN}"
    - "tenants.${DOMAIN}"
  issuerRef:
    name: letsencrypt-prod-dns01-cloudflare
    kind: ClusterIssuer
  # region: reflector-annotations
  # kubernetes-reflector annotations propagated onto the generated
  # `tenants-wildcard-tls` Secret. See header comment for the full
  # replication explanation.
  secretTemplate:
    annotations:
      # Source-side: allow this Secret to be reflected.
      reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
      # Catch-all auto-clone into every namespace. Tenant namespaces
      # are created on-demand by deployd-api at deploy time; reflector
      # picks them up and clones the Secret without a per-namespace
      # admin pass. If a tighter scope is needed later (e.g. only
      # namespaces labelled `oap.tenant=true`), narrow the regex here.
      reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
      reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: ".+"
  # endregion reflector-annotations
