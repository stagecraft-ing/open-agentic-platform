apiVersion: apps/v1
kind: Deployment
metadata:
  name: nsqd
  namespace: stagecraft-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nsqd
  template:
    metadata:
      labels:
        app: nsqd
    spec:
      containers:
        - name: nsqd
          image: nsqio/nsq:v1.3.0
          command: ["/nsqd"]
          args:
            - "--broadcast-address=nsqd.stagecraft-system.svc.cluster.local"
          ports:
            - name: tcp
              containerPort: 4150
            - name: http
              containerPort: 4151
          readinessProbe:
            httpGet:
              path: /ping
              port: 4151
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: 4151
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: nsqd
  namespace: stagecraft-system
spec:
  selector:
    app: nsqd
  ports:
    - name: tcp
      port: 4150
      targetPort: 4150
    - name: http
      port: 4151
      targetPort: 4151
