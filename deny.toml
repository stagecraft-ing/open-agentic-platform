# cargo-deny policy bundle. Spec 116.
#
# Authoring rules:
#   - This file is human-edited markdown-friendly TOML.
#   - cargo-deny is the only consumer.
#   - During the 30-day warn window after merge (until 2026-05-28), the
#     ci-supply-chain.yml workflow runs `continue-on-error: true` so violations
#     surface as advisory annotations rather than blocking PRs. After
#     promotion, the gate becomes blocking.

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/RustSec/advisory-db"]
yanked = "warn"
ignore = []

[bans]
# The single most common foot-gun in Rust workspaces — multiple major
# versions of the same crate dragged in via different paths.
multiple-versions = "warn"
wildcards = "deny"
# Path-based workspace deps (e.g. `agent = { path = "../agent" }`) are
# version-less by convention; cargo-deny would otherwise flag every
# internal dep as a wildcard. This exempts path deps only — `*` versions
# from crates.io still error.
allow-wildcard-paths = true
# Crates we have explicitly chosen NOT to use. Empty on day 1; populate
# via follow-up PRs as architectural decisions land (e.g. "use tracing,
# not log").
deny = []
# Skip multiple-version warnings for these crates (use sparingly,
# document why with an inline comment).
skip = []

[licenses]
# cargo-deny v0.16 removed the explicit `deny` list (see EmbarkStudios/
# cargo-deny#611). Effective behaviour is now: anything not in `allow`
# is denied. GPL-family / AGPL / LGPL are deliberately omitted from
# `allow`, which is incompatible with the desktop bundle's distribution
# model.
allow = [
    "MIT",
    "MIT-0",                  # MIT No Attribution — public-domain equivalent (e.g. borrow-or-share)
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",    # Linux Foundation Community Data License (e.g. webpki-roots)
    "NCSA",                   # Univ. of Illinois/NCSA — BSD-like (e.g. libfuzzer-sys)
    "Zlib",
    "MPL-2.0",
]
confidence-threshold = 0.93

[licenses.private]
# First-party workspace crates are AGPL-3.0-or-later (per repo SPDX headers)
# but AGPL is intentionally absent from the [licenses].allow list above —
# that allowlist applies to third-party deps that ship in the desktop
# bundle. cargo-deny's `private.ignore` exempts unpublished workspace
# members from license checks so they don't trigger `unlicensed` errors
# while the third-party allowlist remains strict.
ignore = true

[sources]
# Block crates from sources other than crates.io and github.com unless
# explicitly allowlisted (e.g. a vendored grammar fork).
unknown-registry = "deny"
unknown-git = "warn"
allow-git = []
