[tools."workspace.write_file"]
tier = "tier2"
file_write = true

[tools."workspace.delete"]
tier = "tier2"
file_write = true

[tools."write_file"]
tier = "tier2"
file_write = true

[tools."checkpoint.create"]
tier = "tier2"
file_write = true

[tools."checkpoint.restore"]
