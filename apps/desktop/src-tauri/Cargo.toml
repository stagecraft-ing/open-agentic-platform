# Self-contained workspace — isolated from root to prevent libsqlite3-sys linking
# conflicts when both this crate and crates/axiomregent bundle rusqlite.
[workspace]

[package]
name = "opc"
version = "0.2.4"
description = "GUI app and Toolkit for Claude Code"
authors = ["bartekus"]
license = "AGPL-3.0-or-later"
publish = false   # internal workspace crate; binaries ship via release workflows, not crates.io
edition = "2024"
default-run = "opc"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[[bin]]
name = "opc"
path = "src/main.rs"

[lib]
name = "opc_lib"
crate-type = ["lib", "cdylib", "staticlib"]

[[bin]]
name = "opc-web"
path = "src/web_main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [ "protocol-asset", "tray-icon", "image-png", "macos-private-api"] }
tauri-plugin-shell = "2"
tauri-plugin-dialog = "2"
tauri-plugin-fs = "2.5"
tauri-plugin-process = "2"
tauri-plugin-updater = "2"
tauri-plugin-notification = "2"
tauri-plugin-clipboard-manager = "2"
tauri-plugin-global-shortcut = "2"
tauri-plugin-http = "2"
tauri-plugin-window-state = "2"
tauri-plugin-single-instance = "2"
tauri-plugin-autostart = "2"
tauri-plugin-log = { version = "2", features = ["colored"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
specta = { version = "=2.0.0-rc.22", features = ["derive", "serde_json"] }
tauri-specta = { version = "=2.0.0-rc.21", features = ["typescript"] }
specta-typescript = "=0.0.9"
hex = "0.4"
tokio = { version = "1", features = ["full"] }
rusqlite = { version = "0.39", features = ["bundled"] }
dirs = "6"
chrono = { version = "0.4", features = ["serde"] }
anyhow = "1"
log = "0.4"
env_logger = "0.11"
regex = "1"
glob = "0.3"
base64 = "0.22"
libc = "0.2"
reqwest = { version = "0.12", features = ["json", "native-tls-vendored"] }
tokio-tungstenite = { version = "0.28", features = ["connect", "native-tls-vendored"] }
futures = "0.3"
async-trait = "0.1"
thiserror = "2"
tempfile = "3"
which = "7"
sha2 = "0.10"
zstd = "0.13"
uuid = { version = "1.23", features = ["v4", "serde"] }
walkdir = "2"
serde_yaml = "0.9"
axum = { version = "0.8", features = ["ws"] }
tower = "0.5"
tower-http = { version = "0.6", features = ["fs", "cors"] }
clap = { version = "4.6", features = ["derive"] }
futures-util = "0.3"
image = "0.25"
similar = { version = "2", features = ["unicode", "text"] }
sysinfo = "0.34"

# Opc additions
xray         = { path = "../../../crates/xray" }
featuregraph = { path = "../../../crates/featuregraph" }
agent        = { path = "../../../crates/agent" }
run          = { path = "../../../crates/run" }
orchestrator = { path = "../../../crates/orchestrator" }
provider-registry = { path = "../../../crates/provider-registry", default-features = false, features = ["anthropic", "openai"] }
policy-kernel = { package = "open_agentic_policy_kernel", path = "../../../crates/policy-kernel", default-features = false }
factory-engine = { path = "../../../crates/factory-engine" }
factory-contracts = { path = "../../../crates/factory-contracts" }
factory-project-detect = { path = "../../../crates/factory-project-detect" }


keyring = { version = "3", features = ["apple-native", "windows-native", "sync-secret-service"] }
git2 = { version = "0.20", default-features = false }
tauri-plugin-deep-link = "2"
tauri-plugin-persisted-scope = "2"
tauri-plugin-opener = "2"
tauri-plugin-os = "2"
url = { version = "2.5.8", default-features = false }

# Dev-only: MCP bridge exposes the running app to AI assistants (Claude Code, Cursor, etc.)
# via a WebSocket on port 9223. Excluded from Linux builds due to upstream glib conflicts.
# Made optional so it isn't linked during `cargo test` (avoids WebView2 COM DLL issues
# in headless test environments). Enable with: cargo tauri dev --features mcp-dev
[target.'cfg(any(target_os = "macos", target_os = "windows"))'.dependencies]
tauri-plugin-mcp-bridge = { version = "0.11", optional = true }

[target.'cfg(target_os = "macos")'.dependencies]
window-vibrancy = "0.5"
cocoa = "0.26"
objc = "0.2"
tauri-nspanel = { git = "https://github.com/ahkohd/tauri-nspanel", branch = "v2.1" }

[features]
# This feature is used for production builds or when a dev server is not specified, DO NOT REMOVE!!
custom-protocol = ["tauri/custom-protocol"]
# Enable to activate the MCP bridge during development (cargo tauri dev --features mcp-dev).
# Exposes the running app to AI assistants via WebSocket on port 9223.
mcp-dev = ["tauri-plugin-mcp-bridge"]

[profile.release]
strip = true
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
