[package]
name = "open_agentic_registry_consumer"
version = "0.1.0"
edition = "2024"
description = "Registry consumer MVP per specs/002-registry-consumer-mvp — read-only CLI over registry.json"
rust-version = "1.85"

[[bin]]
name = "registry-consumer"
path = "src/main.rs"

[lib]
name = "open_agentic_registry_consumer"
path = "src/lib.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
tempfile = "3.27.0"

[package.metadata.oap]
spec = "002-registry-consumer-mvp"
