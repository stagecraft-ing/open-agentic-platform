[package]
name = "open_agentic_spec_registry_reader"
publish = false   # internal workspace crate; binaries ship via release workflows, not crates.io
version = "0.1.0"
edition = "2024"
description = "Registry consumer MVP per specs/002-registry-consumer-mvp — read-only CLI over registry.json"
rust-version = "1.85"

[[bin]]
name = "registry-consumer"
path = "src/main.rs"

[lib]
name = "open_agentic_spec_registry_reader"
path = "src/lib.rs"

[dependencies]
canonical-json = { path = "../../../crates/canonical-json" }
clap = { version = "4", features = ["derive"] }
open_agentic_spec_types = { path = "../../shared/spec-types" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
open_agentic_spec_compiler = { path = "../spec-compiler" }
tempfile = "3.27.0"

[package.metadata.oap]
spec = "002-registry-consumer-mvp"
