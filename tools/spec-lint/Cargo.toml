[package]
name = "open_agentic_spec_lint"
version = "0.1.0"
edition = "2024"
description = "Conformance lint (Feature 006) — optional W-xxx workflow warnings"
rust-version = "1.85"

[[bin]]
name = "spec-lint"
path = "src/main.rs"

[lib]
name = "open_agentic_spec_lint"
path = "src/lib.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
open_agentic_frontmatter = { path = "../shared/frontmatter" }
regex = "1"
serde_yaml = "0.9"

[dev-dependencies]
tempfile = "3.27.0"
