[package]
name = "open_agentic_adapter_scopes_compiler"
publish = false   # internal workspace crate; binaries ship via release workflows, not crates.io
version = "0.1.0"
edition = "2024"
description = "Compiles factory/adapters/*/manifest.yaml to adapter-scopes.json (spec 105 Phase 1, replaces scripts/compile-adapter-scopes.js)"
rust-version = "1.85"

[[bin]]
name = "adapter-scopes-compiler"
path = "src/main.rs"

[lib]
name = "open_agentic_adapter_scopes_compiler"
path = "src/lib.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"

[dev-dependencies]
tempfile = "3"

[package.metadata.oap]
spec = "105-scripts-to-binaries-migration"
