[package]
name = "open_agentic_spec_types"
publish = false   # internal workspace crate; binaries ship via release workflows, not crates.io
version = "0.1.0"
edition = "2024"
description = "Spec-spine shared types: frontmatter parsing + canonical vocabularies + V-/W-code registries"
rust-version = "1.85"

[lib]
name = "open_agentic_spec_types"
path = "src/lib.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_yaml = "0.9"

[package.metadata.oap]
spec = "000-bootstrap-spec-system"
