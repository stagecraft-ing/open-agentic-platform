id: no-destructure-zustand
message: |
  Never destructure from Zustand stores. Use selector syntax instead.

  BAD:  const { runs } = useAgentStore()
  GOOD: const runs = useAgentStore(state => state.runs)

  For multiple values, use multiple selectors or useShallow.
severity: error
language: Tsx
rule:
  any:
    - pattern: const { $$$PROPS } = useAgentStore($$$ARGS)
    - pattern: const { $$$PROPS } = useSessionStore($$$ARGS)
note: |
  Destructuring causes render cascades — every store update triggers re-renders
  even if destructured values haven't changed. Use individual selectors to
  subscribe only to the slices you need.
