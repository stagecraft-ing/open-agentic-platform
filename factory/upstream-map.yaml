# ============================================================================
# Factory Upstream Mapping Manifest
# ============================================================================
#
# Declares the structural correspondence between upstream repositories and
# OAP factory/ targets. Used by the /factory-sync command and the stagecraft
# sync worker (spec 108 Phase 3) to detect, map, and translate upstream
# changes.
#
# See: specs/088-factory-upstream-sync/spec.md
#      specs/108-factory-as-platform-feature/spec.md
#
# Schema version: 2.0.0
#
# History:
#   1.0.0 — Original mapping against GovAlta-EMU/the_factory and
#           GovAlta-EMU/AIM-vue-node-template.
#   2.0.0 — 2026-04-24. Upstream repos reorganised. the_factory →
#           GovAlta-Pronghorn/goa-software-factory (adds `cd` and `xf`
#           orchestration stages, retires `api-web-standards.md` and
#           `api-standards-compliance.md` from the extractable surface,
#           introduces three canonical `sitemap-template-*.json` files
#           as load-bearing reference data). AIM-vue-node-template →
#           GovAlta-Pronghorn/template (module-based scaffold:
#           `modules/`, `packages/`, `apps/`, `scripts/setup-*.ts`,
#           `orchestration/skills/*.md` for scaffold-feature, configure,
#           analyze, trim, validate, code-quality).
# ============================================================================

schema_version: "2.0.0"

upstreams:

  # ────────────────────────────────────────────────────────────────────────
  # goa-software-factory — GoA production factory (renamed from the_factory).
  # Organisationally moved from GovAlta-EMU to GovAlta-Pronghorn. The
  # pipeline now explicitly separates Client Documentation (cd), Template
  # Mode (tm), and Pipeline Completion (xf) into their own stage skill
  # files, and ships Security Agent skills under a sibling tree that OAP
  # excludes from sync.
  # ────────────────────────────────────────────────────────────────────────
  goa_software_factory:
    path: "~/Dev2/goa-software-factory"
    remote: "GovAlta-Pronghorn/goa-software-factory"
    last_synced_sha: "b6f79ba"
    last_synced_date: "2026-04-24"

    exclude_patterns:
      # Security Agent tree (separate concern; has its own orchestrator and
      # test schemas that are not part of the factory contract surface).
      - "Security Agent/"
      - "eval_framework/"
      # GoA-specific reference documents (not generalisable to OAP adapters).
      - "Factory Agent/Controllers/api-web-standards.md"
      - "Factory Agent/Controllers/api-standards-compliance.md"
      # Legacy docx/ppt generators (GoA-only distribution tooling).
      - "Factory Agent/Orchestrator/scripts/"
      # Project metadata.
      - ".github/"
      - ".claude/"
      - ".env.github"
      - ".project"
      - "README.md"

    mappings:

      # ── Main Orchestrator ──────────────────────────────────────────────

      - source: "Factory Agent/factory-orchestration.md"
        targets:
          - process/stages/00-pre-flight.md
          - process/stages/01-business-requirements.md
          - process/stages/02-service-requirements.md
          - process/stages/03-data-model.md
          - process/stages/04-api-specification.md
          - process/stages/05-ui-specification.md
          - process/stages/06-adapter-handoff.md
          - process/agents/pipeline-orchestrator.md
        relationship: restructured
        layer: process
        notes: >
          Top-level orchestrator. Defines the 14 execution discipline rules,
          factory inputs schema, pre-flight checks (FAC-PRE-001..006), the
          dispatch table, and the artifact flow diagram. OAP decomposes
          into 7 stage files + 1 pipeline-orchestrator agent. Rules 1–14
          map to .claude/rules/orchestrator-rules.md and to the ACP engine's
          verification harness.

      # ── Stage Skills (s1..s5, cd, tm, xf) ──────────────────────────────

      - source: "Factory Agent/Orchestrator/factory-orchestration-s1.md"
        targets:
          - process/stages/01-business-requirements.md
          - process/agents/business-requirements-analyst.md
          - contract/schemas/stage-outputs/business-rules.schema.json
          - contract/schemas/stage-outputs/use-cases.schema.json
        relationship: restructured
        layer: process
        notes: >
          Stage 1 skill. Extract BRD extraction protocol, entity identification
          rules, and quality gates (FAC-S1-*). Translate GoA QG-* codes into
          the verification contract's S1-* checks.

      - source: "Factory Agent/Orchestrator/factory-orchestration-s2.md"
        targets:
          - process/stages/02-service-requirements.md
          - process/agents/service-designer.md
          - contract/schemas/stage-outputs/audiences.schema.json
          - contract/schemas/stage-outputs/sitemap.schema.json
        relationship: restructured
        layer: process
        notes: >
          Stage 2 skill, now with a 3-phase batched execution model (Phase A
          foundation, Phase B journey maps, Phase C synthesis) and a phase
          gate between B and C. OAP preserves the phase gate inside the
          service-designer agent and encodes Phase B completion as a
          verification contract precondition.

      - source: "Factory Agent/Orchestrator/factory-orchestration-s3.md"
        targets:
          - process/stages/03-data-model.md
          - process/agents/data-architect.md
          - contract/schemas/stage-outputs/entity-model.schema.json
        relationship: restructured
        layer: process
        notes: >
          Stage 3 skill. Extract entity normalisation rules and constraint
          definitions. IMPORTANT: OAP deliberately produces abstract
          data-model.json, NOT SQL. DDL generation is the adapter's job.
          SQL-specific rules belong in adapter patterns.

      - source: "Factory Agent/Orchestrator/factory-orchestration-s4.md"
        targets:
          - process/stages/04-api-specification.md
          - process/agents/api-architect.md
          - contract/schemas/verification.schema.yaml
        relationship: restructured
        layer: process
        notes: >
          Stage 4 skill (now includes build–review–remediate cycle with max
          3 iterations and batching of 2–3 APIs per batch). OAP produces
          only the Build Spec api section; code generation rules go to
          adapter agents. FAC-S4-* gate blockers map to S4-* checks in
          verification.schema.yaml.

      - source: "Factory Agent/Orchestrator/factory-orchestration-s5.md"
        targets:
          - process/stages/05-ui-specification.md
          - process/agents/ui-architect.md
        relationship: restructured
        layer: process
        notes: >
          Stage 5 skill (6-phase internal pipeline: input validation,
          content gen, design application, assembly, tests, UC/TC
          verification). Batched 2–3 pages per batch. OAP produces only
          the UI specification; component implementation is adapter work.

      - source: "Factory Agent/Orchestrator/factory-orchestration-cd.md"
        targets:
          - process/stages/cd-client-documentation.md
          - process/agents/client-documentation-orchestrator.md
        relationship: new
        layer: process
        notes: >
          NEW in goa-software-factory. Client Documentation is a conditional
          stage with three phases (client document, project charter, PPT
          generation) and NOW/SKIP/DEFERRED scheduling. Not in ACP's
          7-stage pipeline-state spec today; OAP captures it as an
          optional process stage and does NOT translate it into
          pipeline-state.schema.yaml. Import translation ignores the
          `clientDocumentation` section of legacy manifests.

      - source: "Factory Agent/Orchestrator/factory-orchestration-tm.md"
        targets:
          - adapters/aim-vue-node/manifest.yaml
          - process/stages/06-adapter-handoff.md
        relationship: restructured
        layer: adapter
        notes: >
          Template Mode detection and critical overrides reconciliation.
          OAP replaces inline template detection with the adapter manifest
          capability system. The TM "Factory wins WHAT, Template wins HOW"
          precedence rules inform the verification contract.

      - source: "Factory Agent/Orchestrator/factory-orchestration-xf.md"
        targets:
          - process/stages/06-adapter-handoff.md
          - contract/schemas/verification.schema.yaml
        relationship: restructured
        layer: process
        notes: >
          Pipeline completion skill — factory-manifest.json schema and
          cross-pipeline traceability. OAP uses the verification contract
          `final_validation` section plus pipeline-state.schema.yaml's
          audit array to cover the same traceability surface.

      # ── Controller Agents ──────────────────────────────────────────────

      - source: "Factory Agent/Controllers/api-orchestrator.md"
        targets:
          - process/agents/scaffolding-orchestrator.md
        relationship: restructured
        layer: process
        notes: >
          Build–review–remediate cycle coordinator. OAP's scaffolding-
          orchestrator serves the same role but drives the verification
          contract rather than an inline review loop.

      - source: "Factory Agent/Controllers/api-builder.md"
        targets:
          - adapters/aim-vue-node/agents/api-scaffolder.md
          - adapters/aim-vue-node/patterns/api/service.md
          - adapters/aim-vue-node/patterns/api/controller.md
          - adapters/aim-vue-node/patterns/api/route.md
          - adapters/aim-vue-node/patterns/api/test.md
          - adapters/aim-vue-node/patterns/api/ddl-validation.md
          - adapters/aim-vue-node/patterns/api/types.md
        relationship: extract-only
        layer: adapter
        notes: >
          Extract DDL alignment rules, shared type enforcement, SQL column
          verification, response shape rules. Ignore GoA-specific compliance
          report numbering and inline mode detection (the adapter manifest
          handles mode selection).

      - source: "Factory Agent/Controllers/api-reviewer.md"
        targets:
          - adapters/aim-vue-node/agents/reviewer.md
          - adapters/aim-vue-node/validation/invariants.yaml
          - contract/schemas/verification.schema.yaml
        relationship: extract-only
        layer: adapter
        notes: >
          Extract deficiency codes, structured evidence requirements, and
          cross-layer consistency checks. Ignore GoA compliance report
          section numbering.

      - source: "Factory Agent/Controllers/api-security.md"
        targets:
          - adapters/aim-vue-node/validation/invariants.yaml
          - adapters/aim-vue-node/patterns/api/authorization.md
        relationship: extract-only
        layer: adapter
        notes: >
          Authorisation patterns, RBAC rules, session security. Ignore
          GoA Protected-B classification, ASVS and ministry-specific
          compliance — those live in Security Agent/ which OAP excludes.

      # ── Client Interface ───────────────────────────────────────────────

      - source: "Factory Agent/Client_Interface/client-interface-orchestration.md"
        targets:
          - process/agents/ui-architect.md
          - adapters/aim-vue-node/agents/ui-scaffolder.md
        relationship: restructured
        layer: adapter
        notes: >
          6-phase UI generation pipeline. OAP splits: specification →
          ui-architect (process), implementation → ui-scaffolder (adapter).

      - source: "Factory Agent/Client_Interface/content-specification.md"
        targets:
          - process/agents/ui-architect.md
        relationship: extract-only
        layer: process
        notes: >
          Semantic content specification rules (what a page communicates,
          independent of components).

      - source: "Factory Agent/Client_Interface/design-system.md"
        targets:
          - adapters/aim-vue-node/patterns/ui/component.md
          - adapters/aim-vue-node/patterns/ui/layout.md
        relationship: extract-only
        layer: adapter
        notes: >
          Extract component usage patterns, layout conventions, accessibility
          rules. Ignore GoA brand guidelines and ministry-specific theming.

      - source: "Factory Agent/Client_Interface/page-types/authenticated/"
        targets:
          - adapters/aim-vue-node/patterns/page-types/
        relationship: diffable
        layer: adapter
        notes: >
          12 authenticated page types: dashboard, wizard, wizard-step-
          selection, wizard-step-review, list-index, detail-view, edit-
          form, report-results, section-hub, settings-form, user-
          management, permission-editor. Diff and merge with OAP's
          adapter patterns.

      - source: "Factory Agent/Client_Interface/page-types/public/"
        targets:
          - adapters/aim-vue-node/patterns/page-types/
        relationship: diffable
        layer: adapter
        notes: >
          8 public page types: landing-page, information-page, start-page,
          contact-page, directory-page, public-form-step, public-form-
          review, public-form-confirmation.

      # ── Service Requirements Sub-Agents ────────────────────────────────

      - source: "Factory Agent/Requirements/Service/service-requirements-orchestrator.md"
        targets:
          - process/stages/02-service-requirements.md
          - process/agents/service-designer.md
        relationship: restructured
        layer: process
        notes: >
          Coordinates 5 sub-agents across 3 phases (A: foundation, B:
          journey maps, C: synthesis). OAP compresses into a single
          service-designer agent with a phase-gate dependency.

      - source: "Factory Agent/Requirements/Service/service-description.md"
        targets:
          - process/agents/service-designer.md
        relationship: extract-only
        layer: process

      - source: "Factory Agent/Requirements/Service/audience-identification.md"
        targets:
          - process/agents/service-designer.md
        relationship: extract-only
        layer: process

      - source: "Factory Agent/Requirements/Service/audience-journey-map.md"
        targets:
          - process/agents/service-designer.md
        relationship: extract-only
        layer: process

      - source: "Factory Agent/Requirements/Service/future-state.md"
        targets:
          - process/agents/service-designer.md
        relationship: extract-only
        layer: process

      - source: "Factory Agent/Requirements/Service/sitemap.md"
        targets:
          - contract/schemas/stage-outputs/sitemap.schema.json
          - process/agents/service-designer.md
        relationship: extract-only
        layer: process

      - source: "Factory Agent/Requirements/Service/page-type-catalog.md"
        targets:
          - contract/schemas/stage-outputs/sitemap.schema.json
          - adapters/aim-vue-node/patterns/page-types/
        relationship: extract-only
        layer: contract
        notes: >
          Canonical page-type catalog (20 types). OAP encodes valid
          page_type enum values in the sitemap JSON schema.

      - source: "Factory Agent/Requirements/Service/sitemap-template-public.json"
        targets:
          - contract/examples/stage-outputs/sitemap.public.json
        relationship: extract-only
        layer: contract
        notes: >
          NOW load-bearing in goa-software-factory. Capture as a
          reference example for OAP's sitemap schema and for adapter
          scaffolds that start from a variant baseline.

      - source: "Factory Agent/Requirements/Service/sitemap-template-public-authenticated.json"
        targets:
          - contract/examples/stage-outputs/sitemap.public-authenticated.json
        relationship: extract-only
        layer: contract

      - source: "Factory Agent/Requirements/Service/sitemap-template-private-authenticated.json"
        targets:
          - contract/examples/stage-outputs/sitemap.private-authenticated.json
        relationship: extract-only
        layer: contract

      # ── Database Agent ─────────────────────────────────────────────────

      - source: "Factory Agent/Database/database_architect.md"
        targets:
          - process/stages/03-data-model.md
          - process/agents/data-architect.md
          - adapters/aim-vue-node/patterns/data/migration.md
        relationship: restructured
        layer: process
        notes: >
          Extract entity normalisation rules, constraint naming, relationship
          patterns. DDL generation rules route to adapter patterns.

      # ── System Requirements ────────────────────────────────────────────

      - source: "Factory Agent/Requirements/System/business-requirements.md"
        targets:
          - process/agents/business-requirements-analyst.md
        relationship: restructured
        layer: process
        notes: >
          46 KB BRD extraction skill. Extract document analysis protocol,
          entity extraction, use-case derivation. Ignore FAC-QG codes and
          phase-specific validation (verification contract covers that).

      - source: "Factory Agent/Requirements/System/admin-interface-base-requirements.json"
        targets:
          - adapters/aim-vue-node/patterns/api/authorization.md
          - adapters/aim-vue-node/patterns/page-types/admin-users.md
          - adapters/aim-vue-node/patterns/page-types/admin-roles.md
        relationship: extract-only
        layer: adapter
        notes: >
          RBAC architecture patterns (IdP-as-identity, DB-authoritative
          roles), permission management model, session invalidation,
          admin UI structure. Ignore Entra ID-specific references and
          GoA section numbering.

      # ── Client Documentation (Optional Stage, new in goa-software-factory) ─

      - source: "Factory Agent/Requirements/Client/client-document.md"
        targets:
          - process/agents/client-documentation-orchestrator.md
        relationship: new
        layer: process
        notes: >
          Generates client-facing service document. Optional; not in the
          7-stage ACP pipeline.

      - source: "Factory Agent/Requirements/Client/project-charter.md"
        targets:
          - process/agents/client-documentation-orchestrator.md
        relationship: new
        layer: process

      - source: "Factory Agent/Requirements/Client/html-report-assembler.md"
        targets:
          - process/agents/client-documentation-orchestrator.md
        relationship: new
        layer: process

      - source: "Factory Agent/Requirements/Client/document-formatting.md"
        targets:
          - process/agents/client-documentation-orchestrator.md
        relationship: new
        layer: process


  # ────────────────────────────────────────────────────────────────────────
  # template — GoA enterprise application scaffold (renamed from AIM-vue-
  # node-template). Module-based architecture: each capability ships as a
  # separate module under modules/ and is installed by scripts/setup-app.ts
  # (single-app) or scripts/setup-dual-app.ts (dual-app). Orchestration
  # moves from a single template-orchestrator.md to a 7-phase workflow
  # defined by orchestration/template-orchestrator.md + six skill files
  # under orchestration/skills/.
  # ────────────────────────────────────────────────────────────────────────
  template:
    path: "~/Dev2/template"
    remote: "GovAlta-Pronghorn/template"
    last_synced_sha: "e1de48c"
    last_synced_date: "2026-04-24"

    exclude_patterns:
      # Scaffold itself — copied into generated projects, not factory metadata.
      - "apps/"
      - "packages/"
      - "modules/"
      - "scripts/"
      - "docker/"
      - "docs/"
      - "node_modules/"
      - "dist/"
      - "logs/"
      - "*.lock"
      - "package-lock.json"
      - ".env*"
      - ".github/"
      - ".claude/"
      - ".husky/"
      # Root config files belong to the scaffold, not the adapter contract.
      - "package.json"
      - "tsconfig.base.json"
      - "docker-compose.yml"
      - "eslint.config.mjs"
      - ".prettierrc.json"
      - ".gitattributes"
      - ".gitignore"

    mappings:

      - source: "orchestration/template-orchestrator.md"
        targets:
          - adapters/aim-vue-node/manifest.yaml
          - adapters/aim-vue-node/scaffold/README.md
        relationship: diffable
        layer: adapter
        notes: >
          Master orchestrator (7-phase workflow). Declares skill loading
          discipline, dual-variant rules (public, internal, dual), and
          hands off Stages 4–5 to the factory's standard-mode orchestrator
          if TEMPLATE_MODE=false. Drives adapter manifest capabilities
          and directory conventions.

      - source: "orchestration/skills/analyze.md"
        targets:
          - adapters/aim-vue-node/agents/analyzer.md
        relationship: new
        layer: adapter
        notes: Template state inventory skill.

      - source: "orchestration/skills/configure.md"
        targets:
          - adapters/aim-vue-node/agents/configurer.md
        relationship: diffable
        layer: adapter
        notes: >
          App identity, auth driver, layout-shell configuration. Replaces
          the old PLACEHOLDERS.md-driven configurer agent.

      - source: "orchestration/skills/scaffold-feature.md"
        targets:
          - adapters/aim-vue-node/agents/api-scaffolder.md
          - adapters/aim-vue-node/agents/ui-scaffolder.md
          - adapters/aim-vue-node/patterns/api/controller.md
          - adapters/aim-vue-node/patterns/api/service.md
          - adapters/aim-vue-node/patterns/api/route.md
          - adapters/aim-vue-node/patterns/ui/view.md
          - adapters/aim-vue-node/patterns/ui/state.md
        relationship: new
        layer: adapter
        notes: >
          Feature code generation skill (controllers, services, routes,
          Vue views, Pinia stores). This is the most load-bearing
          implementation skill — all API and UI patterns extract from here.

      - source: "orchestration/skills/trim.md"
        targets:
          - adapters/aim-vue-node/agents/trimmer.md
        relationship: diffable
        layer: adapter
        notes: Remove unused modules and examples after feature generation.

      - source: "orchestration/skills/validate.md"
        targets:
          - adapters/aim-vue-node/agents/reviewer.md
          - adapters/aim-vue-node/validation/invariants.yaml
        relationship: new
        layer: adapter
        notes: >
          Post-generation validation checklist (auth, security, traceability,
          TypeScript strictness, tests). Feeds the verification contract's
          adapter-owned checks.

      - source: "orchestration/skills/code-quality.md"
        targets:
          - adapters/aim-vue-node/validation/invariants.yaml
        relationship: new
        layer: adapter
        notes: ESLint/Prettier rules, TypeScript strictness, code patterns.

      - source: "template.json"
        targets:
          - adapters/aim-vue-node/manifest.yaml
        relationship: diffable
        layer: adapter
        notes: >
          Module inventory + file ownership tracking. Source of truth for
          which modules the adapter installs and which files are template-
          owned (vs. user-authored). Changes propagate to the adapter
          manifest's modules and scaffold.module_ownership sections.

      - source: "CODEMAP.md"
        targets:
          - adapters/aim-vue-node/manifest.yaml
          - adapters/aim-vue-node/scaffold/README.md
        relationship: extract-only
        layer: adapter
        notes: >
          Architecture blueprint (~600 lines). Tech stack, dependency flow,
          API surfaces, execution flows, security model, session management,
          endpoints, roles, invariants. Feeds adapter manifest capabilities,
          directory_conventions, and scaffold.modules. The most important
          document for understanding the template.

      - source: "PLACEHOLDERS.md"
        targets:
          - adapters/aim-vue-node/agents/configurer.md
          - adapters/aim-vue-node/agents/trimmer.md
        relationship: diffable
        layer: adapter
        notes: >
          `{{VARIABLE_NAME}}` substitution pattern reference (SAML certs,
          OAuth secrets, Redis URLs, session secrets). Configurer must
          fill these; trimmer must verify none remain.

      - source: "README.md"
        targets:
          - adapters/aim-vue-node/scaffold/README.md
        relationship: extract-only
        layer: adapter
        notes: >
          Quick start + setup scripts. Node 24+ requirement is a hard
          capability gate in the adapter manifest.


# ---------------------------------------------------------------------------
# OAP-native adapters — no external upstream, developed in-tree
# ---------------------------------------------------------------------------
oap_native:
  encore-react:
    notes: "OAP-native adapter, no upstream sync needed"
  next-prisma:
    notes: "OAP-native adapter, no upstream sync needed"
  rust-axum:
    notes: "OAP-native adapter, no upstream sync needed"
