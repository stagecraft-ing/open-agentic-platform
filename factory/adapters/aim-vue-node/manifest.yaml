# ============================================================================
# Adapter Manifest: AIM Vue+Node GoA Template
# ============================================================================
# Upstream: GovAlta-Pronghorn/template (renamed from GovAlta-EMU/AIM-vue-node-template)
# See factory/upstream-map.yaml v2.0.0 for the mapping.
# ============================================================================

schema_version: "1.0.0"

adapter:
  name: "aim-vue-node"
  display_name: "AIM Vue+Node GoA Enterprise Template"
  version: "4.0.0"
  description: "Alberta Government enterprise application template. Module-based scaffold with Vue 3 frontend, Express 5 BFF backend, multi-driver authentication registry, pluggable session stores, and GoA Design System. Node 24+ runtime."
  upstream:
    remote: "GovAlta-Pronghorn/template"
    last_synced_sha: "e1de48c"
    orchestrator: "orchestration/template-orchestrator.md"
    skills:
      analyze: "orchestration/skills/analyze.md"
      configure: "orchestration/skills/configure.md"
      scaffold_feature: "orchestration/skills/scaffold-feature.md"
      trim: "orchestration/skills/trim.md"
      validate: "orchestration/skills/validate.md"
      code_quality: "orchestration/skills/code-quality.md"

stack:
  language: "typescript"
  runtime: "node-24"

  backend:
    framework: "express-5"
    description: "Express 5 with Route → Controller → Service pattern. Session-based auth via express-session. Middleware-driven security (Helmet, CSRF, rate limiting, HPP)."

  frontend:
    framework: "vue-3"
    state_management: "pinia"
    design_system: "goa-web-components"
    description: "Vue 3 Composition API with <script setup>. GoA Design System (@abgov/web-components). Pinia for shared state. Vue Router 4 with lazy-loaded views."

  database:
    supported: ["postgresql"]
    migration_tool: "custom-ddl"
    orm: "none"

capabilities:
  dual_stack: true
  bff_pattern: true
  single_stack: true
  session_auth: true
  token_auth: false
  api_key_auth: false
  module_system: true
  file_uploads: true
  background_jobs: false
  realtime: false
  email_notifications: true
  audit_logging: true
  direct_sql: true
  orm_based: false
  api_proxy: true

supported_auth:
  - method: "saml"
    driver: "passport-saml"
    providers: ["alberta-ca-account"]
    description: "SAML 2.0 via @node-saml/passport-saml for citizen-facing apps"
  - method: "oidc"
    driver: "openid-client"
    providers: ["entra-id"]
    description: "OIDC with PKCE via openid-client for staff-facing apps (Microsoft Entra ID)"
  - method: "mock"
    driver: "built-in"
    providers: []
    description: "Mock auth driver for development. Auto-registered in non-production. Blocked in production."

supported_session_stores:
  - type: "redis"
    description: "connect-redis adapter. Used with SAML/public stack."
  - type: "postgresql"
    description: "connect-pg-simple adapter. Used with Entra ID/internal stack."
  - type: "memory"
    description: "In-process store for development only."

commands:
  install: "npm install"
  compile: "npm run build"
  test: "npm test"
  lint: "npm run lint"
  dev: "npm run dev"
  format_check: "npx prettier --check ."
  type_check: "npx tsc --noEmit"
  seed: "npx tsx scripts/run-seeds.ts"
  migrate: "npx tsx scripts/migrate.ts"
  pre_verify:
    - command: "npx tsc --noEmit"
      working_dir: "."
      timeout_ms: 30000
  feature_verify:
    - "npm run build"
    - "npm test"
  post_verify:
    - command: "npm run build"
      working_dir: "."
      timeout_ms: 120000
    - command: "npm test"
      working_dir: "."
      timeout_ms: 120000

directory_conventions:
  api_service: "apps/{stack}/src/services/{resource}.service.ts"
  api_controller: "apps/{stack}/src/controllers/{resource}.controller.ts"
  api_route: "apps/{stack}/src/routes/{resource}.routes.ts"
  api_test: "apps/{stack}/src/services/{resource}.service.test.ts"
  api_types: "packages/shared/src/types/{entity}.types.ts"
  api_middleware: "apps/{stack}/src/middleware/{name}.middleware.ts"
  ui_view: "apps/{stack}/src/views/{PageName}View.vue"
  ui_store: "apps/{stack}/src/stores/{resource}.store.ts"
  ui_route_config: "apps/{stack}/src/router/index.ts"
  ui_test: "apps/{stack}/src/views/{PageName}View.test.ts"
  ui_component: "apps/{stack}/src/components/{Name}.vue"
  migration: "scripts/migrations/{timestamp}_{name}.sql"
  seed: "scripts/seeds/{name}.sql"
  schema_types: "packages/shared/src/schemas/{entity}.schema.ts"
  fixture_module: "packages/shared/src/fixtures/index.ts"
  env_file: ".env.example"
  env_file_per_stack:
    public: ".env.external.example"
    internal: ".env.internal.example"

patterns:
  api:
    service: "patterns/api/service.md"
    controller: "patterns/api/controller.md"
    route: "patterns/api/route.md"
    test: "patterns/api/test.md"
    middleware: "patterns/api/middleware.md"
    types: "patterns/api/types.md"
    ddl_validation: "patterns/api/ddl-validation.md"
    authorization: "patterns/api/authorization.md"
  ui:
    view: "patterns/ui/view.md"
    state: "patterns/ui/state.md"
    route: "patterns/ui/route.md"
    test: "patterns/ui/test.md"
    layout: "patterns/ui/layout.md"
    component: "patterns/ui/component.md"
  data:
    migration: "patterns/data/migration.md"
    query: "patterns/data/query.md"
    seed: "patterns/data/seed.md"
    fixture_factory: "patterns/data/fixture-factory.md"
    validation_schema: "patterns/data/validation-schema.md"
  page_types:
    landing: "patterns/page-types/landing.md"
    dashboard: "patterns/page-types/dashboard.md"
    list: "patterns/page-types/list.md"
    detail: "patterns/page-types/detail.md"
    form: "patterns/page-types/form.md"
    content: "patterns/page-types/content.md"
    help: "patterns/page-types/help.md"
    profile: "patterns/page-types/profile.md"
    login: "patterns/page-types/login.md"
    admin_users: "patterns/page-types/admin-users.md"
    admin_roles: "patterns/page-types/admin-roles.md"

agents:
  api_scaffolder: "agents/api-scaffolder.md"
  ui_scaffolder: "agents/ui-scaffolder.md"
  data_scaffolder: "agents/data-scaffolder.md"
  seed_generator: "agents/seed-generator.md"
  configurer: "agents/configurer.md"
  trimmer: "agents/trimmer.md"
  reviewer: "agents/reviewer.md"

scaffold:
  # The scaffold itself lives upstream. See scaffold/README.md for the
  # pointer-not-repo contract.
  source:
    kind: "upstream-git"
    remote: "GovAlta-Pronghorn/template"
    default_ref: "main"
  description: "Monorepo with apps/ (api, web, and per-stack variants) and packages/ (shared, config, auth). Module system for pluggable auth drivers, session stores, data connectors, security middleware, and user management. GoA Design System pre-installed."

  # Spec 112 §8 — stagecraft Create surface.
  entry_point: "scripts/setup-app.ts"
  entry_point_dual: "scripts/setup-dual-app.ts"
  runtime: "node-24"
  args_schema:
    type: object
    required: ["variant"]
    properties:
      variant:
        type: string
        enum: ["single-public", "single-internal", "minimal", "dual"]
      dest:
        type: string
        description: "Destination directory for the scaffolded project"
      yes:
        type: boolean
        description: "Skip interactive confirmation prompts"
      dry_run:
        type: boolean
        description: "Preview the scaffold actions without writing files"
      clean:
        type: boolean
        description: "Remove unused scaffold artefacts for the selected variant"
      no_install:
        type: boolean
        description: "Skip npm install in the scaffolded project (factory runs it later)"

  profiles:
    - name: "single-public"
      variant: "single-public"
      entry_point: "scripts/setup-app.ts"
      default_args: { profile: "public" }
      modules:
        - "security-core"
        - "data-redis"
        - "auth-core"
        - "auth-mock"
        - "auth-saml"
        - "session-store-redis"
    - name: "single-internal"
      variant: "single-internal"
      entry_point: "scripts/setup-app.ts"
      default_args: { profile: "internal" }
      modules:
        - "security-core"
        - "data-postgres"
        - "auth-core"
        - "auth-mock"
        - "auth-entra-id"
        - "session-store-postgres"
        - "service-auth"
    - name: "minimal"
      variant: "minimal"
      entry_point: "scripts/setup-app.ts"
      default_args: { profile: "minimal" }
      modules:
        - "security-core"
        - "auth-core"
        - "auth-mock"
    - name: "dual"
      variant: "dual"
      default: true
      entry_point: "scripts/setup-dual-app.ts"
      default_args: {}
      modules:
        - "security-core"
        - "data-redis"
        - "data-postgres"
        - "auth-core"
        - "auth-mock"
        - "auth-saml"
        - "auth-entra-id"
        - "session-store-redis"
        - "session-store-postgres"
        - "service-auth"

  # Modules available in the upstream template (informational — the
  # authoritative list is modules/*/manifest.json in the upstream). If a
  # module is added upstream it should be added here in the same PR that
  # bumps upstream.last_synced_sha.
  available_modules:
    - "auth-core"
    - "auth-mock"
    - "auth-saml"
    - "auth-entra-id"
    - "security-core"
    - "data-redis"
    - "data-postgres"
    - "session-store-redis"
    - "session-store-postgres"
    - "service-auth"
    - "api-gateway"
    - "api-docs"
    - "user-management"

  emits:
    - path: "template.json"
      description: "Module inventory + fileOwnership — drives add-module / remove-module tooling"
    - path: "apps/"
      description: "Per-stack application folders (single vs. dual based on variant)"
    - path: "packages/"
      description: "Shared packages (shared, config, auth)"
    - path: "modules/"
      description: "Installed module source trees (copied from upstream modules/ per profile)"
    - path: "orchestration/"
      description: "Template orchestrator + six sub-skill files that guide the 7-phase transformation (analyze, configure, scaffold-feature, trim, validate, code-quality)"
    - path: ".env.example"
      description: "Merged environment template (base + per-module hints)"
    - path: ".factory/pipeline-state.json"
      description: "L0 ACP pipeline-state seed written by stagecraft post-scaffold (not by the adapter itself)"

validation:
  invariants_file: "validation/invariants.yaml"

dual_stack:
  audience_to_stack:
    citizen: "public"
    staff: "internal"
  stacks:
    public:
      api: "api-public"
      web: "web-public"
      port_api: 3000
      port_web: 5173
    internal:
      api: "api-internal"
      web: "web-internal"
      port_api: 3001
      port_web: 5174
  data_access:
    public: "proxy-only"
    internal: "direct"
