# ============================================================================
# AIM Vue+Node Adapter — Architecture Invariants
# ============================================================================
#
# Machine-checkable rules extracted from the template's 19 architecture
# invariants. The verification harness runs these after scaffolding.
#
# Each rule: ID, description, check type, pattern/scope, severity.
# ============================================================================

invariants:

  # ── Language & Framework ────────────────────────────────────────────────

  - id: "INV-001"
    description: "All code is TypeScript — no .js source files in apps/ or packages/"
    check:
      type: "command-succeeds"
      pattern: "! find apps/ packages/ -name '*.js' -not -path '*/dist/*' -not -path '*/node_modules/*' | grep -q ."
      scope: "."
    severity: "error"

  - id: "INV-002"
    description: "No JWT for user sessions — session-based auth only"
    check:
      type: "grep-absent"
      pattern: "jsonwebtoken|jwt\\.sign|jwt\\.verify|JwtStrategy"
      scope: "apps/"
    severity: "error"

  - id: "INV-003"
    description: "No Vuex — Pinia only for state management"
    check:
      type: "grep-absent"
      pattern: "import.*vuex|from ['\"]vuex['\"]|createStore.*vuex"
      scope: "apps/web*"
    severity: "error"

  - id: "INV-004"
    description: "No ORM — direct SQL only (no Prisma, TypeORM, Sequelize, Drizzle)"
    check:
      type: "grep-absent"
      pattern: "import.*prisma|import.*typeorm|import.*sequelize|import.*drizzle|from ['\"]prisma['\"]"
      scope: "."
    severity: "error"

  - id: "INV-005"
    description: "No Tailwind CSS — design system components only"
    check:
      type: "grep-absent"
      pattern: "tailwindcss|@tailwind|tailwind\\.config"
      scope: "."
    severity: "error"

  - id: "INV-006"
    description: "No Joi/Yup/class-validator — Zod only for validation"
    check:
      type: "grep-absent"
      pattern: "from ['\"]joi['\"]|from ['\"]yup['\"]|from ['\"]class-validator['\"]"
      scope: "."
    severity: "error"

  # ── Vue Conventions ─────────────────────────────────────────────────────

  - id: "INV-007"
    description: "Vue SFCs use <script setup> — no Options API"
    check:
      type: "grep-absent"
      pattern: "export default defineComponent|export default \\{.*data\\(\\)"
      scope: "apps/web*"
    severity: "error"

  - id: "INV-008"
    description: "All Vue views are lazy-loaded in router (no static imports)"
    check:
      type: "grep-absent"
      pattern: "^import.*View from ['\"]\\.\\./(views|pages)/"
      scope: "apps/web*/src/router/"
    severity: "warning"

  # ── Dual-Stack Isolation ────────────────────────────────────────────────

  - id: "INV-009"
    description: "Public API stack never imports database pool"
    check:
      type: "grep-absent"
      pattern: "getPool|from ['\"].*db['\"]|database\\.config|pool\\.query"
      scope: "apps/api-public/"
    severity: "error"

  - id: "INV-010"
    description: "Internal API stack never imports gateway proxy"
    check:
      type: "grep-absent"
      pattern: "proxyRequest|token-cache\\.service|gateway\\.routes"
      scope: "apps/api-internal/src/services/"
    severity: "error"

  # ── Security ────────────────────────────────────────────────────────────

  - id: "INV-011"
    description: "Mock auth driver blocked in production"
    check:
      type: "grep-present"
      pattern: "NODE_ENV.*production|production.*mock"
      scope: "packages/auth/src/drivers/mock"
    severity: "error"

  - id: "INV-012"
    description: "No string interpolation in SQL queries (must use parameterized queries)"
    check:
      type: "grep-absent"
      pattern: "query\\(`[^`]*\\$\\{|query\\(['\"][^'\"]*\\$\\{"
      scope: "apps/api-internal/src/services/"
    severity: "error"

  - id: "INV-013"
    description: "CORS origin must not be wildcard"
    check:
      type: "grep-absent"
      pattern: "CORS_ORIGIN.*['\"]\\*['\"]|cors\\(\\{.*origin.*['\"]\\*['\"]"
      scope: "apps/"
    severity: "error"

  # ── Architecture Pattern ────────────────────────────────────────────────

  - id: "INV-014"
    description: "Route → Controller → Service pattern — routes do not import pool"
    check:
      type: "grep-absent"
      pattern: "import.*pool|import.*getPool|from ['\"].*db['\"]"
      scope: "apps/*/src/routes/"
    severity: "error"

  - id: "INV-015"
    description: "Controllers do not import pool — they delegate to services"
    check:
      type: "grep-absent"
      pattern: "import.*pool|import.*getPool|pool\\.query"
      scope: "apps/*/src/controllers/"
    severity: "error"

  - id: "INV-016"
    description: "Every service test file mocks the database pool"
    check:
      type: "grep-present"
      pattern: "vi\\.mock.*db|mockQuery"
      scope: "apps/*/src/services/*.test.ts"
    severity: "warning"

  # ── Build & Quality ─────────────────────────────────────────────────────

  - id: "INV-017"
    description: "TypeScript compiles without errors"
    check:
      type: "command-succeeds"
      pattern: "npm run build"
      scope: "."
    severity: "error"

  - id: "INV-018"
    description: "All tests pass"
    check:
      type: "command-succeeds"
      pattern: "npm test"
      scope: "."
    severity: "error"

  - id: "INV-019"
    description: "No unfilled placeholders in source files"
    check:
      type: "grep-absent"
      pattern: "\\{\\{[A-Z_]+\\}\\}"
      scope: "apps/"
    severity: "error"

  # ── DDL Alignment ──────────────────────────────────────────────────────
  #
  # These catch the most common class of runtime failure: code that compiles
  # and passes mocked unit tests but fails against a real database.

  - id: "INV-020"
    description: "Service files import from shared types — no local entity type declarations"
    check:
      type: "grep-absent"
      pattern: "^export (interface|type) \\w+Row "
      scope: "apps/api-internal/src/services/"
    severity: "error"
    rationale: >
      Service-local Row types diverge from shared types over time, causing
      SQL column name mismatches. All entity types must live in packages/shared.

  - id: "INV-021"
    description: "DDL column validation test utility exists"
    check:
      type: "command-succeeds"
      pattern: "test -f tests/utils/ddl-column-validator.ts || test -f packages/shared/src/test-utils/ddl-column-validator.ts"
      scope: "."
    severity: "warning"

  - id: "INV-022"
    description: "Every service file has a DDL column validation test"
    check:
      type: "command-succeeds"
      pattern: >
        ls apps/api-internal/src/services/*.service.ts 2>/dev/null | grep -q . || exit 0;
        for svc in apps/api-internal/src/services/*.service.ts; do
          base=$(basename "$svc" .service.ts);
          test -f "apps/api-internal/src/services/${base}.columns.test.ts" ||
          test -f "tests/ddl/${base}.columns.test.ts" ||
          { echo "Missing DDL test for $svc"; exit 1; };
        done
      scope: "."
    severity: "warning"

  - id: "INV-023"
    description: "No camelCase column names in SQL query strings"
    check:
      type: "grep-absent"
      pattern: "query.*['\"`][^'\"]*[a-z][A-Z][a-z].*['\"`]"
      scope: "apps/api-internal/src/services/"
    severity: "error"
    rationale: >
      PostgreSQL column names are snake_case. camelCase in SQL strings
      (e.g., 'applicationStatus' instead of 'application_status') compiles
      but fails at runtime with 'column does not exist'.

  # ── Authorization ──────────────────────────────────────────────────────

  - id: "INV-024"
    description: "No IdP token claims used for authorization decisions"
    check:
      type: "grep-absent"
      pattern: "token\\.roles|claims\\.roles|idToken\\.groups|req\\.oidc\\..*role"
      scope: "apps/"
    severity: "error"
    rationale: >
      Authorization must come from the application database, not IdP tokens.
      Reading roles from tokens means role changes require token re-issuance.

  - id: "INV-025"
    description: "Admin routes are guarded with requireRole('admin')"
    check:
      type: "grep-present"
      pattern: "requireRole.*admin"
      scope: "apps/api-internal/src/routes/admin*"
    severity: "error"

  - id: "INV-026"
    description: "Destructive admin actions have audit entries"
    check:
      type: "grep-present"
      pattern: "audit"
      scope: "apps/api-internal/src/services/role.service.ts"
    severity: "warning"

  # ── Code Quality (ESLint + TypeScript Strict) ──────────────────────────
  #
  # These mirror the live eslint.config.mjs rules. Source files must pass
  # with zero warnings. Test files have relaxed rules by design.

  - id: "INV-027"
    description: "No console.log / console.warn / console.error in source files"
    check:
      type: "grep-absent"
      pattern: "console\\.(log|warn|error|debug|info)"
      scope: "apps/*/src/"
    severity: "error"
    rationale: >
      Source files must use the structured logger (utils/logger.js). console.*
      bypasses log levels, structured fields, and transport destinations.
      Allowed in *.test.ts via eslint override.

  - id: "INV-028"
    description: "No explicit 'any' types in non-test source files"
    check:
      type: "grep-absent"
      pattern: ": any\\b|<any>|as any\\b"
      scope: "apps/*/src/"
    severity: "error"
    rationale: >
      'any' defeats TypeScript's type checking. Use real types, 'unknown',
      or generics. 'any' is permitted only in *.test.ts for mock flexibility.

  - id: "INV-029"
    description: "No unhandled .then() without await (floating promise heuristic)"
    check:
      type: "grep-absent"
      pattern: "^\\s*[a-zA-Z_][a-zA-Z0-9_]*\\.then\\("
      scope: "apps/*/src/"
    severity: "warning"
    rationale: >
      Floating promises are a hard ESLint error. This is a coarse heuristic
      that flags bare .then() calls not assigned or awaited. The authoritative
      check is ESLint no-floating-promises via INV-030.

  - id: "INV-030"
    description: "ESLint passes with zero warnings across the project"
    check:
      type: "command-succeeds"
      pattern: "npm run lint -- --max-warnings 0"
      scope: "."
    severity: "error"
    rationale: >
      Authoritative code-quality gate. Every source file must pass the live
      eslint.config.mjs at project root with zero warnings. Test files carry
      relaxed rules via eslint overrides — source files do not.

  - id: "INV-031"
    description: "Mock user role strings are not template defaults"
    check:
      type: "grep-absent"
      pattern: "roles:\\s*\\[['\"](developer|admin|user)['\"]\\]"
      scope: "packages/auth/src/drivers/mock.driver.ts"
    severity: "error"
    rationale: >
      Template-default roles (developer/admin/user) must be replaced with the
      project's business roles before feature development begins. A mismatch
      between mock users and the role strings used in requireRole()/hasRole()
      guards means every authorization check fails silently (403 on API,
      hidden UI elements).

  - id: "INV-032"
    description: "Mock driver test assertions match actual mock users"
    check:
      type: "command-succeeds"
      pattern: "npm test -w packages/auth --run -- mock.driver.test"
      scope: "."
    severity: "error"
    rationale: >
      mock.driver.test.ts asserts the count, IDs, names, and roles of the
      mock users. When the configurer updates mock users for the project's
      business roles, this test must be updated in lockstep or npm test
      fails stage-wide.
