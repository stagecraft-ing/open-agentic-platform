# ============================================================================
# Next.js + Prisma Adapter — Architecture Invariants
# ============================================================================
#
# Machine-checkable rules. The verification harness runs these after scaffolding.
#
# Each rule: ID, description, check type, pattern/scope, severity.
# ============================================================================

invariants:

  # ── Framework ──────────────────────────────────────────────────────────

  - id: "INV-001"
    description: "App Router only — no pages/ directory"
    check:
      type: "command-succeeds"
      pattern: "! test -d pages/"
      scope: "."
    severity: "error"

  - id: "INV-002"
    description: "No Express — Next.js handles HTTP"
    check:
      type: "grep-absent"
      pattern: "from ['\"]express['\"]|require\\(['\"]express['\"]\\)"
      scope: "src/"
    severity: "error"

  - id: "INV-003"
    description: "Prisma only — no raw pg, no TypeORM, no Drizzle, no Sequelize"
    check:
      type: "grep-absent"
      pattern: "from ['\"]pg['\"]|import.*typeorm|import.*drizzle|import.*sequelize|new Pool\\("
      scope: "src/"
    severity: "error"

  # ── React Conventions ──────────────────────────────────────────────────

  - id: "INV-004"
    description: "Server Components by default — pages do not use 'use client'"
    check:
      type: "grep-absent"
      pattern: "^['\"]use client['\"]"
      scope: "src/app/(app)/*/page.tsx"
    severity: "warning"

  - id: "INV-005"
    description: "Server Actions for mutations — action files use 'use server'"
    check:
      type: "grep-present"
      pattern: "^['\"]use server['\"]"
      scope: "src/app/(app)/*/actions.ts"
    severity: "warning"

  # ── Validation ─────────────────────────────────────────────────────────

  - id: "INV-006"
    description: "Zod for validation — no Joi/Yup/class-validator"
    check:
      type: "grep-absent"
      pattern: "from ['\"]joi['\"]|from ['\"]yup['\"]|from ['\"]class-validator['\"]"
      scope: "src/"
    severity: "error"

  # ── Auth ───────────────────────────────────────────────────────────────

  - id: "INV-007"
    description: "NextAuth.js for auth — no custom JWT"
    check:
      type: "grep-absent"
      pattern: "jsonwebtoken|jwt\\.sign|jwt\\.verify"
      scope: "src/"
    severity: "error"

  # ── Styling ────────────────────────────────────────────────────────────

  - id: "INV-008"
    description: "Tailwind CSS — no CSS modules or styled-components"
    check:
      type: "grep-absent"
      pattern: "\\.module\\.css|styled-components|@emotion"
      scope: "src/"
    severity: "error"

  # ── Security ───────────────────────────────────────────────────────────

  - id: "INV-009"
    description: "No string interpolation in Prisma raw queries"
    check:
      type: "grep-absent"
      pattern: "\\$queryRaw`[^`]*\\$\\{|\\$executeRaw`[^`]*\\$\\{"
      scope: "src/lib/services/"
    severity: "error"

  # ── Build & Quality ────────────────────────────────────────────────────

  - id: "INV-010"
    description: "TypeScript compiles without errors"
    check:
      type: "command-succeeds"
      pattern: "npx tsc --noEmit"
      scope: "."
    severity: "error"

  - id: "INV-011"
    description: "All tests pass"
    check:
      type: "command-succeeds"
      pattern: "npx vitest run"
      scope: "."
    severity: "error"

  - id: "INV-012"
    description: "No unfilled placeholders in source files"
    check:
      type: "grep-absent"
      pattern: "\\{\\{[A-Z_]+\\}\\}"
      scope: "src/"
    severity: "error"
