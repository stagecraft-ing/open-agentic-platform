# ============================================================================
# Build Specification — Site Monitor (matches encore-react adapter)
# ============================================================================
# A simple SaaS app for monitoring website uptime — the kind of app
# the fullstack-app template was designed for.
# ============================================================================

schema_version: "1.0.0"

project:
  name: "site-monitor"
  display_name: "Uptime Monitor"
  org: "acme"
  description: "Monitor website uptime with automated checks, status dashboards, and Slack notifications."
  variant: single-internal

auth:
  audiences:
    user:
      method: session
      provider: "built-in"
      roles:
        - role_code: "user"
          display_name: "User"
          description: "Standard user who monitors sites"
          permissions: ["site:crud", "check:read"]
        - role_code: "admin"
          display_name: "Admin"
          description: "Manages users and system settings"
          permissions: ["site:crud", "check:read", "user:manage", "audit:read"]
  session:
    timeout_minutes: 20160  # 14 days
    persistence: persistent
    store_type_hint: "postgresql"

data_model:
  entities:
    - name: "Site"
      description: "A website URL being monitored"
      fields:
        - { name: "id", type: "integer", primary: true }
        - { name: "url", type: "string", required: true, unique: true, max_length: 2048 }
    - name: "Check"
      description: "A single uptime check result"
      fields:
        - { name: "id", type: "integer", primary: true }
        - { name: "siteId", type: "reference", required: true, ref_entity: "Site", ref_field: "id", ref_on_delete: "cascade" }
        - { name: "up", type: "boolean", required: true }
        - { name: "checkedAt", type: "timestamp", required: true, default: "now" }

business_rules:
  - id: "BR-001"
    name: "Automated hourly checks"
    type: "constraint"
    description: "All sites are checked automatically every hour"
    entities: ["Check"]
    enforced_at: "service"

api:
  base_path: ""
  resources:
    - name: "sites"
      entity: "Site"
      description: "Monitored websites"
      operations:
        - { id: "list-sites", method: "GET", path: "/site.list", audience: ["user"], auth: "required", response: { type: "list", entity: "Site" } }
        - { id: "add-site", method: "POST", path: "/site.add", audience: ["user"], auth: "required", request: { body: { entity: "Site", fields: ["url"] } }, response: { type: "single", entity: "Site" } }
        - { id: "delete-site", method: "POST", path: "/site.del", audience: ["user"], auth: "required", response: { type: "empty" } }
    - name: "monitor"
      entity: "Check"
      description: "Uptime check results"
      operations:
        - { id: "get-status", method: "GET", path: "/monitor.status", audience: ["user"], auth: "required", response: { type: "list", entity: "Check" } }

ui:
  pages:
    - { id: "landing", title: "Home", path: "/", page_type: "landing", audience: "user", view_type: "public", requires_auth: false }
    - { id: "signin", title: "Sign In", path: "/signin", page_type: "login", audience: "user", view_type: "public", requires_auth: false, guest_only: true }
    - { id: "signup", title: "Sign Up", path: "/signup", page_type: "form", audience: "user", view_type: "public", requires_auth: false, guest_only: true }
    - { id: "dashboard", title: "Dashboard", path: "/app", page_type: "dashboard", audience: "user", view_type: "private-authenticated", requires_auth: true, data_sources: [{ operation_id: "list-sites", trigger: "on-load" }, { operation_id: "get-status", trigger: "on-load" }] }
    - { id: "settings", title: "Settings", path: "/app/settings", page_type: "profile", audience: "user", view_type: "private-authenticated", requires_auth: true }
    - { id: "admin-users", title: "Users", path: "/admin/users", page_type: "list", audience: "user", view_type: "private-authenticated", requires_auth: true, required_roles: ["admin"], data_sources: [{ operation_id: "list-users", trigger: "on-load" }] }

audit:
  enabled: true
  tracked_actions:
    - { action_code: "role_change", entities: ["User"], captures: ["new_value"] }
  retention:
    policy: "indefinite"
    immutable: true
