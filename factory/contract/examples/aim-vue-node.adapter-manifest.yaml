# ============================================================================
# Adapter Manifest: AIM Vue+Node Enterprise Template
# ============================================================================
# This is a concrete example of what the first adapter (the current
# GovAlta-Pronghorn/template repository) would declare about itself.
# ============================================================================

schema_version: "1.0.0"

adapter:
  name: "aim-vue-node"
  display_name: "AIM Vue+Node Enterprise Template"
  version: "3.0.0"
  description: "Government enterprise application template with Vue 3 frontend, Express 5 BFF backend, multi-driver authentication, and design system integration."

stack:
  language: "typescript"
  runtime: "node-22"

  backend:
    framework: "express-5"
    description: "Express 5 with Route → Controller → Service pattern. Session-based auth via express-session. Middleware-driven security (Helmet, CSRF, rate limiting, HPP)."

  frontend:
    framework: "vue-3"
    state_management: "pinia"
    design_system: "goa-web-components"
    description: "Vue 3 Composition API with <script setup>. Design system (@abgov/web-components). Pinia for shared state. Vue Router 4 with lazy-loaded views."

  database:
    supported: ["postgresql"]
    migration_tool: "custom-ddl"
    orm: "none"

capabilities:
  dual_stack: true
  bff_pattern: true
  single_stack: true
  session_auth: true
  token_auth: false
  api_key_auth: false
  module_system: true
  file_uploads: true
  background_jobs: false
  realtime: false
  email_notifications: true
  audit_logging: true
  direct_sql: true
  orm_based: false
  api_proxy: true

supported_auth:
  - method: "saml"
    driver: "passport-saml"
    providers: ["gov-citizen-account"]
    description: "SAML 2.0 via @node-saml/passport-saml for citizen-facing apps"
  - method: "oidc"
    driver: "openid-client"
    providers: ["entra-id"]
    description: "OIDC with PKCE via openid-client for staff-facing apps (Microsoft Entra ID)"
  - method: "mock"
    driver: "built-in"
    providers: []
    description: "Mock auth driver for development. Auto-registered in non-production. Blocked in production."

supported_session_stores:
  - type: "redis"
    description: "connect-redis adapter. Used with SAML/public stack."
  - type: "postgresql"
    description: "connect-pg-simple adapter. Used with Entra ID/internal stack."
  - type: "memory"
    description: "In-process store for development only."

commands:
  install: "npm install"
  compile: "npm run build"
  test: "npm test"
  lint: "npm run lint"
  dev: "npm run dev"
  format_check: "npx prettier --check ."
  type_check: "npx tsc --noEmit"
  feature_verify:
    - "npm run build"
    - "npm test"

directory_conventions:
  api_service: "apps/{stack}/src/services/{resource}.service.ts"
  api_controller: "apps/{stack}/src/controllers/{resource}.controller.ts"
  api_route: "apps/{stack}/src/routes/{resource}.routes.ts"
  api_test: "apps/{stack}/src/services/{resource}.service.test.ts"
  api_types: "packages/shared/src/types/{entity}.types.ts"
  api_middleware: "apps/{stack}/src/middleware/{name}.middleware.ts"
  ui_view: "apps/{stack}/src/views/{PageName}View.vue"
  ui_store: "apps/{stack}/src/stores/{resource}.store.ts"
  ui_route_config: "apps/{stack}/src/router/index.ts"
  ui_test: "apps/{stack}/src/views/{PageName}View.test.ts"
  ui_component: "apps/{stack}/src/components/{Name}.vue"
  migration: "database/migrations/{timestamp}_{name}.sql"
  seed: "database/seeds/{name}.sql"
  schema_types: "packages/shared/src/schemas/{entity}.schema.ts"
  env_file: ".env.example"
  env_file_per_stack:
    public: ".env.external.example"
    internal: ".env.internal.example"

patterns:
  api:
    service: "patterns/api/service.md"
    controller: "patterns/api/controller.md"
    route: "patterns/api/route.md"
    test: "patterns/api/test.md"
    middleware: "patterns/api/middleware.md"
    types: "patterns/api/types.md"
  ui:
    view: "patterns/ui/view.md"
    state: "patterns/ui/state.md"
    route: "patterns/ui/route.md"
    test: "patterns/ui/test.md"
    layout: "patterns/ui/layout.md"
    component: "patterns/ui/component.md"
  data:
    migration: "patterns/data/migration.md"
    query: "patterns/data/query.md"
    seed: "patterns/data/seed.md"
    validation_schema: "patterns/data/validation-schema.md"
  page_types:
    landing: "patterns/page-types/landing.md"
    dashboard: "patterns/page-types/dashboard.md"
    list: "patterns/page-types/list.md"
    detail: "patterns/page-types/detail.md"
    form: "patterns/page-types/form.md"
    content: "patterns/page-types/content.md"
    help: "patterns/page-types/help.md"
    profile: "patterns/page-types/profile.md"
    login: "patterns/page-types/login.md"

agents:
  api_scaffolder: "agents/api-scaffolder.md"
  ui_scaffolder: "agents/ui-scaffolder.md"
  data_scaffolder: "agents/data-scaffolder.md"
  configurer: "agents/configurer.md"
  trimmer: "agents/trimmer.md"
  reviewer: "agents/reviewer.md"

scaffold:
  source: "scaffold/"
  description: "Monorepo with apps/ (api, web) and packages/ (shared, config, auth). Module system for pluggable auth drivers and session stores. Design system pre-installed."
  modules:
    single-public:
      - "security-core"
      - "data-redis"
      - "auth-core"
      - "auth-mock"
      - "auth-saml"
      - "session-store-redis"
    single-internal:
      - "security-core"
      - "data-postgres"
      - "auth-core"
      - "auth-mock"
      - "auth-entra-id"
      - "session-store-postgres"
      - "service-auth"
    dual:
      - "security-core"
      - "data-redis"
      - "data-postgres"
      - "auth-core"
      - "auth-mock"
      - "auth-saml"
      - "auth-entra-id"
      - "session-store-redis"
      - "session-store-postgres"
      - "service-auth"
  setup_commands:
    - "npm install"
    - "npx tsx scripts/setup-dual-app.ts --yes --clean"

validation:
  invariants:
    - id: "INV-001"
      description: "No JWT for user sessions — session-based auth only"
      check:
        type: "grep-absent"
        pattern: "jsonwebtoken|jwt\\.sign|jwt\\.verify"
        scope: "apps/"
      severity: "error"

    - id: "INV-002"
      description: "No Vuex — Pinia only for state management"
      check:
        type: "grep-absent"
        pattern: "import.*vuex|from.*vuex"
        scope: "apps/"
      severity: "error"

    - id: "INV-003"
      description: "No ORM — direct SQL only"
      check:
        type: "grep-absent"
        pattern: "import.*prisma|import.*typeorm|import.*sequelize|import.*drizzle"
        scope: "apps/"
      severity: "error"

    - id: "INV-004"
      description: "No Tailwind CSS — design system components only"
      check:
        type: "grep-absent"
        pattern: "tailwindcss|@tailwind"
        scope: "."
      severity: "error"

    - id: "INV-005"
      description: "Vue SFCs use <script setup> — no Options API"
      check:
        type: "grep-absent"
        pattern: "export default defineComponent|export default \\{"
        scope: "apps/web*/src/"
      severity: "error"

    - id: "INV-006"
      description: "Zod for validation — no joi/yup/class-validator"
      check:
        type: "grep-absent"
        pattern: "import.*\\bjoi\\b|import.*\\byup\\b|import.*class-validator"
        scope: "."
      severity: "error"

    - id: "INV-007"
      description: "Public API stack never imports database pool"
      check:
        type: "grep-absent"
        pattern: "getPool|pg\\.Pool|database\\.config"
        scope: "apps/api-public/"
      severity: "error"

    - id: "INV-008"
      description: "All Vue views are lazy-loaded in router"
      check:
        type: "grep-absent"
        pattern: "import.*View from.*views/"
        scope: "apps/web*/src/router/"
      severity: "warning"

    - id: "INV-009"
      description: "Mock auth driver blocked in production"
      check:
        type: "grep-present"
        pattern: "NODE_ENV.*production.*mock|mock.*production.*throw"
        scope: "packages/auth/"
      severity: "error"

dual_stack:
  audience_to_stack:
    citizen: "public"
    staff: "internal"
  stacks:
    public:
      api: "api-public"
      web: "web-public"
      port_api: 3000
      port_web: 5173
    internal:
      api: "api-internal"
      web: "web-internal"
      port_api: 3001
      port_web: 5174
  data_access:
    public: "proxy-only"
    internal: "direct"
