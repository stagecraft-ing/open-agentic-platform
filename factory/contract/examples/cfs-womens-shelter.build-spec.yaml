# ============================================================================
# Build Specification — CFS Women's Shelter Funding Portal
# ============================================================================
#
# Concrete example file that validates the build-spec.schema.yaml schema.
# Populated with real data from the cfs-womens-shelter-funding-portal codebase.
#
# This spec describes WHAT to build — completely technology-free.
# No frameworks, no languages, no components, no file paths.
#
# ============================================================================

schema_version: "1.0.0"


# ─────────────────────────────────────────────────────────────────────────────
# PROJECT
# ─────────────────────────────────────────────────────────────────────────────

project:
  name: "cfs-womens-shelter-funding-portal"
  display_name: "CFS Women's Shelter Funding Portal"
  org: "goa-cfs"
  description: >
    Online portal for women's shelter organizations in Alberta to apply for
    provincial funding through Children and Family Services (CFS). Shelter
    operators submit funding requests with program details, budgets, and
    supporting documents. CFS analysts assess applications using community
    needs data, and managers advance requests through a multi-stage approval
    chain culminating in ministerial sign-off.
  variant: dual
  domain: "children-and-family-services"
  fiscal_context: "2025-2026"


# ─────────────────────────────────────────────────────────────────────────────
# AUTH
# ─────────────────────────────────────────────────────────────────────────────

auth:
  audiences:
    citizen:
      method: saml
      provider: "alberta-ca-account"
      roles:
        - role_code: "applicant"
          display_name: "Shelter Organization Applicant"
          description: "Shelter staff who create and submit funding requests on behalf of their organization"
          permissions:
            - "funding-request:create"
            - "funding-request:read-own"
            - "funding-request:update-own"
            - "funding-request:submit"
            - "program:write-own"
            - "budget:write-own"
            - "document:upload-own"

    staff:
      method: oidc
      provider: "entra-id"
      roles:
        - role_code: "cfs-analyst"
          display_name: "CFS Funding Analyst"
          description: "Reviews and scores funding requests using filter analysis and community needs data"
          permissions:
            - "funding-request:read"
            - "assessment:write"
            - "assessment:finalize"
            - "community-data:read"

        - role_code: "cfs-manager"
          display_name: "CFS Program Manager"
          description: "Reviews analyst assessments and makes preliminary funding decisions"
          permissions:
            - "funding-request:read"
            - "funding-request:transition"
            - "assessment:read"
            - "decision:write-preliminary"
            - "audit:read"
            - "community-data:read"

        - role_code: "cfs-leadership"
          display_name: "CFS Leadership"
          description: "Senior leadership who recommend or advance funding decisions"
          permissions:
            - "funding-request:read"
            - "assessment:read"
            - "decision:write-ministerial"
            - "audit:read"

        - role_code: "minister-office"
          display_name: "Minister's Office"
          description: "Final approval authority for funding requests"
          permissions:
            - "funding-request:read"
            - "decision:write-final"
            - "audit:read"

        - role_code: "system-admin"
          display_name: "System Administrator"
          description: "Manages users, roles, and system configuration"
          permissions:
            - "user:manage"
            - "role:manage"
            - "audit:read"
            - "integration:manage"
            - "funding-request:read"

  service_to_service:
    method: client-credentials
    description: "Public API acquires an OAuth2 client-credentials token to proxy authenticated requests to the internal API"

  session:
    timeout_minutes: 30
    require_recent_auth_for:
      - "funding-request:submit"
      - "decision:write-final"


# ─────────────────────────────────────────────────────────────────────────────
# DATA MODEL
# ─────────────────────────────────────────────────────────────────────────────

data_model:
  entities:
    # ── Organization ──────────────────────────────────────────────────────
    - name: "Organization"
      description: "A women's shelter organization eligible to apply for provincial funding"
      fields:
        - name: "organizationId"
          type: uuid
          primary: true
          required: true
          default: "uuid"
        - name: "organizationName"
          type: string
          required: true
          max_length: 200
        - name: "legalEntityType"
          type: string
          required: true
          max_length: 100
        - name: "yearEstablished"
          type: integer
          required: true
        - name: "registrationNumber"
          type: string
          required: true
          max_length: 50
        - name: "charitableRegNumber"
          type: string
          required: false
          max_length: 50
        - name: "websiteUrl"
          type: string
          required: false
          max_length: 500
        - name: "orgAddrStreet"
          type: string
          required: true
          max_length: 200
        - name: "orgAddrCity"
          type: string
          required: true
          max_length: 100
        - name: "orgAddrProvince"
          type: string
          required: true
          max_length: 50
        - name: "orgAddrPostalCode"
          type: string
          required: true
          max_length: 10
        - name: "createdAt"
          type: timestamp
          required: true
          default: "now"
        - name: "updatedAt"
          type: timestamp
          required: true
          default: "now"
      business_rules:
        - "BR-003"
        - "BR-005"

    # ── OrganizationContact ───────────────────────────────────────────────
    - name: "OrganizationContact"
      description: "A named contact person for a shelter organization (legal representative or primary contact)"
      fields:
        - name: "contactId"
          type: uuid
          primary: true
          required: true
          default: "uuid"
        - name: "organizationId"
          type: reference
          required: true
          ref_entity: "Organization"
          ref_field: "organizationId"
          ref_on_delete: cascade
        - name: "contactRole"
          type: enum
          required: true
          enum_values:
            - "legal_representative"
            - "primary_contact"
        - name: "contactName"
          type: string
          required: true
          max_length: 200
        - name: "contactTitle"
          type: string
          required: true
          max_length: 100
        - name: "contactEmail"
          type: string
          required: true
          max_length: 200
        - name: "contactPhone"
          type: string
          required: true
          max_length: 30
        - name: "addrStreet"
          type: string
          required: false
          max_length: 200
        - name: "addrCity"
          type: string
          required: false
          max_length: 100
        - name: "addrProvince"
          type: string
          required: false
          max_length: 50
        - name: "addrPostalCode"
          type: string
          required: false
          max_length: 10
      unique_constraints:
        - fields: ["organizationId", "contactRole"]
          name: "uq_org_contact_role"
      business_rules:
        - "BR-005"

    # ── FundingRequest ────────────────────────────────────────────────────
    - name: "FundingRequest"
      description: "A funding application submitted by a shelter organization for a specific fiscal year"
      fields:
        - name: "requestId"
          type: uuid
          primary: true
          required: true
          default: "uuid"
        - name: "organizationId"
          type: reference
          required: true
          ref_entity: "Organization"
          ref_field: "organizationId"
          ref_on_delete: restrict
        - name: "submittedBy"
          type: reference
          required: false
          ref_entity: "PortalUser"
          ref_field: "userId"
          ref_on_delete: set-null
        - name: "requestType"
          type: enum
          required: true
          enum_values:
            - "base-funding-renewal"
            - "new-operational-funding"
            - "expanded-services"
            - "capital-maintenance"
        - name: "requestStatus"
          type: enum
          required: true
          default: "draft"
          enum_values:
            - "draft"
            - "submitted"
            - "under-review"
            - "information-requested"
            - "evaluated"
            - "recommended"
            - "approved"
            - "denied"
            - "withdrawn"
        - name: "fiscalYear"
          type: string
          required: true
          max_length: 9
        - name: "requestedFundingAmount"
          type: decimal
          required: true
          precision: 14
          scale: 2
        - name: "proposedProgramName"
          type: string
          required: true
          max_length: 200
        - name: "proposedStartDate"
          type: date
          required: false
        - name: "justification"
          type: text
          required: true
        - name: "communityNeedEvidence"
          type: text
          required: false
        - name: "submissionDate"
          type: timestamp
          required: false
        - name: "createdAt"
          type: timestamp
          required: true
          default: "now"
        - name: "updatedAt"
          type: timestamp
          required: true
          default: "now"
      check_constraints:
        - name: "ck_fiscal_year_format"
          description: "Fiscal year must be in YYYY-YYYY format (e.g. 2025-2026)"
        - name: "ck_requested_amount_positive"
          description: "Requested funding amount must be greater than zero"
      indexes:
        - fields: ["organizationId"]
          unique: false
        - fields: ["requestStatus"]
          unique: false
        - fields: ["fiscalYear"]
          unique: false
      business_rules:
        - "BR-001"
        - "BR-002"
        - "BR-003"
        - "BR-007"

    # ── Assessment ────────────────────────────────────────────────────────
    - name: "Assessment"
      description: "An analyst's evaluation of a funding request, including filter analysis responses and a composite score"
      fields:
        - name: "assessmentId"
          type: uuid
          primary: true
          required: true
          default: "uuid"
        - name: "requestId"
          type: reference
          required: true
          ref_entity: "FundingRequest"
          ref_field: "requestId"
          ref_on_delete: cascade
        - name: "analystUserId"
          type: reference
          required: true
          ref_entity: "PortalUser"
          ref_field: "userId"
          ref_on_delete: restrict
        - name: "communityNeedScore"
          type: decimal
          required: false
          precision: 5
          scale: 2
        - name: "organizationScore"
          type: decimal
          required: false
          precision: 5
          scale: 2
        - name: "serviceGapScore"
          type: decimal
          required: false
          precision: 5
          scale: 2
        - name: "compositeScore"
          type: decimal
          required: false
          precision: 5
          scale: 2
        - name: "recommendation"
          type: text
          required: false
        - name: "analystNotes"
          type: text
          required: false
        - name: "status"
          type: enum
          required: true
          default: "draft"
          enum_values:
            - "draft"
            - "finalized"
        - name: "createdAt"
          type: timestamp
          required: true
          default: "now"
        - name: "updatedAt"
          type: timestamp
          required: true
          default: "now"
      indexes:
        - fields: ["requestId"]
          unique: true
      business_rules:
        - "BR-012"
        - "BR-014"

    # ── DecisionRecord ────────────────────────────────────────────────────
    - name: "DecisionRecord"
      description: "A funding decision at a specific stage of the approval chain (preliminary, ministerial review, or final)"
      fields:
        - name: "decisionId"
          type: uuid
          primary: true
          required: true
          default: "uuid"
        - name: "requestId"
          type: reference
          required: true
          ref_entity: "FundingRequest"
          ref_field: "requestId"
          ref_on_delete: cascade
        - name: "decisionType"
          type: enum
          required: true
          enum_values:
            - "preliminary"
            - "ministerial_review"
            - "final"
        - name: "decisionOutcome"
          type: enum
          required: true
          enum_values:
            - "approved"
            - "denied"
            - "deferred"
            - "returned"
        - name: "approvedAmount"
          type: decimal
          required: false
          precision: 14
          scale: 2
        - name: "decisionRationale"
          type: text
          required: true
        - name: "conditionsText"
          type: text
          required: false
        - name: "decidedByUserId"
          type: reference
          required: true
          ref_entity: "PortalUser"
          ref_field: "userId"
          ref_on_delete: restrict
        - name: "decisionDate"
          type: timestamp
          required: true
          default: "now"
        - name: "createdAt"
          type: timestamp
          required: true
          default: "now"
      indexes:
        - fields: ["requestId"]
          unique: false
      business_rules:
        - "BR-010"
        - "BR-011"

    # ── PortalUser ────────────────────────────────────────────────────────
    - name: "PortalUser"
      description: "A user who accesses the portal, either a shelter applicant (citizen) or CFS staff member"
      fields:
        - name: "userId"
          type: uuid
          primary: true
          required: true
        - name: "userEmail"
          type: string
          required: true
          max_length: 200
          unique: true
        - name: "userDisplayName"
          type: string
          required: true
          max_length: 200
        - name: "organizationId"
          type: reference
          required: false
          ref_entity: "Organization"
          ref_field: "organizationId"
          ref_on_delete: set-null
        - name: "userIsActive"
          type: boolean
          required: true
          default: true
        - name: "userLastLogin"
          type: timestamp
          required: false
        - name: "createdAt"
          type: timestamp
          required: true
          default: "now"
        - name: "updatedAt"
          type: timestamp
          required: true
          default: "now"
      business_rules:
        - "BR-008"

    # ── UserRole ──────────────────────────────────────────────────────────
    - name: "UserRole"
      description: "Junction entity assigning one or more roles to a portal user"
      fields:
        - name: "userId"
          type: reference
          required: true
          ref_entity: "PortalUser"
          ref_field: "userId"
          ref_on_delete: cascade
        - name: "roleCode"
          type: enum
          required: true
          enum_values:
            - "applicant"
            - "cfs-analyst"
            - "cfs-manager"
            - "cfs-leadership"
            - "minister-office"
            - "system-admin"
      unique_constraints:
        - fields: ["userId", "roleCode"]
          name: "uq_user_role"
      business_rules:
        - "BR-008"

    # ── SupportingDocument ────────────────────────────────────────────────
    - name: "SupportingDocument"
      description: "A file attached to a funding request (e.g. budget spreadsheets, org charts, community evidence)"
      fields:
        - name: "documentId"
          type: uuid
          primary: true
          required: true
          default: "uuid"
        - name: "requestId"
          type: reference
          required: true
          ref_entity: "FundingRequest"
          ref_field: "requestId"
          ref_on_delete: cascade
        - name: "documentType"
          type: string
          required: true
          max_length: 100
        - name: "fileName"
          type: string
          required: true
          max_length: 500
        - name: "fileSizeBytes"
          type: integer
          required: true
        - name: "mimeType"
          type: string
          required: true
          max_length: 100
        - name: "storageReference"
          type: string
          required: false
          max_length: 1000
        - name: "virusScanStatus"
          type: enum
          required: true
          default: "pending"
          enum_values:
            - "pending"
            - "clean"
            - "infected"
            - "error"
        - name: "uploadDate"
          type: timestamp
          required: true
          default: "now"
        - name: "uploadedByUserId"
          type: reference
          required: true
          ref_entity: "PortalUser"
          ref_field: "userId"
          ref_on_delete: restrict
      business_rules:
        - "BR-006"

    # ── AuditEntry ────────────────────────────────────────────────────────
    - name: "AuditEntry"
      description: "Immutable audit log entry tracking every significant action in the system"
      fields:
        - name: "auditId"
          type: uuid
          primary: true
          required: true
          default: "uuid"
        - name: "userId"
          type: reference
          required: true
          ref_entity: "PortalUser"
          ref_field: "userId"
          ref_on_delete: restrict
        - name: "actionCode"
          type: enum
          required: true
          enum_values:
            - "create"
            - "update"
            - "delete"
            - "status-change"
            - "role-change"
            - "assess"
            - "upload"
        - name: "entityType"
          type: string
          required: true
          max_length: 100
        - name: "entityId"
          type: string
          required: true
          max_length: 100
        - name: "newValue"
          type: text
          required: false
        - name: "actionTimestamp"
          type: timestamp
          required: true
          default: "now"
        - name: "ipAddress"
          type: string
          required: true
          max_length: 50
      indexes:
        - fields: ["entityType", "entityId"]
          unique: false
        - fields: ["userId"]
          unique: false
        - fields: ["actionTimestamp"]
          unique: false
      business_rules:
        - "BR-017"
        - "BR-018"

    # ── LocalGeographicArea ───────────────────────────────────────────────
    - name: "LocalGeographicArea"
      description: "An Alberta local geographic area (LGA) with community needs data sourced from Infomart"
      fields:
        - name: "lgaCode"
          type: string
          primary: true
          required: true
          max_length: 20
        - name: "lgaName"
          type: string
          required: true
          max_length: 200
        - name: "lgaRegion"
          type: string
          required: true
          max_length: 100
        - name: "lgaType"
          type: string
          required: true
          max_length: 50
        - name: "treatyArea"
          type: string
          required: false
          max_length: 200
        - name: "lgaPopulation"
          type: integer
          required: true
          default: 0
        - name: "lastUpdated"
          type: timestamp
          required: false
      business_rules:
        - "BR-015"
        - "BR-016"

    # ── Program ───────────────────────────────────────────────────────────
    - name: "Program"
      description: "A shelter program within a funding request (e.g., emergency housing, counselling, outreach)"
      fields:
        - name: "programId"
          type: uuid
          primary: true
          required: true
          default: "uuid"
        - name: "requestId"
          type: reference
          required: true
          ref_entity: "FundingRequest"
          ref_field: "requestId"
          ref_on_delete: cascade
        - name: "programType"
          type: string
          required: true
          max_length: 100
        - name: "fundedBeds"
          type: integer
          required: false
        - name: "unfundedBeds"
          type: integer
          required: false
        - name: "fundedUnits"
          type: integer
          required: false
        - name: "unfundedUnits"
          type: integer
          required: false
        - name: "createdAt"
          type: timestamp
          required: true
          default: "now"
        - name: "updatedAt"
          type: timestamp
          required: true
          default: "now"
      business_rules:
        - "BR-009"

    # ── Budget ────────────────────────────────────────────────────────────
    - name: "Budget"
      description: "Startup and annual cost budget for a funding request, with line-item categories"
      fields:
        - name: "budgetId"
          type: uuid
          primary: true
          required: true
          default: "uuid"
        - name: "requestId"
          type: reference
          required: true
          ref_entity: "FundingRequest"
          ref_field: "requestId"
          ref_on_delete: cascade
        - name: "startupSalaries"
          type: decimal
          required: false
        - name: "startupBenefits"
          type: decimal
          required: false
        - name: "startupTravel"
          type: decimal
          required: false
        - name: "startupEquipment"
          type: decimal
          required: false
        - name: "startupSupplies"
          type: decimal
          required: false
        - name: "startupContracts"
          type: decimal
          required: false
        - name: "startupOther"
          type: decimal
          required: false
        - name: "startupOtherDescription"
          type: string
          required: false
          max_length: 500
        - name: "annualSalaries"
          type: decimal
          required: false
        - name: "annualBenefits"
          type: decimal
          required: false
        - name: "annualTravel"
          type: decimal
          required: false
        - name: "annualEquipment"
          type: decimal
          required: false
        - name: "annualSupplies"
          type: decimal
          required: false
        - name: "annualContracts"
          type: decimal
          required: false
        - name: "annualOther"
          type: decimal
          required: false
        - name: "annualOtherDescription"
          type: string
          required: false
          max_length: 500
        - name: "createdAt"
          type: timestamp
          required: true
          default: "now"
        - name: "updatedAt"
          type: timestamp
          required: true
          default: "now"
      business_rules:
        - "BR-010"

    # ── FilterAnalysisResponse ────────────────────────────────────────────
    - name: "FilterAnalysisResponse"
      description: "An analyst's response to a filter analysis question during assessment"
      fields:
        - name: "responseId"
          type: uuid
          primary: true
          required: true
          default: "uuid"
        - name: "assessmentId"
          type: reference
          required: true
          ref_entity: "Assessment"
          ref_field: "assessmentId"
          ref_on_delete: cascade
        - name: "questionId"
          type: string
          required: true
          max_length: 100
        - name: "answer"
          type: string
          required: true
          max_length: 20
          enum_values:
            - "yes"
            - "no"
            - "more-info"
        - name: "notes"
          type: text
          required: false
        - name: "createdAt"
          type: timestamp
          required: true
          default: "now"
        - name: "updatedAt"
          type: timestamp
          required: true
          default: "now"
      business_rules:
        - "BR-012"

    # ── LgaIndicatorValue ─────────────────────────────────────────────────
    - name: "LgaIndicatorValue"
      description: "A community needs indicator value for a Local Geographic Area"
      fields:
        - name: "indicatorValueId"
          type: integer
          primary: true
          required: true
        - name: "lgaCode"
          type: string
          required: true
          max_length: 20
        - name: "indicatorDefinitionId"
          type: string
          required: true
          max_length: 30
        - name: "dataYear"
          type: integer
          required: false
        - name: "dataSource"
          type: string
          required: false
          max_length: 200
        - name: "rawValue"
          type: decimal
          required: false
        - name: "scoreValue"
          type: decimal
          required: false
        - name: "scoreColour"
          type: string
          required: false
          max_length: 10
          enum_values:
            - "green"
            - "amber"
            - "red"
            - "ignore"
        - name: "isSuppressed"
          type: boolean
          required: true
          default: "false"
        - name: "isMissingData"
          type: boolean
          required: true
          default: "false"
      business_rules:
        - "BR-015"
        - "BR-016"

    # ── LgaCompositeScore ─────────────────────────────────────────────────
    - name: "LgaCompositeScore"
      description: "Composite community needs score for a Local Geographic Area"
      fields:
        - name: "scoreId"
          type: integer
          primary: true
          required: true
        - name: "lgaCode"
          type: string
          required: true
          max_length: 20
        - name: "scoreDimension"
          type: string
          required: true
          max_length: 50
        - name: "numericValue"
          type: decimal
          required: true
        - name: "letterGrade"
          type: string
          required: true
          max_length: 5
        - name: "scoreDate"
          type: date
          required: true

    # ── ApprovalChainEntry ────────────────────────────────────────────────
    - name: "ApprovalChainEntry"
      description: "An entry in the approval chain recording who approved a funding request at each stage"
      fields:
        - name: "chainId"
          type: uuid
          primary: true
          required: true
          default: "uuid"
        - name: "requestId"
          type: reference
          required: true
          ref_entity: "FundingRequest"
          ref_field: "requestId"
          ref_on_delete: cascade
        - name: "approverUserId"
          type: reference
          required: true
          ref_entity: "PortalUser"
          ref_field: "userId"
        - name: "decisionType"
          type: string
          required: true
          max_length: 30
          enum_values:
            - "preliminary"
            - "ministerial_review"
            - "final"
        - name: "approvedAt"
          type: timestamp
          required: true
          default: "now"
      business_rules:
        - "BR-011"

    # ── SystemConfiguration ───────────────────────────────────────────────
    - name: "SystemConfiguration"
      description: "Key-value system configuration store for runtime settings like submission windows"
      fields:
        - name: "configKey"
          type: string
          primary: true
          required: true
          max_length: 100
        - name: "configValue"
          type: text
          required: true
      business_rules:
        - "BR-002"

  relationships:
    - type: one-to-many
      from: "Organization"
      to: "OrganizationContact"
      description: "An organization has one or more contacts (legal representative plus optional primary contact)"

    - type: one-to-many
      from: "Organization"
      to: "FundingRequest"
      description: "An organization may submit multiple funding requests across fiscal years"

    - type: one-to-many
      from: "FundingRequest"
      to: "SupportingDocument"
      description: "A funding request may include multiple supporting documents"

    - type: one-to-one
      from: "FundingRequest"
      to: "Assessment"
      description: "Each funding request has at most one assessment record created by a CFS analyst"

    - type: one-to-many
      from: "FundingRequest"
      to: "DecisionRecord"
      description: "A funding request may have multiple sequential decision records (preliminary, ministerial, final)"

    - type: many-to-many
      from: "PortalUser"
      to: "Organization"
      through: "UserRole"
      description: "Users are linked to roles; applicant-role users are associated with an organization"


# ─────────────────────────────────────────────────────────────────────────────
# BUSINESS RULES
# ─────────────────────────────────────────────────────────────────────────────

business_rules:
  - id: "BR-001"
    name: "Part B Community Need Evidence"
    description: >
      Funding requests of type new-operational-funding, expanded-services, or
      capital-maintenance (Part B) require the communityNeedEvidence field to
      be populated before the request can be submitted.
    type: validation
    enforced_at: service
    entities: ["FundingRequest"]
    condition: "requestType in [new-operational-funding, expanded-services, capital-maintenance]"
    message: "Community need evidence is required for Part B funding requests"

  - id: "BR-002"
    name: "Submission Window"
    description: >
      A funding request may only transition to submitted status during the
      configured submission window for its fiscal year. The window open and
      close dates are stored in SystemConfiguration.
    type: constraint
    enforced_at: service
    entities: ["FundingRequest", "SystemConfiguration"]

  - id: "BR-003"
    name: "Organization Eligibility"
    description: >
      An organization must have been established for at least one year
      (current year minus yearEstablished >= 1) before it may submit a
      funding request.
    type: validation
    enforced_at: service
    entities: ["Organization", "FundingRequest"]
    condition: "currentYear - organization.yearEstablished >= 1"
    message: "Organization must be established for at least 1 year before submitting a funding request"

  - id: "BR-005"
    name: "Legal Representative Required"
    description: >
      Every organization must have a contact with contactRole =
      'legal_representative' before a funding request can be submitted.
    type: validation
    enforced_at: service
    entities: ["OrganizationContact"]
    condition: "Organization must have at least one contact where contactRole = legal_representative"
    message: "A legal representative contact is required for the organization"

  - id: "BR-006"
    name: "Document Validation"
    description: >
      Supporting documents must pass file type validation (permitted MIME
      types), maximum file size limits, and virus scanning before they
      become available for download. Documents with virusScanStatus =
      'infected' are quarantined and cannot be downloaded.
    type: validation
    enforced_at: both
    entities: ["SupportingDocument"]

  - id: "BR-007"
    name: "Funding Request State Machine"
    description: >
      The funding request lifecycle follows a strict state machine.
      Transitions are role-gated and condition-dependent. Only forward
      transitions are allowed (no skipping stages). Withdrawal is
      permitted from any non-terminal state.
    type: state-machine
    enforced_at: service
    entities: ["FundingRequest"]
    states:
      - "draft"
      - "submitted"
      - "under-review"
      - "information-requested"
      - "evaluated"
      - "recommended"
      - "approved"
      - "denied"
      - "withdrawn"
    transitions:
      - from: "draft"
        to: ["submitted", "withdrawn"]
        requires_role: ["applicant"]
        conditions:
          - "All required fields populated"
          - "BR-001: Part B evidence present if applicable"
          - "BR-002: Within submission window"
          - "BR-003: Organization established >= 1 year"
          - "BR-005: Legal representative contact exists"
      - from: "submitted"
        to: ["under-review", "withdrawn"]
        requires_role: ["cfs-analyst", "cfs-manager"]
        conditions:
          - "Request has been assigned to an analyst"
      - from: "under-review"
        to: ["information-requested", "evaluated", "withdrawn"]
        requires_role: ["cfs-analyst"]
        conditions:
          - "To evaluated: assessment must be finalized with composite score"
      - from: "information-requested"
        to: ["under-review", "withdrawn"]
        requires_role: ["applicant", "cfs-analyst"]
        conditions:
          - "Applicant has responded to the information request"
      - from: "evaluated"
        to: ["recommended", "withdrawn"]
        requires_role: ["cfs-manager"]
        conditions:
          - "Manager has reviewed the finalized assessment"
      - from: "recommended"
        to: ["approved", "denied"]
        requires_role: ["cfs-leadership", "minister-office"]
        conditions:
          - "BR-011: Decision sequence respected (preliminary before ministerial before final)"
          - "BR-010: Approved amount does not exceed requested amount"
    terminal_states:
      - "approved"
      - "denied"
      - "withdrawn"

  - id: "BR-008"
    name: "Role-Based Access Control"
    description: >
      All API operations enforce role-based access. Citizens (applicant
      role) may only access their own organization's data. Staff roles are
      hierarchical: analysts can assess, managers can decide (preliminary),
      leadership and minister-office can decide (final). System-admin
      manages users and roles.
    type: authorization
    enforced_at: service
    entities: ["PortalUser", "UserRole"]

  - id: "BR-009"
    name: "Funded Beds for Emergency Shelter Programs"
    description: >
      Programs with programType = 'emergency-shelter' must specify a
      fundedBeds value greater than zero.
    type: validation
    enforced_at: service
    entities: ["Program"]
    condition: "programType = emergency-shelter"
    message: "Funded beds count is required for emergency shelter programs"

  - id: "BR-010"
    name: "Approved Amount Ceiling"
    description: >
      The approvedAmount on a DecisionRecord must not exceed the
      requestedFundingAmount on the associated FundingRequest.
    type: constraint
    enforced_at: service
    entities: ["DecisionRecord", "FundingRequest"]

  - id: "BR-011"
    name: "Decision Sequence"
    description: >
      Decision types must follow a strict sequence: preliminary, then
      ministerial_review, then final. A ministerial_review decision
      requires a prior preliminary decision. A final decision requires
      a prior ministerial_review decision.
    type: constraint
    enforced_at: service
    entities: ["DecisionRecord"]

  - id: "BR-012"
    name: "Filter Notes Required"
    description: >
      When a filter analysis response answer is 'no' or 'more-info',
      the analyst must provide explanatory notes.
    type: validation
    enforced_at: service
    entities: ["FilterAnalysisResponse"]
    condition: "answer in [no, more-info]"
    message: "Notes are required when answer is 'no' or 'more-info'"

  - id: "BR-014"
    name: "Composite Score Formula"
    description: >
      The assessment composite score is a weighted average of three
      dimension scores: community need (40%), organization capacity
      (30%), and service gap (30%). The result is rounded to two
      decimal places.
    type: computation
    enforced_at: service
    entities: ["Assessment"]
    formula: "compositeScore = (communityNeedScore * 0.40) + (organizationScore * 0.30) + (serviceGapScore * 0.30)"
    inputs:
      - "communityNeedScore"
      - "organizationScore"
      - "serviceGapScore"
    output: "compositeScore"

  - id: "BR-015"
    name: "Privacy Suppression"
    description: >
      LGA indicator score values for communities with population below
      40 are replaced with a proxy value of 4.5 to prevent
      re-identification of individuals in small communities.
    type: privacy
    enforced_at: service
    entities: ["LgaIndicatorValue", "LocalGeographicArea"]

  - id: "BR-016"
    name: "Zero Substitution"
    description: >
      When an LGA indicator raw value is null (missing data), the
      score value is substituted with zero during Infomart data
      ingestion.
    type: computation
    enforced_at: service
    entities: ["LgaIndicatorValue"]
    formula: "scoreValue = rawValue ?? 0"
    inputs: ["rawValue"]
    output: "scoreValue"

  - id: "BR-017"
    name: "Immutable Audit Trail"
    description: >
      Once an audit entry is created, it cannot be modified or deleted.
      No UPDATE or DELETE operations are permitted on AuditEntry records.
    type: constraint
    enforced_at: both
    entities: ["AuditEntry"]

  - id: "BR-018"
    name: "Seven-Year Retention"
    description: >
      All audit records must be retained for a minimum of seven years
      from the action timestamp, in compliance with government records
      management policy.
    type: retention
    enforced_at: database
    entities: ["AuditEntry"]


# ─────────────────────────────────────────────────────────────────────────────
# API
# ─────────────────────────────────────────────────────────────────────────────

api:
  base_path: "/api/v1"

  resources:
    # ── Organizations ─────────────────────────────────────────────────────
    - name: "organizations"
      entity: "Organization"
      description: "Manage shelter organizations and their contacts"
      operations:
        - id: "list-organizations"
          method: GET
          path: "/"
          description: "List all organizations with pagination"
          audience: ["citizen", "staff"]
          auth: required
          required_roles: []
          stack: internal
          request:
            query:
              - name: "page"
                type: "integer"
                required: false
                description: "Page number (default 1)"
              - name: "limit"
                type: "integer"
                required: false
                description: "Results per page (default 20)"
          response:
            type: paginated
            entity: "Organization"

        - id: "create-organization"
          method: POST
          path: "/"
          description: "Register a new shelter organization"
          audience: ["citizen"]
          auth: required
          required_roles: ["applicant"]
          stack: both
          request:
            body:
              entity: "Organization"
              fields:
                - "organizationName"
                - "legalEntityType"
                - "yearEstablished"
                - "registrationNumber"
                - "charitableRegNumber"
                - "websiteUrl"
                - "orgAddrStreet"
                - "orgAddrCity"
                - "orgAddrProvince"
                - "orgAddrPostalCode"
          response:
            type: single
            entity: "Organization"

        - id: "get-organization"
          method: GET
          path: "/:id"
          description: "Get an organization by ID, including its contacts"
          audience: ["citizen", "staff"]
          auth: required
          required_roles: []
          stack: internal
          request:
            params:
              - name: "id"
                type: "uuid"
                description: "Organization ID"
          response:
            type: single
            entity: "Organization"

        - id: "update-organization"
          method: PATCH
          path: "/:id"
          description: "Update organization details"
          audience: ["citizen"]
          auth: required
          required_roles: ["applicant"]
          stack: both
          request:
            params:
              - name: "id"
                type: "uuid"
                description: "Organization ID"
            body:
              entity: "Organization"
              fields:
                - "organizationName"
                - "legalEntityType"
                - "yearEstablished"
                - "registrationNumber"
                - "charitableRegNumber"
                - "websiteUrl"
                - "orgAddrStreet"
                - "orgAddrCity"
                - "orgAddrProvince"
                - "orgAddrPostalCode"
          response:
            type: single
            entity: "Organization"

        - id: "upsert-organization-contact"
          method: PUT
          path: "/:id/contacts"
          description: "Create or update a contact for the organization (upsert by contactRole)"
          audience: ["citizen"]
          auth: required
          required_roles: ["applicant"]
          stack: both
          request:
            params:
              - name: "id"
                type: "uuid"
                description: "Organization ID"
            body:
              entity: "OrganizationContact"
              fields:
                - "contactRole"
                - "contactName"
                - "contactTitle"
                - "contactEmail"
                - "contactPhone"
                - "addrStreet"
                - "addrCity"
                - "addrProvince"
                - "addrPostalCode"
          response:
            type: empty
          business_rules: ["BR-005"]

    # ── Funding Requests ──────────────────────────────────────────────────
    - name: "funding-requests"
      entity: "FundingRequest"
      description: "Create, update, list, and transition funding requests through the approval lifecycle"
      operations:
        - id: "list-funding-requests"
          method: GET
          path: "/"
          description: "List funding requests with filters for status, organization, and fiscal year"
          audience: ["citizen", "staff"]
          auth: required
          required_roles: []
          stack: internal
          request:
            query:
              - name: "organizationId"
                type: "uuid"
                required: false
                description: "Filter by organization"
              - name: "status"
                type: "string"
                required: false
                description: "Filter by request status"
              - name: "fiscalYear"
                type: "string"
                required: false
                description: "Filter by fiscal year"
              - name: "page"
                type: "integer"
                required: false
                description: "Page number"
              - name: "limit"
                type: "integer"
                required: false
                description: "Results per page"
          response:
            type: paginated
            entity: "FundingRequest"

        - id: "create-funding-request"
          method: POST
          path: "/"
          description: "Create a new funding request in draft status"
          audience: ["citizen"]
          auth: required
          required_roles: ["applicant"]
          stack: both
          request:
            body:
              entity: "FundingRequest"
              fields:
                - "organizationId"
                - "requestType"
                - "fiscalYear"
                - "requestedFundingAmount"
                - "proposedProgramName"
                - "justification"
                - "proposedStartDate"
                - "communityNeedEvidence"
          response:
            type: single
            entity: "FundingRequest"
          business_rules: ["BR-001"]

        - id: "get-funding-request"
          method: GET
          path: "/:id"
          description: "Get a single funding request by ID"
          audience: ["citizen", "staff"]
          auth: required
          required_roles: []
          stack: internal
          request:
            params:
              - name: "id"
                type: "uuid"
                description: "Funding request ID"
          response:
            type: single
            entity: "FundingRequest"

        - id: "update-funding-request"
          method: PATCH
          path: "/:id"
          description: "Update a draft funding request (only editable in draft status)"
          audience: ["citizen"]
          auth: required
          required_roles: ["applicant"]
          stack: both
          request:
            params:
              - name: "id"
                type: "uuid"
                description: "Funding request ID"
            body:
              entity: "FundingRequest"
              fields:
                - "requestType"
                - "fiscalYear"
                - "requestedFundingAmount"
                - "proposedProgramName"
                - "justification"
                - "proposedStartDate"
                - "communityNeedEvidence"
          response:
            type: single
            entity: "FundingRequest"

        - id: "transition-funding-request"
          method: POST
          path: "/:id/transitions"
          description: "Advance the funding request to a new status per the BR-007 state machine"
          audience: ["citizen", "staff"]
          auth: required
          required_roles: []
          stack: both
          request:
            params:
              - name: "id"
                type: "uuid"
                description: "Funding request ID"
            body:
              schema:
                toStatus:
                  type: "string"
                  description: "Target status to transition to"
                notes:
                  type: "string"
                  description: "Optional notes for the transition"
          response:
            type: single
            entity: "FundingRequest"
          business_rules: ["BR-001", "BR-002", "BR-003", "BR-007"]

    # ── Assessments (nested under funding-requests) ───────────────────────
    - name: "assessments"
      entity: "Assessment"
      description: "Analyst evaluation of a funding request"
      parent:
        resource: "funding-requests"
        param: "requestId"
      operations:
        - id: "get-or-create-assessment"
          method: POST
          path: "/"
          description: "Get the existing assessment or create a new draft assessment for the funding request"
          audience: ["staff"]
          auth: required
          required_roles: ["cfs-analyst"]
          stack: internal
          response:
            type: single
            entity: "Assessment"

        - id: "get-assessment"
          method: GET
          path: "/"
          description: "Get the assessment for a funding request"
          audience: ["staff"]
          auth: required
          required_roles: ["cfs-analyst", "cfs-manager", "cfs-leadership"]
          stack: internal
          response:
            type: single
            entity: "Assessment"

        - id: "upsert-filter-response"
          method: PUT
          path: "/filter-responses"
          description: "Create or update a filter analysis response for the assessment"
          audience: ["staff"]
          auth: required
          required_roles: ["cfs-analyst"]
          stack: internal
          request:
            body:
              schema:
                questionId:
                  type: "string"
                  description: "Filter question identifier"
                answer:
                  type: "string"
                  description: "Response: yes, no, or more-info"
                notes:
                  type: "string"
                  description: "Required when answer is no or more-info"
                evidenceDocumentIds:
                  type: "array"
                  description: "Document IDs supporting this response"
          response:
            type: empty
          business_rules: ["BR-012"]

        - id: "score-assessment"
          method: POST
          path: "/score"
          description: "Record dimension scores and compute the composite score per BR-014"
          audience: ["staff"]
          auth: required
          required_roles: ["cfs-analyst"]
          stack: internal
          request:
            body:
              schema:
                communityNeedScore:
                  type: "decimal"
                  description: "Community need dimension score"
                organizationScore:
                  type: "decimal"
                  description: "Organization capacity dimension score"
                serviceGapScore:
                  type: "decimal"
                  description: "Service gap dimension score"
                recommendation:
                  type: "string"
                  description: "Analyst recommendation text"
                analystNotes:
                  type: "string"
                  description: "Additional notes"
          response:
            type: single
            entity: "Assessment"
          business_rules: ["BR-014"]

        - id: "finalize-assessment"
          method: POST
          path: "/finalize"
          description: "Lock the assessment and advance the funding request to evaluated status"
          audience: ["staff"]
          auth: required
          required_roles: ["cfs-analyst"]
          stack: internal
          response:
            type: single
            entity: "Assessment"
          business_rules: ["BR-007"]

    # ── Decisions (nested under funding-requests) ─────────────────────────
    - name: "decisions"
      entity: "DecisionRecord"
      description: "Funding decisions at each stage of the approval chain"
      parent:
        resource: "funding-requests"
        param: "requestId"
      operations:
        - id: "list-decisions"
          method: GET
          path: "/"
          description: "List all decision records for a funding request"
          audience: ["staff"]
          auth: required
          required_roles: ["cfs-manager", "cfs-leadership", "minister-office"]
          stack: internal
          response:
            type: list
            entity: "DecisionRecord"

        - id: "create-decision"
          method: POST
          path: "/"
          description: "Record a funding decision (preliminary, ministerial, or final)"
          audience: ["staff"]
          auth: required
          required_roles: ["cfs-manager", "cfs-leadership", "minister-office"]
          stack: internal
          request:
            body:
              schema:
                decisionType:
                  type: "string"
                  description: "Decision stage: preliminary, ministerial_review, or final"
                decisionOutcome:
                  type: "string"
                  description: "Outcome: approved, denied, deferred, or returned"
                approvedAmount:
                  type: "decimal"
                  description: "Approved funding amount (must not exceed requested amount)"
                decisionRationale:
                  type: "string"
                  description: "Written rationale for the decision"
                conditionsText:
                  type: "string"
                  description: "Any conditions attached to the approval"
                conditions:
                  type: "array"
                  description: "Structured conditions with due dates"
          response:
            type: single
            entity: "DecisionRecord"
          business_rules: ["BR-010", "BR-011"]

        - id: "get-approval-chain"
          method: GET
          path: "/approval-chain"
          description: "Get the full approval chain with approver details for a funding request"
          audience: ["staff"]
          auth: required
          required_roles: ["cfs-manager", "cfs-leadership", "minister-office"]
          stack: internal
          response:
            type: list
            entity: "ApprovalChainEntry"

    # ── Community Data ────────────────────────────────────────────────────
    - name: "community-data"
      entity: "LocalGeographicArea"
      description: "Read-only community needs data for local geographic areas (LGAs)"
      operations:
        - id: "list-lgas"
          method: GET
          path: "/lgas"
          description: "List local geographic areas with optional region and search filters"
          audience: ["staff"]
          auth: required
          required_roles: ["cfs-analyst", "cfs-manager", "cfs-leadership"]
          stack: internal
          request:
            query:
              - name: "region"
                type: "string"
                required: false
                description: "Filter by LGA region"
              - name: "search"
                type: "string"
                required: false
                description: "Search by LGA name"
              - name: "page"
                type: "integer"
                required: false
                description: "Page number"
              - name: "limit"
                type: "integer"
                required: false
                description: "Results per page"
          response:
            type: paginated
            entity: "LocalGeographicArea"

        - id: "get-lga"
          method: GET
          path: "/lgas/:lgaId"
          description: "Get a single LGA by code"
          audience: ["staff"]
          auth: required
          required_roles: ["cfs-analyst", "cfs-manager", "cfs-leadership"]
          stack: internal
          request:
            params:
              - name: "lgaId"
                type: "string"
                description: "LGA code"
          response:
            type: single
            entity: "LocalGeographicArea"

        - id: "get-lga-score"
          method: GET
          path: "/lgas/:lgaId/score"
          description: "Get the composite community needs score for an LGA"
          audience: ["staff"]
          auth: required
          required_roles: ["cfs-analyst", "cfs-manager"]
          stack: internal
          response:
            type: single
            entity: "LgaCompositeScore"
          business_rules: ["BR-014"]

    # ── Users ─────────────────────────────────────────────────────────────
    - name: "users"
      entity: "PortalUser"
      description: "Portal user provisioning and role management"
      operations:
        - id: "list-users"
          method: GET
          path: "/"
          description: "List all portal users with optional filters for active status and role"
          audience: ["staff"]
          auth: required
          required_roles: ["system-admin"]
          stack: internal
          request:
            query:
              - name: "isActive"
                type: "boolean"
                required: false
                description: "Filter by active status"
              - name: "role"
                type: "string"
                required: false
                description: "Filter by role code"
              - name: "page"
                type: "integer"
                required: false
                description: "Page number"
              - name: "limit"
                type: "integer"
                required: false
                description: "Results per page"
          response:
            type: paginated
            entity: "PortalUser"

        - id: "assign-user-role"
          method: POST
          path: "/:userId/roles"
          description: "Assign a role to a user"
          audience: ["staff"]
          auth: required
          required_roles: ["system-admin"]
          stack: internal
          request:
            params:
              - name: "userId"
                type: "uuid"
                description: "User ID"
            body:
              schema:
                roleCode:
                  type: "string"
                  description: "Role code to assign"
          response:
            type: empty
          business_rules: ["BR-008"]

    # ── Audit ─────────────────────────────────────────────────────────────
    - name: "audit"
      entity: "AuditEntry"
      description: "Read-only access to the immutable audit log"
      operations:
        - id: "list-audit-entries"
          method: GET
          path: "/"
          description: "List audit log entries with pagination"
          audience: ["staff"]
          auth: required
          required_roles: ["cfs-manager", "system-admin"]
          stack: internal
          request:
            query:
              - name: "page"
                type: "integer"
                required: false
                description: "Page number"
              - name: "limit"
                type: "integer"
                required: false
                description: "Results per page"
          response:
            type: paginated
            entity: "AuditEntry"
          business_rules: ["BR-017"]

        - id: "list-audit-for-entity"
          method: GET
          path: "/:entityType/:entityId"
          description: "List audit entries for a specific entity"
          audience: ["staff"]
          auth: required
          required_roles: ["cfs-manager", "system-admin"]
          stack: internal
          request:
            params:
              - name: "entityType"
                type: "string"
                description: "Entity type (e.g. FundingRequest, Organization)"
              - name: "entityId"
                type: "string"
                description: "Entity ID"
          response:
            type: paginated
            entity: "AuditEntry"
          business_rules: ["BR-017"]

  system_endpoints:
    - id: "health-check"
      method: "GET"
      path: "/health"
      description: "Liveness/readiness probe for the API"
      auth: public

    - id: "trigger-infomart-sync"
      method: "POST"
      path: "/api/v1/integration/infomart/sync"
      description: "Manually trigger Infomart data ingestion (system-admin only)"
      auth: required

    - id: "get-infomart-sync-status"
      method: "GET"
      path: "/api/v1/integration/infomart/status"
      description: "Get the last Infomart data sync status and staleness"
      auth: required


