# ─────────────────────────────────────────────────────────────────────────────
# INTEGRATIONS
# ─────────────────────────────────────────────────────────────────────────────

integrations:
  - id: "INT-010"
    name: "Azure Blob Storage"
    type: file-storage
    description: >
      Stores supporting documents uploaded by applicants. Documents are
      uploaded via pre-signed SAS URLs generated by the API. Files are
      virus-scanned before they become downloadable.
    required: true
    config_params:
      - name: "storage_connection_string"
        description: "Azure Storage account connection string"
        sensitive: true
        required: true
      - name: "storage_container_name"
        description: "Blob container name for documents"
        sensitive: false
        required: true
      - name: "storage_account_name"
        description: "Storage account name for SAS URL generation"
        sensitive: false
        required: true
      - name: "storage_account_key"
        description: "Storage account key for SAS URL generation"
        sensitive: true
        required: true
    business_rules: ["BR-006"]

  - id: "INT-003"
    name: "Infomart"
    type: data-ingestion
    description: >
      Periodic ingestion of community needs data from the Government of Alberta
      Infomart API. Imports local geographic area definitions, needs indicator
      values, and composite scores. Privacy suppression (BR-015) and zero
      substitution (BR-016) are applied during ingestion.
    required: false
    config_params:
      - name: "infomart_api_base_url"
        description: "Base URL of the Infomart REST API"
        sensitive: false
        required: true
      - name: "infomart_api_key"
        description: "API subscription key for Infomart"
        sensitive: true
        required: true
      - name: "infomart_sync_cron"
        description: "Cron schedule for automatic sync (default: daily at 2:00 AM)"
        sensitive: false
        required: false
    sync_schedule: "0 2 * * *"
    business_rules: ["BR-015", "BR-016"]

  - id: "INT-009"
    name: "Email Notification Service"
    type: email
    description: >
      Sends transactional email notifications to applicants at key lifecycle
      events (submission confirmation, status changes, approval/denial).
      Supports Azure Communication Services or SMTP relay. All sends are
      logged to NotificationLog for delivery tracking.
    required: false
    config_params:
      - name: "email_provider"
        description: "Email provider type (acs, smtp, or log)"
        sensitive: false
        required: true
      - name: "smtp_host"
        description: "SMTP relay hostname (when provider = smtp)"
        sensitive: false
        required: false
      - name: "smtp_port"
        description: "SMTP relay port (default: 587)"
        sensitive: false
        required: false
      - name: "smtp_user"
        description: "SMTP authentication username"
        sensitive: true
        required: false
      - name: "smtp_pass"
        description: "SMTP authentication password"
        sensitive: true
        required: false
      - name: "email_from_address"
        description: "Sender email address"
        sensitive: false
        required: true


# ─────────────────────────────────────────────────────────────────────────────
# NOTIFICATIONS
# ─────────────────────────────────────────────────────────────────────────────

notifications:
  events:
    - id: "application_submitted"
      trigger: "FundingRequest transitions to submitted"
      recipient: "applicant"
      channel: email
      subject_template: "Women's Shelter Funding Application {{requestRef}} Received"
      description: "Confirms receipt of the funding application to the applicant"

    - id: "application_under_review"
      trigger: "FundingRequest transitions to under-review"
      recipient: "applicant"
      channel: email
      subject_template: "Application {{requestRef}} is Now Under Review"
      description: "Notifies the applicant that their application has been assigned to an analyst"

    - id: "information_requested"
      trigger: "FundingRequest transitions to information-requested"
      recipient: "applicant"
      channel: email
      subject_template: "Application {{requestRef}} — Additional Information Requested"
      description: "Asks the applicant to provide additional information via the portal"

    - id: "application_approved"
      trigger: "FundingRequest transitions to approved"
      recipient: "applicant"
      channel: email
      subject_template: "Application {{requestRef}} — Funding Approved"
      description: "Notifies the applicant that their funding request has been approved"

    - id: "application_denied"
      trigger: "FundingRequest transitions to denied"
      recipient: "applicant"
      channel: email
      subject_template: "Application {{requestRef}} — Decision"
      description: "Notifies the applicant that their funding request has been denied"

    - id: "assessment_finalized"
      trigger: "Assessment status transitions to finalized"
      recipient: "cfs-manager"
      channel: email
      subject_template: "Assessment Finalized — Application {{requestRef}}"
      description: "Alerts the manager that an assessment is ready for review"

    - id: "decision_recommended"
      trigger: "FundingRequest transitions to recommended"
      recipient: "cfs-leadership"
      channel: email
      subject_template: "Application {{requestRef}} — Recommended for Decision"
      description: "Alerts leadership that a request has been recommended for final decision"


# ─────────────────────────────────────────────────────────────────────────────
# AUDIT
# ─────────────────────────────────────────────────────────────────────────────

audit:
  enabled: true
  tracked_actions:
    - action_code: "create"
      entities: ["Organization", "FundingRequest", "Program", "SupportingDocument", "DecisionRecord"]
      captures: ["new_value"]
    - action_code: "update"
      entities: ["Organization", "FundingRequest", "Program", "Budget", "Assessment"]
      captures: ["new_value"]
    - action_code: "delete"
      entities: ["FundingRequest", "Program", "SupportingDocument"]
      captures: ["entity_id"]
    - action_code: "status-change"
      entities: ["FundingRequest", "PortalUser"]
      captures: ["new_value", "old_value"]
    - action_code: "role-change"
      entities: ["PortalUser"]
      captures: ["new_value"]
    - action_code: "assess"
      entities: ["Assessment"]
      captures: ["new_value"]
    - action_code: "upload"
      entities: ["SupportingDocument"]
      captures: ["new_value"]
  retention:
    policy: "7-years"
    immutable: true
  business_rules: ["BR-017", "BR-018"]


# ─────────────────────────────────────────────────────────────────────────────
# TRACEABILITY
# ─────────────────────────────────────────────────────────────────────────────

traceability:
  use_cases:
    - id: "UC-001"
      name: "Register Organization"
      description: "Applicant creates a shelter organization profile with contacts"
    - id: "UC-002"
      name: "Create Funding Request"
      description: "Applicant creates a new funding request in draft status"
    - id: "UC-003"
      name: "Submit Funding Request"
      description: "Applicant submits a completed funding request for CFS review"
    - id: "UC-004"
      name: "Assess Funding Request"
      description: "CFS analyst evaluates the request using filter analysis and scores dimensions"
    - id: "UC-005"
      name: "Record Funding Decision"
      description: "CFS manager or leadership records a decision at the appropriate approval stage"
    - id: "UC-006"
      name: "View Community Needs Map"
      description: "CFS analyst or manager views LGA community needs indicators to inform assessment"
    - id: "UC-007"
      name: "Manage Users and Roles"
      description: "System administrator assigns or revokes roles for staff and applicant users"
    - id: "UC-008"
      name: "Upload Supporting Document"
      description: "Applicant uploads a supporting document that is virus-scanned before availability"
    - id: "UC-009"
      name: "Withdraw Funding Request"
      description: "Applicant or staff withdraws a funding request from any active state"

  test_cases:
    - id: "TC-001"
      name: "Submit Part B request without community evidence fails"
      covers_use_case: "UC-003"
      type: integration
    - id: "TC-002"
      name: "Composite score calculation matches BR-014 formula"
      covers_use_case: "UC-004"
      type: unit
    - id: "TC-003"
      name: "Approved amount exceeding requested amount is rejected"
      covers_use_case: "UC-005"
      type: unit
    - id: "TC-004"
      name: "Full approval chain lifecycle from draft to approved"
      covers_use_case: "UC-003"
      type: e2e
    - id: "TC-005"
      name: "Filter notes required when answer is no"
      covers_use_case: "UC-004"
      type: unit
    - id: "TC-006"
      name: "Invalid state transitions are rejected"
      covers_use_case: "UC-003"
      type: integration
    - id: "TC-007"
      name: "Privacy suppression replaces score for small LGA populations"
      covers_use_case: "UC-006"
      type: unit
    - id: "TC-008"
      name: "Decision sequence enforcement (BR-011)"
      covers_use_case: "UC-005"
      type: integration
    - id: "TC-009"
      name: "Audit entries are immutable"
      covers_use_case: "UC-007"
      type: integration
