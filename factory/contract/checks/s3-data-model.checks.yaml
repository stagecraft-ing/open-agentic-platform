# Stage s3-data-model — Data model gate
# Verifies the data model artifact is present, validates against the entity model
# schema, and contains no placeholder text.
checks:
  - id: "S3-001-data-model-exists"
    type: "artifact-exists"
    severity: "error"
    artifact: ".factory/data-model.json"

  - id: "S3-002-data-model-schema"
    type: "schema-validation"
    severity: "error"
    artifact: ".factory/data-model.json"
    schema: "factory/contract/schemas/stage-outputs/entity-model.schema.json"

  - id: "S3-003-no-todo-placeholders"
    type: "grep-absent"
    severity: "error"
    pattern: "(?i)\\bTODO\\b"
    scope: ".factory"
