# Stage s2-service-requirements — Service requirements gate
# Verifies the service requirements artifact is present and free of placeholder text.
checks:
  - id: "S2-001-service-requirements-exists"
    type: "artifact-exists"
    severity: "error"
    artifact: ".factory/service-requirements.json"

  - id: "S2-002-no-todo-placeholders"
    type: "grep-absent"
    severity: "error"
    pattern: "(?i)\\bTODO\\b"
    scope: ".factory"
