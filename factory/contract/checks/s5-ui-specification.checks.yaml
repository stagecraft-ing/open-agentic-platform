# Stage s5-ui-specification — UI specification and Build Spec freeze gate
# Verifies the frozen Build Spec exists, validates against the build-spec schema,
# and contains no placeholder text.
checks:
  - id: "S5-001-build-spec-exists"
    type: "artifact-exists"
    severity: "error"
    artifact: ".factory/build-spec.yaml"

  - id: "S5-002-build-spec-schema"
    type: "schema-validation"
    severity: "error"
    artifact: ".factory/build-spec.yaml"
    schema: "factory/contract/schemas/build-spec.schema.yaml"

  - id: "S5-003-no-todo-placeholders"
    type: "grep-absent"
    severity: "error"
    pattern: "(?i)\\bTODO\\b"
    scope: ".factory"
