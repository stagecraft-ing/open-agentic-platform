apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.app.name }}
  labels:
{{- range $k, $v := .Values.app.labels }}
    {{ $k }}: {{ $v | quote }}
{{- end }}
spec:
  selector:
    app: {{ .Values.app.name }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
