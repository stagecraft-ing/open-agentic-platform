# Feature 037: Build axiomregent sidecar binaries for all supported platforms.
# Produces binaries compatible with Tauri's externalBin bundling convention.

name: Build axiomregent binaries

on:
  push:
    branches: [main]
    paths:
      - 'crates/axiomregent/**'
      - 'crates/agent/**'
      - 'crates/featuregraph/**'
      - 'crates/xray/**'
      - 'crates/run/**'
      - 'crates/policy-kernel/**'
  pull_request:
    paths:
      - 'crates/axiomregent/**'
      - 'crates/agent/**'
      - 'crates/featuregraph/**'
      - 'crates/xray/**'
      - 'crates/run/**'
      - 'crates/policy-kernel/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: axiomregent-aarch64-apple-darwin
          # x86_64-apple-darwin removed — Intel Mac builds dropped (2026-04-15)
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            binary: axiomregent-x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: axiomregent-x86_64-pc-windows-msvc.exe

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.target }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Build axiomregent
        run: cargo build --release --target ${{ matrix.target }} --manifest-path crates/axiomregent/Cargo.toml

      - name: Copy binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp crates/target/${{ matrix.target }}/release/axiomregent apps/desktop/src-tauri/binaries/${{ matrix.binary }}
          strip apps/desktop/src-tauri/binaries/${{ matrix.binary }} || true
          ls -lh apps/desktop/src-tauri/binaries/${{ matrix.binary }}

      - name: Copy binary (Windows)
        if: runner.os == 'Windows'
        run: |
          copy crates\target\${{ matrix.target }}\release\axiomregent.exe apps\desktop\src-tauri\binaries\${{ matrix.binary }}
          dir apps\desktop\src-tauri\binaries\${{ matrix.binary }}
        shell: cmd

      - name: Smoke test
        run: |
          perl -e 'alarm shift; exec @ARGV' 3 apps/desktop/src-tauri/binaries/${{ matrix.binary }} 2>&1 || true
        shell: bash
        continue-on-error: true

      - name: Upload binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.binary }}
          path: apps/desktop/src-tauri/binaries/${{ matrix.binary }}
          retention-days: 30

  # aarch64-linux requires cross-compilation (no native GitHub runner)
  build-linux-arm64:
    runs-on: ubuntu-24.04
    name: aarch64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Install cross-compilation tools and OpenSSL
        uses: ./.github/actions/linux-arm64-cross

      - name: Build axiomregent
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          PKG_CONFIG_ALLOW_CROSS: '1'
          PKG_CONFIG_PATH_aarch64_unknown_linux_gnu: /usr/lib/aarch64-linux-gnu/pkgconfig
          AARCH64_UNKNOWN_LINUX_GNU_OPENSSL_LIB_DIR: /usr/lib/aarch64-linux-gnu
          AARCH64_UNKNOWN_LINUX_GNU_OPENSSL_INCLUDE_DIR: /usr/include
        run: cargo build --release --target aarch64-unknown-linux-gnu --manifest-path crates/axiomregent/Cargo.toml

      - name: Copy binary
        run: |
          cp crates/target/aarch64-unknown-linux-gnu/release/axiomregent apps/desktop/src-tauri/binaries/axiomregent-aarch64-unknown-linux-gnu
          ls -lh apps/desktop/src-tauri/binaries/axiomregent-aarch64-unknown-linux-gnu

      - name: Upload binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: axiomregent-aarch64-unknown-linux-gnu
          path: apps/desktop/src-tauri/binaries/axiomregent-aarch64-unknown-linux-gnu
          retention-days: 30
