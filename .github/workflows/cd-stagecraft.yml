# CD for stagecraft: build Docker image, push to GHCR, deploy to Hetzner K3s.
#
# Required GitHub secrets:
#   KUBECONFIG_HETZNER  — contents of platform/infra/hetzner/kubeconfig (base64-encoded)
#
# Required GitHub environment:
#   "production"         — create with protection rules for manual approval on deploy

name: CD stagecraft

on:
  push:
    branches: [main]
    paths:
      - 'platform/services/stagecraft/**'
      - 'platform/charts/stagecraft/**'
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy after build (true/false)'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

concurrency:
  group: cd-stagecraft-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/stagecraft-ing/open-agentic-platform/stagecraft

jobs:
  # ── CI gate ────────────────────────────────────────────────
  ci:
    uses: ./.github/workflows/ci-stagecraft.yml

  # ── Build & push Docker image ─────────────────────────────
  build-and-push:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.sha-tag }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: platform/services/stagecraft/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: platform/services/stagecraft

      - name: Build frontend
        run: cd web && npx react-router build
        working-directory: platform/services/stagecraft

      - name: Install Encore CLI
        run: |
          ENCORE_VERSION="1.46.8"
          curl -fsSL "https://encore.dev/install.sh" | bash -s -- --version "${ENCORE_VERSION}"

      - name: Compute image tags
        id: meta
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "sha-tag=sha-${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "Building tags: sha-${SHA_SHORT}, latest"

      - name: Build Docker image (Encore)
        working-directory: platform/services/stagecraft
        run: |
          ~/.encore/bin/encore build docker \
            --config ./infra.config.hetzner.json \
            ${{ env.IMAGE }}:${{ steps.meta.outputs.sha-tag }}

      - name: Tag as latest
        run: docker tag ${{ env.IMAGE }}:${{ steps.meta.outputs.sha-tag }} ${{ env.IMAGE }}:latest

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        run: |
          docker push ${{ env.IMAGE }}:${{ steps.meta.outputs.sha-tag }}
          docker push ${{ env.IMAGE }}:latest

  # ── Deploy to Hetzner K3s ─────────────────────────────────
  deploy-hetzner:
    needs: build-and-push
    if: github.event_name == 'push' || github.event.inputs.deploy == 'true'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Helm
        uses: azure/setup-helm@f0accbfd55e3332a28f721b8202b1016cecf90d5 # v5

      - name: Deploy to Hetzner
        uses: ./.github/actions/helm-deploy
        with:
          namespace: stagecraft-system
          release-name: stagecraft
          chart-path: platform/charts/stagecraft
          values-files: platform/charts/stagecraft/values.yaml,platform/charts/stagecraft/values-hetzner.yaml
          helm-set-args: >-
            --set image.repository=${{ env.IMAGE }}
            --set image.tag=${{ needs.build-and-push.outputs.image-tag }}
            --set "ingress.host=${{ secrets.DOMAIN }}"
            --set "oidc.endpoint=https://auth.${{ secrets.DOMAIN }}"
            --set "oidc.deploydAudience=https://deploy.${{ secrets.DOMAIN }}"
          app-label: stagecraft-api
          kubeconfig-b64: ${{ secrets.KUBECONFIG_HETZNER }}
          ghcr-pat: ${{ secrets.GHCR_PAT }}
          ghcr-username: ${{ github.actor }}
          pull-secret-name: ghcr-credentials
          timeout: '600s'
