# CD for stagecraft: build Docker image, push to GHCR, deploy to Hetzner K3s.
#
# Required GitHub secrets:
#   KUBECONFIG_HETZNER  — contents of platform/infra/hetzner/kubeconfig (base64-encoded)
#
# Required GitHub environment:
#   "production"         — create with protection rules for manual approval on deploy

name: CD stagecraft

on:
  push:
    branches: [main]
    paths:
      - 'platform/services/stagecraft/**'
      - 'platform/charts/stagecraft/**'
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy after build (true/false)'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

concurrency:
  group: cd-stagecraft-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/stagecraft-ing/open-agentic-platform/stagecraft
  ENCORE_VERSION: '1.46.8'

jobs:
  # ── CI gate ────────────────────────────────────────────────
  ci:
    uses: ./.github/workflows/ci-stagecraft.yml

  # ── Build & push Docker image ─────────────────────────────
  build-and-push:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.sha-tag }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: platform/services/stagecraft/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: platform/services/stagecraft

      - name: Build frontend
        run: cd web && npx react-router build
        working-directory: platform/services/stagecraft

      # Cache the installed Encore CLI to avoid hammering the installer on
      # every build. Cache key is scoped by OS and version so a version bump
      # invalidates cleanly.
      - name: Cache Encore CLI
        id: cache-encore
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.encore
          key: encore-${{ runner.os }}-${{ env.ENCORE_VERSION }}

      # Install from the CloudFront tarball directly rather than piping
      # install.sh from encore.dev. The Vercel-fronted installer has
      # intermittently returned 403s, and install.sh itself just downloads
      # this same tarball. curl --retry covers transient edge failures.
      - name: Install Encore CLI
        if: steps.cache-encore.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          install_dir="$HOME/.encore"
          mkdir -p "$install_dir/bin"
          url="https://d2f391esomvqpi.cloudfront.net/encore-${ENCORE_VERSION}-linux_amd64.tar.gz"
          curl --fail --location --silent --show-error \
            --retry 5 --retry-delay 5 --retry-all-errors \
            --output "$install_dir/encore.tar.gz" "$url"
          rm -rf "$install_dir/encore-go" "$install_dir/runtimes"
          tar -C "$install_dir" -xzf "$install_dir/encore.tar.gz"
          chmod +x "$install_dir"/bin/*
          rm "$install_dir/encore.tar.gz"
          "$install_dir/bin/encore" version

      - name: Compute image tags
        id: meta
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "sha-tag=sha-${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "Building tags: sha-${SHA_SHORT}, latest"

      - name: Build Docker image (Encore)
        working-directory: platform/services/stagecraft
        run: |
          ~/.encore/bin/encore build docker \
            --config ./infra.config.hetzner.json \
            ${{ env.IMAGE }}:${{ steps.meta.outputs.sha-tag }}

      - name: Tag as latest
        run: docker tag ${{ env.IMAGE }}:${{ steps.meta.outputs.sha-tag }} ${{ env.IMAGE }}:latest

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        run: |
          docker push ${{ env.IMAGE }}:${{ steps.meta.outputs.sha-tag }}
          docker push ${{ env.IMAGE }}:latest

  # ── Deploy to Hetzner K3s ─────────────────────────────────
  deploy-hetzner:
    needs: build-and-push
    if: github.event_name == 'push' || github.event.inputs.deploy == 'true'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Helm
        uses: azure/setup-helm@f0accbfd55e3332a28f721b8202b1016cecf90d5 # v5

      - name: Deploy to Hetzner
        uses: ./.github/actions/helm-deploy
        with:
          namespace: stagecraft-system
          release-name: stagecraft
          chart-path: platform/charts/stagecraft
          values-files: platform/charts/stagecraft/values.yaml,platform/charts/stagecraft/values-hetzner.yaml
          helm-set-args: >-
            --set image.repository=${{ env.IMAGE }}
            --set image.tag=${{ needs.build-and-push.outputs.image-tag }}
            --set "ingress.host=${{ secrets.DOMAIN }}"
            --set "oidc.endpoint=https://auth.${{ secrets.DOMAIN }}"
            --set "oidc.deploydAudience=https://deploy.${{ secrets.DOMAIN }}"
          app-label: stagecraft-api
          kubeconfig-b64: ${{ secrets.KUBECONFIG_HETZNER }}
          ghcr-pat: ${{ secrets.GHCR_PAT }}
          ghcr-username: ${{ github.actor }}
          pull-secret-name: ghcr-credentials
          timeout: '600s'
