# Spec: 078-platform-completion-plan
#
# CI for deployd-api-rs: check, clippy, and test.

name: CI deployd-api-rs

on:
  push:
    branches: [main]
    paths:
      - 'platform/services/deployd-api-rs/**'
  pull_request:
    paths:
      - 'platform/services/deployd-api-rs/**'
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check-and-test:
    runs-on: ubuntu-latest
    name: check + clippy + test
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: CI deployd-api-rs
        uses: ./.github/actions/rust-ci
        with:
          manifest-path: platform/services/deployd-api-rs/Cargo.toml
          cache-shared-key: deployd-api
