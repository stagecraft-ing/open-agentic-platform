# Spec: 078-platform-completion-plan
#
# CI for deployd-api-rs: check, clippy, and test.

name: CI deployd-api-rs

on:
  push:
    branches: [main]
    paths:
      - 'platform/services/deployd-api-rs/**'
      - 'platform/charts/**'
      - '.github/workflows/ci-deployd-api-rs.yml'
  pull_request:
    paths:
      - 'platform/services/deployd-api-rs/**'
      - 'platform/charts/**'
      - '.github/workflows/ci-deployd-api-rs.yml'
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check-and-test:
    runs-on: ubuntu-latest
    name: check + clippy + test
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # Spec 136 Phase 2.b: helm runner tests exercise `helm template`
      # against the embedded chart. Without helm on PATH the relevant
      # tests no-op (eprintln + early return); installing it here means
      # they actually assert.
      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5

      - name: CI deployd-api-rs
        uses: ./.github/actions/rust-ci
        with:
          manifest-path: platform/services/deployd-api-rs/Cargo.toml
          cache-shared-key: deployd-api

  # PR-time Dockerfile validation. Mirrors the cd-deployd-api-rs.yml
  # build-and-push step (same context, same Dockerfile, same buildx
  # cache key) so apt-resolver / layer regressions surface here instead
  # of after merge. No push — `--load` materialises the image locally.
  docker-build:
    runs-on: ubuntu-latest
    name: docker build
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build deployd-api image (no push)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          # Context + file must match cd-deployd-api-rs.yml so this gate
          # exercises exactly the same build the CD workflow does.
          context: platform
          file: platform/services/deployd-api-rs/Dockerfile
          push: false
          load: true
          tags: deployd-api:pr-validation
          cache-from: type=gha
          cache-to: type=gha,mode=max
