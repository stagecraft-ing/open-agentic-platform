# CI for policy-kernel: check, clippy, and test.

name: CI policy-kernel

on:
  push:
    branches: [main]
    paths:
      - 'crates/policy-kernel/**'
  pull_request:
    paths:
      - 'crates/policy-kernel/**'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  check-and-test:
    runs-on: ubuntu-latest
    name: check + clippy + test

    steps:
      - uses: actions/checkout@v4

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: cargo check
        run: cargo check --manifest-path crates/policy-kernel/Cargo.toml

      - name: cargo clippy
        run: cargo clippy --manifest-path crates/policy-kernel/Cargo.toml -- -D warnings

      - name: cargo test
        run: cargo test --manifest-path crates/policy-kernel/Cargo.toml
