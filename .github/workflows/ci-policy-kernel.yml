# CI for policy-kernel: check, clippy, and test.

name: CI policy-kernel

on:
  push:
    branches: [main]
    paths:
      - 'crates/policy-kernel/**'
  pull_request:
    paths:
      - 'crates/policy-kernel/**'
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check-and-test:
    runs-on: ubuntu-latest
    name: check + clippy + test
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: CI policy-kernel
        uses: ./.github/actions/rust-ci
        with:
          manifest-path: crates/policy-kernel/Cargo.toml
          cache-shared-key: policy-kernel
