# CI for axiomregent MCP server: check, clippy, and test.

name: CI axiomregent

on:
  push:
    branches: [main]
    paths:
      - 'crates/axiomregent/**'
      - 'crates/agent/**'
      - 'crates/featuregraph/**'
      - 'crates/xray/**'
      - 'crates/run/**'
      - 'crates/policy-kernel/**'
  pull_request:
    paths:
      - 'crates/axiomregent/**'
      - 'crates/agent/**'
      - 'crates/featuregraph/**'
      - 'crates/xray/**'
      - 'crates/run/**'
      - 'crates/policy-kernel/**'
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check-and-test:
    runs-on: ubuntu-latest
    name: check + clippy + test
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: CI axiomregent
        uses: ./.github/actions/rust-ci
        with:
          manifest-path: crates/axiomregent/Cargo.toml
          cache-workspaces: crates/axiomregent
          cache-shared-key: axiomregent

      - name: cargo test (policy-kernel)
        run: cargo test --manifest-path crates/policy-kernel/Cargo.toml
