# Spec: 033-axiomregent-activation
# Spec: 073-axiomregent-unification
# Spec: 135-fast-ci-as-default
#
# CI for axiomregent MCP server: check, clippy, and test.

name: CI axiomregent

on:
  push:
    branches: [main]
    paths:
      - 'crates/axiomregent/**'
      - 'crates/agent/**'
      - 'crates/featuregraph/**'
      - 'crates/xray/**'
      - 'crates/run/**'
      - 'crates/policy-kernel/**'
  pull_request:
    paths:
      - 'crates/axiomregent/**'
      - 'crates/agent/**'
      - 'crates/featuregraph/**'
      - 'crates/xray/**'
      - 'crates/run/**'
      - 'crates/policy-kernel/**'
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check-and-test:
    runs-on: ubuntu-latest
    name: check + clippy + test
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: CI axiomregent
        uses: ./.github/actions/rust-ci
        with:
          manifest-path: crates/axiomregent/Cargo.toml
          cache-workspaces: crates/axiomregent
          cache-shared-key: axiomregent

      # The previous `cargo test --manifest-path crates/policy-kernel/Cargo.toml`
      # post-step was removed by spec 135: policy-kernel has its own enforcing
      # workflow (ci-policy-kernel.yml) that runs the same check+clippy+test
      # via the rust-ci composite. Both workflows trigger on
      # crates/policy-kernel/** path changes, so coverage is unchanged. Removing
      # the redundancy lets `ci-rust` switch to `--workspace` mode without
      # leaving a per-member token unmirrored in the parity check.
