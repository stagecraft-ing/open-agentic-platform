# CI for axiomregent MCP server: check, clippy, and test.

name: CI axiomregent

on:
  push:
    branches: [main]
    paths:
      - 'crates/axiomregent/**'
      - 'crates/agent/**'
      - 'crates/featuregraph/**'
      - 'crates/xray/**'
      - 'crates/run/**'
      - 'crates/policy-kernel/**'
  pull_request:
    paths:
      - 'crates/axiomregent/**'
      - 'crates/agent/**'
      - 'crates/featuregraph/**'
      - 'crates/xray/**'
      - 'crates/run/**'
      - 'crates/policy-kernel/**'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  check-and-test:
    runs-on: ubuntu-latest
    name: check + clippy + test

    steps:
      - uses: actions/checkout@v4

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: cargo check
        run: cargo check --manifest-path crates/axiomregent/Cargo.toml

      - name: cargo clippy
        run: cargo clippy --manifest-path crates/axiomregent/Cargo.toml -- -D warnings

      - name: cargo test
        run: cargo test --manifest-path crates/axiomregent/Cargo.toml

      - name: cargo test (policy-kernel)
        run: cargo test --manifest-path crates/policy-kernel/Cargo.toml
