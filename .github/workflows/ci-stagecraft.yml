# CI for stagecraft: type-check and test.

name: CI stagecraft

on:
  push:
    branches: [main]
    paths:
      - 'platform/services/stagecraft/**'
  pull_request:
    paths:
      - 'platform/services/stagecraft/**'
  workflow_dispatch:

jobs:
  check-and-test:
    runs-on: ubuntu-latest
    name: typecheck + test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: platform/services/stagecraft/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: platform/services/stagecraft

      - name: Create Encore client stubs
        run: |
          mkdir -p encore.gen/clients
          echo 'export declare const site: any;' > encore.gen/clients/index.d.ts
        working-directory: platform/services/stagecraft

      - name: TypeScript type check
        run: npx tsc --noEmit
        working-directory: platform/services/stagecraft

      - name: Vitest
        run: npm test
        working-directory: platform/services/stagecraft
