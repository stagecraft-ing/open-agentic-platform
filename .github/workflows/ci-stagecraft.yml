# Spec: 077-stagecraft-factory-api
# Spec: 087-unified-workspace-architecture
#
# CI for stagecraft: type-check, test, and Encore docker build.
#
# Hardening notes (ci-hardening branch):
#   - M3: typecheck job runs real Encore codegen instead of writing fake
#     `any`-typed stubs. The previous stubs made `~encore/clients` resolve
#     to `any`, so tsc was effectively type-loose for every cross-service
#     import. Now we install the Encore CLI and trigger codegen via
#     `encore build docker` with a tight timeout (just long enough to
#     populate encore.gen) — full image is built by the parallel
#     encore-build job.
#   - M5: per-job timeout-minutes set on every job.

name: CI stagecraft

on:
  push:
    branches: [main]
    paths:
      - 'platform/services/stagecraft/**'
  pull_request:
    paths:
      - 'platform/services/stagecraft/**'
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

env:
  ENCORE_VERSION: '1.56.6'

jobs:
  check-and-test:
    runs-on: ubuntu-latest
    name: typecheck + test
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: platform/services/stagecraft/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: platform/services/stagecraft

      - name: Install Encore CLI
        uses: ./.github/actions/encore-install
        with:
          encore-version: ${{ env.ENCORE_VERSION }}

      # M3 fix — populate encore.gen via real codegen.
      # `encore build docker` parses every service before any Docker work
      # begins, writing encore.gen as a side effect. We launch the build
      # in the background, poll for the generated client surface to land,
      # then kill the daemon. ~30-60s on warm runners; capped at 180s.
      - name: Generate encore.gen (real codegen)
        shell: bash
        working-directory: platform/services/stagecraft
        run: |
          set -euo pipefail
          # Background build — discarded as soon as encore.gen is populated.
          encore build docker \
            --config ./infra.config.hetzner.json \
            stagecraft-typecheck:0 >/tmp/encore-build.log 2>&1 &
          BUILD_PID=$!
          GEN_FILE="encore.gen/clients/index.d.ts"
          MARKER='from "../internal/clients'
          for i in $(seq 1 180); do
            if [ -f "$GEN_FILE" ] && grep -q "$MARKER" "$GEN_FILE" 2>/dev/null; then
              echo "encore.gen populated after ${i}s."
              break
            fi
            sleep 1
          done
          kill "$BUILD_PID" 2>/dev/null || true
          pkill -f "encore daemon" 2>/dev/null || true
          if ! grep -q "$MARKER" "$GEN_FILE" 2>/dev/null; then
            echo "::error::encore.gen codegen did not produce a real client surface."
            tail -50 /tmp/encore-build.log || true
            exit 1
          fi

      - name: TypeScript type check
        run: npx tsc --noEmit
        working-directory: platform/services/stagecraft

      - name: Vitest
        run: npm test
        working-directory: platform/services/stagecraft

  # Parity gate with cd-stagecraft.yml: run `encore build docker` against the
  # production infra config so schema-parser errors and missing resource
  # registrations fail the PR instead of the post-merge deploy.
  encore-build:
    runs-on: ubuntu-latest
    name: encore build docker
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: platform/services/stagecraft/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: platform/services/stagecraft

      - name: Encore build (validate schema + infra config)
        uses: ./.github/actions/encore-build
        with:
          encore-version: ${{ env.ENCORE_VERSION }}
          config: ./infra.config.hetzner.json
          image-tag: stagecraft-ci:${{ github.run_id }}
