# Spec: 037-cross-platform-axiomregent
# Spec: 086-open-source-launch
# Spec: 117-release-artifact-attestations
#
# Release desktop app bundles for all platforms.
# Triggered by pushing a version tag (e.g. v0.2.1).
# Builds sidecar binaries first, then uses Tauri Action to produce
# platform installers and upload them to a GitHub Release.
#
# Each installer (DMG / AppImage / NSIS .exe) ships with:
#   - a per-target CycloneDX SBOM (spec 117)
#   - a SLSA build-provenance attestation (spec 117)
#   - an existing .sha256 sidecar consumed by the in-app updater
# Verify with `gh attestation verify <installer> --repo <owner>/<repo>`.

name: Release Desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.2.1)'
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Stage 1: Build sidecar binaries ────────────────────────────────
  sidecar:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          # x86_64-apple-darwin removed — Intel Mac builds dropped (2026-04-15)
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    name: sidecar / ${{ matrix.target }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: '1.95.0'
          targets: ${{ matrix.target }}
          components: clippy, rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: sidecar-${{ matrix.target }}

      # axiomregent depends on openssl-sys via reqwest/octocrab
      - name: Install OpenSSL dev (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      # ── axiomregent ──
      - name: Build axiomregent
        run: cargo build --release --target ${{ matrix.target }} --manifest-path crates/axiomregent/Cargo.toml

      - name: Stage axiomregent (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p apps/desktop/src-tauri/binaries
          cp "crates/target/${{ matrix.target }}/release/axiomregent" \
             "apps/desktop/src-tauri/binaries/axiomregent-${{ matrix.target }}"
          strip "apps/desktop/src-tauri/binaries/axiomregent-${{ matrix.target }}" || true

      - name: Stage axiomregent (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          if not exist apps\desktop\src-tauri\binaries mkdir apps\desktop\src-tauri\binaries
          copy crates\target\${{ matrix.target }}\release\axiomregent.exe apps\desktop\src-tauri\binaries\axiomregent-${{ matrix.target }}.exe

      - name: Upload sidecar artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sidecar-${{ matrix.target }}
          path: apps/desktop/src-tauri/binaries/
          retention-days: 5

  # ── Stage 1b: Linux ARM64 sidecar (cross-compiled) ────────────────
  sidecar-linux-arm64:
    runs-on: ubuntu-24.04
    name: sidecar / aarch64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: '1.95.0'
          targets: aarch64-unknown-linux-gnu
          components: clippy, rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: sidecar-aarch64-unknown-linux-gnu

      - name: Install cross-compilation tools and OpenSSL
        uses: ./.github/actions/linux-arm64-cross

      - name: Build axiomregent
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          PKG_CONFIG_ALLOW_CROSS: '1'
          PKG_CONFIG_PATH_aarch64_unknown_linux_gnu: /usr/lib/aarch64-linux-gnu/pkgconfig
          AARCH64_UNKNOWN_LINUX_GNU_OPENSSL_LIB_DIR: /usr/lib/aarch64-linux-gnu
          AARCH64_UNKNOWN_LINUX_GNU_OPENSSL_INCLUDE_DIR: /usr/include
        run: cargo build --release --target aarch64-unknown-linux-gnu --manifest-path crates/axiomregent/Cargo.toml

      - name: Stage binaries
        run: |
          mkdir -p apps/desktop/src-tauri/binaries
          cp crates/target/aarch64-unknown-linux-gnu/release/axiomregent \
             apps/desktop/src-tauri/binaries/axiomregent-aarch64-unknown-linux-gnu

      - name: Upload sidecar artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sidecar-aarch64-unknown-linux-gnu
          path: apps/desktop/src-tauri/binaries/
          retention-days: 5

  # ── Stage 2: Build & release desktop app ───────────────────────────
  release:
    needs: [sidecar, sidecar-linux-arm64]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin'
            config: src-tauri/tauri.macos.conf.json
          # x86_64-apple-darwin removed — Intel Mac builds dropped (2026-04-15)
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            args: ''
            config: src-tauri/tauri.linux.conf.json
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            args: ''
            config: src-tauri/tauri.windows.conf.json

    runs-on: ${{ matrix.os }}
    name: release / ${{ matrix.target }}
    timeout-minutes: 60
    permissions:
      contents: write
      id-token: write       # spec 117 — Sigstore identity
      attestations: write   # spec 117 — provenance attestation upload

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # pinned for rust-toolchain.toml lockstep
        with:
          toolchain: '1.95.0'
          targets: ${{ matrix.target }}
          components: clippy, rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: release-${{ matrix.target }}

      - uses: pnpm/action-setup@4f4305e1fe60ad818b8ae6fc4a697cc47eab0b2d # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # Linux needs system libraries for Tauri / WebKit
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      # Download pre-built sidecar binaries from Stage 1
      - name: Download sidecar binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: sidecar-${{ matrix.target }}
          path: apps/desktop/src-tauri/binaries/

      - name: Mark sidecars executable (Unix)
        if: runner.os != 'Windows'
        run: chmod +x apps/desktop/src-tauri/binaries/*

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          if [ -z "$TAG" ]; then
            echo "::error::No release tag resolved — did you forget the tag input?"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      # Detect whether Apple code signing secrets are configured.
      # Secrets can't be used directly in step `if:` conditionals.
      - name: Detect code signing
        id: codesign
        shell: bash
        run: |
          if [ -n "$CERT" ]; then
            echo "apple=true" >> "$GITHUB_OUTPUT"
          else
            echo "apple=false" >> "$GITHUB_OUTPUT"
            echo "::warning::APPLE_CERTIFICATE not set — macOS build will be unsigned"
          fi
        env:
          CERT: ${{ secrets.APPLE_CERTIFICATE }}

      # Signed build — APPLE_CERTIFICATE env var MUST be completely absent
      # (not empty) to prevent Tauri from calling `security import` with
      # invalid data.
      - name: Build and release with Tauri (signed)
        if: steps.codesign.outputs.apple == 'true'
        uses: tauri-apps/tauri-action@fce9c6108b31ea247710505d3aaaa893ee6768d4 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tauriScript: pnpm tauri
          tagName: ${{ steps.tag.outputs.tag }}
          releaseName: 'OPC ${{ steps.tag.outputs.tag }}'
          releaseBody: |
            See the [changelog](https://github.com/${{ github.repository }}/commits/${{ steps.tag.outputs.tag }}) for details.

            ## Downloads
            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `.dmg` (aarch64) |
            | Linux | `.AppImage`, `.deb`, `.rpm` |
            | Windows | `.msi`, `.exe` (NSIS) |
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          configPath: ${{ matrix.config }}

      # Unsigned build — no Apple env vars in scope at all.
      - name: Build and release with Tauri (unsigned)
        if: steps.codesign.outputs.apple != 'true'
        uses: tauri-apps/tauri-action@fce9c6108b31ea247710505d3aaaa893ee6768d4 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tauriScript: pnpm tauri
          tagName: ${{ steps.tag.outputs.tag }}
          releaseName: 'OPC ${{ steps.tag.outputs.tag }}'
          releaseBody: |
            See the [changelog](https://github.com/${{ github.repository }}/commits/${{ steps.tag.outputs.tag }}) for details.

            ## Downloads
            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `.dmg` (aarch64) |
            | Linux | `.AppImage`, `.deb`, `.rpm` |
            | Windows | `.msi`, `.exe` (NSIS) |
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          configPath: ${{ matrix.config }}

      # Spec 117 — collect installer paths for SBOM/attestation steps.
      - name: Locate installer artifacts
        id: installers
        shell: bash
        run: |
          set -euo pipefail
          target_root="apps/desktop/src-tauri/target"
          # Multi-line output via GITHUB_OUTPUT heredoc.
          {
            echo "paths<<INSTALLERS_EOF"
            find "$target_root" -type f \( \
              -path '*/release/bundle/dmg/*.dmg' -o \
              -path '*/release/bundle/appimage/*.AppImage' -o \
              -path '*/release/bundle/nsis/*.exe' \
            \) 2>/dev/null
            echo "INSTALLERS_EOF"
          } >> "$GITHUB_OUTPUT"

      # Spec 117 — CycloneDX SBOM scoped to the desktop source tree so syft
      # can read Cargo.toml/Cargo.lock and the npm workspace root for full
      # component coverage. Stripped release binaries (the prior `target/`
      # scope) yielded an empty SBOM in the axiomregent smoke run.
      - name: Generate desktop SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0 (ships syft 1.30+; v0.17.8's syft 1.11 returned 0 rust components)
        with:
          path: apps/desktop
          format: cyclonedx-json
          output-file: apps/desktop/src-tauri/target/sbom-desktop-${{ matrix.target }}.cdx.json

      # Spec 117 — provenance attestation per installer file produced this run.
      - name: Attest installer provenance
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2 # v2.2.3
        with:
          subject-path: ${{ steps.installers.outputs.paths }}

      # Spec 117 — attach the SBOM to the release alongside the installers.
      - name: Upload SBOM to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          gh release upload "$TAG" \
            "apps/desktop/src-tauri/target/sbom-desktop-${{ matrix.target }}.cdx.json" \
            --clobber --repo "$GITHUB_REPOSITORY"

      # Consumed by the in-app updater (apps/desktop/src-tauri/src/commands/updater.rs).
      # Emits a `<installer>.sha256` sidecar for the platform installer the updater
      # downloads (DMG / NSIS setup.exe / AppImage) and attaches it to the release.
      - name: Generate SHA-256 sidecars for installer assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          target_root="apps/desktop/src-tauri/target"
          # Portable across bash 3.2 (macOS) — no `mapfile`.
          hash_cmd=""
          if command -v sha256sum >/dev/null 2>&1; then
            hash_cmd="sha256sum"
          elif command -v shasum >/dev/null 2>&1; then
            hash_cmd="shasum -a 256"
          else
            echo "::error::Neither sha256sum nor shasum found on runner."
            exit 1
          fi
          found=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            found=$((found + 1))
            dir="$(dirname "$f")"
            base="$(basename "$f")"
            sha_file="${f}.sha256"
            (cd "$dir" && $hash_cmd "$base") > "$sha_file"
            echo "→ $(cat "$sha_file")"
            gh release upload "$TAG" "$sha_file" --clobber --repo "$GITHUB_REPOSITORY"
          done < <(find "$target_root" -type f \( \
            -path '*/release/bundle/dmg/*.dmg' -o \
            -path '*/release/bundle/appimage/*.AppImage' -o \
            -path '*/release/bundle/nsis/*.exe' \
          \) 2>/dev/null)
          if [ "$found" -eq 0 ]; then
            echo "::error::No installer artifact found under $target_root — updater sidecars cannot be generated."
            exit 1
          fi
