# CI for orchestrator: check, clippy, and test.

name: CI orchestrator

on:
  push:
    branches: [main]
    paths:
      - 'crates/orchestrator/**'
      - 'crates/provider-registry/**'
      - 'crates/standards-loader/**'
  pull_request:
    paths:
      - 'crates/orchestrator/**'
      - 'crates/provider-registry/**'
      - 'crates/standards-loader/**'
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check-and-test:
    runs-on: ubuntu-latest
    name: check + clippy + test

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: CI orchestrator
        uses: ./.github/actions/rust-ci
        with:
          manifest-path: crates/orchestrator/Cargo.toml
