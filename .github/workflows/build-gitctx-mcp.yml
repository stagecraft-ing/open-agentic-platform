# Build gitctx-mcp sidecar binaries for all supported platforms.
# Mirrors build-axiomregent.yml for the MCP server binary.

name: Build gitctx-mcp binaries

on:
  push:
    branches: [main]
    paths:
      - 'crates/gitctx/**'
  pull_request:
    paths:
      - 'crates/gitctx/**'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: gitctx-mcp-aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: gitctx-mcp-x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: gitctx-mcp-x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: gitctx-mcp-x86_64-pc-windows-msvc.exe

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.target }}

    steps:
      - uses: actions/checkout@v4

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      # gitctx-mcp depends on openssl-sys via reqwest/octocrab
      - name: Install OpenSSL dev (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Build gitctx-mcp
        run: cargo build --release --target ${{ matrix.target }} --manifest-path crates/gitctx/Cargo.toml

      - name: Copy binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp crates/gitctx/target/${{ matrix.target }}/release/gitctx-mcp apps/desktop/src-tauri/binaries/${{ matrix.binary }}
          strip apps/desktop/src-tauri/binaries/${{ matrix.binary }} || true
          ls -lh apps/desktop/src-tauri/binaries/${{ matrix.binary }}

      - name: Copy binary (Windows)
        if: runner.os == 'Windows'
        run: |
          copy crates\gitctx\target\${{ matrix.target }}\release\gitctx-mcp.exe apps\desktop\src-tauri\binaries\${{ matrix.binary }}
          dir apps\desktop\src-tauri\binaries\${{ matrix.binary }}
        shell: cmd

      - name: Smoke test
        run: |
          perl -e 'alarm shift; exec @ARGV' 3 apps/desktop/src-tauri/binaries/${{ matrix.binary }} 2>&1 || true
        shell: bash
        continue-on-error: true

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: apps/desktop/src-tauri/binaries/${{ matrix.binary }}
          retention-days: 30

  # aarch64-linux requires cross-compilation (no native GitHub runner)
  build-linux-arm64:
    runs-on: ubuntu-latest
    name: aarch64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cross-compilation tools and OpenSSL
        run: |
          sudo dpkg --add-architecture arm64
          sudo sed -i 's/^deb http/deb [arch=amd64] http/' /etc/apt/sources.list /etc/apt/sources.list.d/*.list 2>/dev/null || true
          echo "deb [arch=arm64] http://ports.ubuntu.com/ jammy main restricted universe multiverse" | sudo tee /etc/apt/sources.list.d/arm64-ports.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ jammy-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/arm64-ports.list
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libssl-dev:arm64

      - name: Build gitctx-mcp
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          PKG_CONFIG_ALLOW_CROSS: '1'
          PKG_CONFIG_PATH: /usr/lib/aarch64-linux-gnu/pkgconfig
          OPENSSL_LIB_DIR: /usr/lib/aarch64-linux-gnu
          OPENSSL_INCLUDE_DIR: /usr/include
        run: cargo build --release --target aarch64-unknown-linux-gnu --manifest-path crates/gitctx/Cargo.toml

      - name: Copy binary
        run: |
          cp crates/gitctx/target/aarch64-unknown-linux-gnu/release/gitctx-mcp apps/desktop/src-tauri/binaries/gitctx-mcp-aarch64-unknown-linux-gnu
          ls -lh apps/desktop/src-tauri/binaries/gitctx-mcp-aarch64-unknown-linux-gnu

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: gitctx-mcp-aarch64-unknown-linux-gnu
          path: apps/desktop/src-tauri/binaries/gitctx-mcp-aarch64-unknown-linux-gnu
          retention-days: 30
