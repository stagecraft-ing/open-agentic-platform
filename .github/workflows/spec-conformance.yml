# Spec: 001-spec-compiler-mvp
# Spec: 002-registry-consumer-mvp
# Spec: 006-conformance-lint-mvp
#
# Machine-check emitted JSON against Feature 000 schemas (see
# specs/001-spec-compiler-mvp/tasks.md task T014). Plus registry-consumer
# contract subsets, spec-lint, codebase-indexer compile + tests, and policy
# compiler tests.

name: Spec conformance

on:
  push:
    branches: [main]
    paths:
      - 'tools/**'
      - 'specs/**'
      - 'build/**'
  pull_request:
    paths:
      - 'tools/**'
      - 'specs/**'
      - 'build/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  spec-compiler:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # pinned for rust-toolchain.toml lockstep
        with:
          toolchain: '1.95.0'

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          shared-key: spec-conformance

      - name: Build spec-compiler
        run: cargo build --release --manifest-path tools/spec-compiler/Cargo.toml

      - name: Emit registry (smoke)
        run: ./tools/spec-compiler/target/release/spec-compiler compile

      - name: Tests (golden, schema conformance, exit codes)
        run: cargo test --manifest-path tools/spec-compiler/Cargo.toml

      - name: Build registry-consumer (Feature 002)
        run: cargo build --release --manifest-path tools/registry-consumer/Cargo.toml

      - name: Registry consumer smoke + tests
        run: |
          ./tools/registry-consumer/target/release/registry-consumer list | head -n 5
          cargo test --manifest-path tools/registry-consumer/Cargo.toml

      - name: Registry consumer contract subsets (governance gate)
        run: |
          cargo test --manifest-path tools/registry-consumer/Cargo.toml --all readme_
          cargo test --manifest-path tools/registry-consumer/Cargo.toml --all error_contract_
          cargo test --manifest-path tools/registry-consumer/Cargo.toml --all shape_contract_
          cargo test --manifest-path tools/registry-consumer/Cargo.toml --all help_contract_
          cargo test --manifest-path tools/registry-consumer/Cargo.toml --all arg_contract_
          cargo test --manifest-path tools/registry-consumer/Cargo.toml --all version_contract_
          cargo test --manifest-path tools/registry-consumer/Cargo.toml --all default_path_contract_
          cargo test --manifest-path tools/registry-consumer/Cargo.toml --all allow_invalid_contract_
          cargo test --manifest-path tools/registry-consumer/Cargo.toml --all sorting_contract_
          cargo test --manifest-path tools/registry-consumer/Cargo.toml --all channel_contract_

      - name: Build spec-lint (Feature 006)
        run: cargo build --release --manifest-path tools/spec-lint/Cargo.toml

      - name: spec-lint (warnings non-blocking)
        run: ./tools/spec-lint/target/release/spec-lint

      - name: spec-lint tests
        run: cargo test --manifest-path tools/spec-lint/Cargo.toml

      # Codebase-indexer staleness check moved to ci-codebase-index.yml
      # (broader path filter — see spec H2 / 101). Smoke + tests still run
      # here because they belong to the spec-tooling conformance bundle.
      - name: Build codebase-indexer (Feature 101)
        run: cargo build --release --manifest-path tools/codebase-indexer/Cargo.toml

      - name: Emit codebase index (smoke)
        run: ./tools/codebase-indexer/target/release/codebase-indexer compile

      - name: Codebase index tests
        run: cargo test --manifest-path tools/codebase-indexer/Cargo.toml

      - name: Build policy-compiler
        run: cargo build --release --manifest-path tools/policy-compiler/Cargo.toml

      - name: Policy compiler tests
        run: cargo test --manifest-path tools/policy-compiler/Cargo.toml
