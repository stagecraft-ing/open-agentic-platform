# Spec: 001-spec-compiler-mvp
# Spec: 002-registry-consumer-mvp
# Spec: 006-conformance-lint-mvp
#
# Machine-check emitted JSON against Feature 000 schemas (see
# specs/001-spec-compiler-mvp/tasks.md task T014). Plus registry-consumer
# contract subsets, spec-lint, codebase-indexer compile + tests, and policy
# compiler tests.

name: Spec conformance

on:
  push:
    branches: [main]
    paths:
      - 'tools/**'
      - 'specs/**'
      - '.derived/**'
  pull_request:
    paths:
      - 'tools/**'
      - 'specs/**'
      - '.derived/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  spec-compiler:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # pinned for rust-toolchain.toml lockstep
        with:
          toolchain: '1.95.0'

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: spec-conformance

      - name: Build spec-compiler
        run: cargo build --release --manifest-path tools/spec-spine/spec-compiler/Cargo.toml --target-dir tools/spec-spine/spec-compiler/target

      - name: Emit registry (smoke)
        run: ./tools/spec-spine/spec-compiler/target/release/spec-compiler compile

      - name: Build oap-registry-enrich (Cut D W-06a)
        run: cargo build --release --manifest-path tools/oap/oap-registry-enrich/Cargo.toml --target-dir tools/oap/oap-registry-enrich/target

      - name: Emit registry-oap.json (OAP-specific overlay)
        run: ./tools/oap/oap-registry-enrich/target/release/oap-registry-enrich

      - name: Tests (golden, schema conformance, exit codes)
        run: cargo test --manifest-path tools/spec-spine/spec-compiler/Cargo.toml

      - name: Build registry-consumer (Feature 002)
        run: cargo build --release --manifest-path tools/spec-spine/registry-consumer/Cargo.toml --target-dir tools/spec-spine/registry-consumer/target

      - name: Registry consumer smoke + tests
        run: |
          ./tools/spec-spine/registry-consumer/target/release/registry-consumer list | head -n 5
          cargo test --manifest-path tools/spec-spine/registry-consumer/Cargo.toml

      - name: Registry consumer contract subsets (governance gate)
        run: |
          cargo test --manifest-path tools/spec-spine/registry-consumer/Cargo.toml --all readme_
          cargo test --manifest-path tools/spec-spine/registry-consumer/Cargo.toml --all error_contract_
          cargo test --manifest-path tools/spec-spine/registry-consumer/Cargo.toml --all shape_contract_
          cargo test --manifest-path tools/spec-spine/registry-consumer/Cargo.toml --all help_contract_
          cargo test --manifest-path tools/spec-spine/registry-consumer/Cargo.toml --all arg_contract_
          cargo test --manifest-path tools/spec-spine/registry-consumer/Cargo.toml --all version_contract_
          cargo test --manifest-path tools/spec-spine/registry-consumer/Cargo.toml --all default_path_contract_
          cargo test --manifest-path tools/spec-spine/registry-consumer/Cargo.toml --all allow_invalid_contract_
          cargo test --manifest-path tools/spec-spine/registry-consumer/Cargo.toml --all sorting_contract_
          cargo test --manifest-path tools/spec-spine/registry-consumer/Cargo.toml --all channel_contract_

      - name: Build spec-lint (Feature 006)
        run: cargo build --release --manifest-path tools/spec-spine/spec-lint/Cargo.toml --target-dir tools/spec-spine/spec-lint/target

      - name: spec-lint (strict; spec 128 amends 006)
        run: ./tools/spec-spine/spec-lint/target/release/spec-lint --fail-on-warn

      - name: spec-lint tests
        run: cargo test --manifest-path tools/spec-spine/spec-lint/Cargo.toml

      # Codebase-indexer staleness check moved to ci-codebase-index.yml
      # (broader path filter — see spec H2 / 101). Smoke + tests still run
      # here because they belong to the spec-tooling conformance bundle.
      - name: Build codebase-indexer (Feature 101)
        run: cargo build --release --manifest-path tools/spec-spine/codebase-indexer/Cargo.toml --target-dir tools/spec-spine/codebase-indexer/target

      - name: Emit codebase index (smoke)
        run: ./tools/spec-spine/codebase-indexer/target/release/codebase-indexer compile

      - name: Build oap-code-index-enrich (Cut D W-07a)
        run: cargo build --release --manifest-path tools/oap/oap-code-index-enrich/Cargo.toml --target-dir tools/oap/oap-code-index-enrich/target

      - name: Emit index-oap.json (OAP-specific overlay)
        run: ./tools/oap/oap-code-index-enrich/target/release/oap-code-index-enrich

      - name: Codebase index tests
        run: cargo test --manifest-path tools/spec-spine/codebase-indexer/Cargo.toml

      - name: Build policy-compiler
        run: cargo build --release --manifest-path tools/oap/policy-compiler/Cargo.toml --target-dir tools/oap/policy-compiler/target

      - name: Policy compiler tests
        run: cargo test --manifest-path tools/oap/policy-compiler/Cargo.toml
