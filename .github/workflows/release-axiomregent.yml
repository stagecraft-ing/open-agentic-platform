# Spec: 037-cross-platform-axiomregent
# Spec: 117-release-artifact-attestations
#
# Release axiomregent MCP server as standalone OS-specific binaries.
# Triggered by pushing an axiomregent version tag (e.g. axiomregent-v0.1.0).
#
# Each binary ships with a CycloneDX SBOM and a SLSA build-provenance
# attestation per spec 117 (M2). Verify with:
#   gh attestation verify <file> --repo <owner>/<repo>

name: Release axiomregent

on:
  push:
    tags:
      - 'axiomregent-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. axiomregent-v0.1.0)'
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build for macOS, Linux x86_64, Windows ────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          # x86_64-apple-darwin removed — Intel Mac builds dropped (2026-04-15)
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    name: build / ${{ matrix.target }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: '1.95.0'
          targets: ${{ matrix.target }}
          components: clippy, rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: axiomregent-${{ matrix.target }}

      - name: Build axiomregent
        run: cargo build --release --target ${{ matrix.target }} --manifest-path crates/axiomregent/Cargo.toml

      - name: Stage binary
        shell: bash
        run: |
          EXT=""
          if [ "${{ matrix.target }}" = "x86_64-pc-windows-msvc" ]; then EXT=".exe"; fi
          mkdir -p dist
          cp "crates/target/${{ matrix.target }}/release/axiomregent${EXT}" \
             "dist/axiomregent-${{ matrix.target }}${EXT}"
          if [ "${{ runner.os }}" != "Windows" ]; then
            strip "dist/axiomregent-${{ matrix.target }}${EXT}" || true
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: axiomregent-${{ matrix.target }}
          path: dist/
          retention-days: 5

  # ── Linux ARM64 (cross-compiled) ──────────────────────────────────
  build-linux-arm64:
    runs-on: ubuntu-24.04
    name: build / aarch64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: '1.95.0'
          targets: aarch64-unknown-linux-gnu
          components: clippy, rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: axiomregent-aarch64-unknown-linux-gnu

      - name: Install cross-compilation tools and OpenSSL
        uses: ./.github/actions/linux-arm64-cross

      - name: Build axiomregent
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          PKG_CONFIG_ALLOW_CROSS: '1'
          PKG_CONFIG_PATH_aarch64_unknown_linux_gnu: /usr/lib/aarch64-linux-gnu/pkgconfig
          AARCH64_UNKNOWN_LINUX_GNU_OPENSSL_LIB_DIR: /usr/lib/aarch64-linux-gnu
          AARCH64_UNKNOWN_LINUX_GNU_OPENSSL_INCLUDE_DIR: /usr/include
        run: cargo build --release --target aarch64-unknown-linux-gnu --manifest-path crates/axiomregent/Cargo.toml

      - name: Stage binary
        run: |
          mkdir -p dist
          cp crates/target/aarch64-unknown-linux-gnu/release/axiomregent \
             dist/axiomregent-aarch64-unknown-linux-gnu

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: axiomregent-aarch64-unknown-linux-gnu
          path: dist/
          retention-days: 5

  # ── Publish GitHub Release ────────────────────────────────────────
  publish:
    needs: [build, build-linux-arm64]
    runs-on: ubuntu-latest
    name: publish release
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write       # spec 117 — Sigstore identity
      attestations: write   # spec 117 — provenance attestation upload

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: axiomregent-*
          merge-multiple: true
          path: dist/

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: List artifacts
        run: ls -lh dist/

      # Spec 117 — CycloneDX SBOM. The crates/ workspace lockfile
      # (crates/Cargo.lock) is gitignored — see .gitignore — so a fresh CI
      # checkout has no Cargo.lock for syft's rust-cargo-lock-cataloger to
      # walk. Generate it deterministically from the workspace manifest
      # before the scan. `--offline` keeps the step fast and avoids registry
      # round-trips; cargo only resolves the dep graph already pinned in
      # Cargo.toml constraints. Without this step syft returns
      # `components: 0` (smoke #1, #2, #3 all hit this).
      - name: Rust toolchain (lockfile generation)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # pinned for rust-toolchain.toml lockstep
        with:
          toolchain: '1.95.0'

      - name: Generate workspace Cargo.lock for SBOM scan
        run: cargo generate-lockfile --manifest-path crates/Cargo.toml

      # Scan the whole workspace, not just axiomregent's source tree, so
      # syft sees crates/Cargo.lock (one level above the member crate).
      # The SBOM lists every workspace member's transitive dependencies —
      # accurate reflection of what a built axiomregent binary actually
      # links against (orchestrator, policy-kernel, etc.).
      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0 (ships syft 1.30+; v0.17.8's syft 1.11 returned 0 rust components)
        with:
          path: crates
          format: cyclonedx-json
          output-file: dist/sbom-axiomregent.cdx.json

      # Spec 117 — SLSA build-provenance attestation per binary.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2 # v2.2.3
        with:
          subject-path: |
            dist/axiomregent-aarch64-apple-darwin
            dist/axiomregent-x86_64-unknown-linux-gnu
            dist/axiomregent-aarch64-unknown-linux-gnu
            dist/axiomregent-x86_64-pc-windows-msvc.exe

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          gh release create "$TAG" dist/* \
            --repo "${{ github.repository }}" \
            --title "$TAG" \
            --generate-notes \
            --notes "## axiomregent MCP Server

          Standalone binaries for the axiomregent MCP server.

          ### Downloads
          | Platform | Binary |
          |----------|--------|
          | macOS (Apple Silicon) | \`axiomregent-aarch64-apple-darwin\` |
          | Linux (x86_64) | \`axiomregent-x86_64-unknown-linux-gnu\` |
          | Linux (ARM64) | \`axiomregent-aarch64-unknown-linux-gnu\` |
          | Windows (x86_64) | \`axiomregent-x86_64-pc-windows-msvc.exe\` |

          ### Usage
          \`\`\`bash
          chmod +x axiomregent-*  # Unix only
          ./axiomregent-<target>
          \`\`\`"
