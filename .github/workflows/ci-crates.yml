# Spec: 067-tool-definition-registry
# Spec: 071-skill-command-factory
# Spec: 075-factory-workflow-engine
# Spec: 054-agent-frontmatter-schema
# Spec: 042-multi-provider-agent-registry
# Spec: 135-fast-ci-as-default
#
# CI for the `crates/` workspace. Spec 135 FR-05 collapsed the previous
# 7-element matrix into a single workspace job: `cargo --workspace
# --manifest-path crates/Cargo.toml` validates all 18 workspace members
# in one pass, closing the ghost-crate gap on the GitHub side.

name: CI crates

on:
  push:
    branches: [main]
    paths:
      - 'crates/**'
  pull_request:
    paths:
      - 'crates/**'
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  workspace:
    runs-on: ubuntu-latest
    name: crates workspace
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: CI crates workspace
        uses: ./.github/actions/rust-ci
        with:
          manifest-path: crates/Cargo.toml
          workspace: 'true'
          cache-shared-key: ci-crates-workspace

      # Spec 111 §2.1 Phase 2 — stagecraft's `CatalogFrontmatter` wraps a
      # ts-rs mirror of the Rust `UnifiedFrontmatter`. `cargo test` on the
      # workspace auto-regenerates the TS files via the agent-frontmatter
      # crate; this step fails the build if the committed mirror drifts
      # from the Rust source of truth. With workspace mode this runs
      # unconditionally — agent-frontmatter is always part of the test set.
      - name: agent-frontmatter TS drift gate
        run: make ci-agent-frontmatter-ts
