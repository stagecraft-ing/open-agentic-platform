# CI for OPC desktop app: Rust check/clippy/test + TypeScript check + vitest.

name: CI Desktop

on:
  push:
    branches: [main]
    paths:
      - 'apps/desktop/**'
      - 'crates/**'
      - 'packages/**'
  pull_request:
    paths:
      - 'apps/desktop/**'
      - 'crates/**'
      - 'packages/**'
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    runs-on: macos-latest  # macOS deps: cocoa, objc, window-vibrancy, tauri-nspanel
    name: rust / check + clippy + test

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Create dist stub for web_server include_str!
        run: |
          mkdir -p apps/desktop/dist
          echo '<!doctype html><html><body>stub</body></html>' > apps/desktop/dist/index.html

      - name: Create sidecar binary stub for Tauri build.rs
        run: |
          mkdir -p apps/desktop/src-tauri/binaries
          touch apps/desktop/src-tauri/binaries/axiomregent-aarch64-apple-darwin
          chmod +x apps/desktop/src-tauri/binaries/axiomregent-aarch64-apple-darwin

      - name: cargo check
        run: cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml

      - name: cargo clippy
        run: cargo clippy --manifest-path apps/desktop/src-tauri/Cargo.toml -- -A dead_code -D warnings

      - name: cargo test (lib)
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml --lib

      - name: cargo test (doc)
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml --doc

      - name: Version alignment check
        shell: bash
        run: |
          CARGO_VERSION=$(grep '^version' apps/desktop/src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          PKG_VERSION=$(node -p "require('./apps/desktop/package.json').version")
          if [ "$CARGO_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Version mismatch: Cargo.toml=$CARGO_VERSION package.json=$PKG_VERSION"
            exit 1
          fi
          echo "Versions aligned: $CARGO_VERSION"

  typescript:
    runs-on: ubuntu-latest
    name: typescript / check + test

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@4f4305e1fe60ad818b8ae6fc4a697cc47eab0b2d # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        run: pnpm --filter @opc/desktop exec tsc --noEmit

      - name: Vitest
        run: pnpm --filter @opc/desktop test
