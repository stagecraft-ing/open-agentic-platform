# Spec: 086-open-source-launch
# Spec: 117-release-artifact-attestations
#
# Release standalone CLI tools alongside the desktop app.
# Attaches spec-compiler, registry-consumer, spec-lint, policy-compiler, and
# codebase-indexer binaries to the same GitHub Release created by
# release-desktop.yml.
#
# M8 sequencing fix: triggered by `workflow_run` on Release Desktop's
# successful completion (rather than by tag push) so the release object
# always exists when this workflow uploads assets — eliminating the prior
# 10-min poll-then-create race.
#
# Each archive ships with a CycloneDX SBOM and SLSA build-provenance
# attestation per spec 117. workflow_dispatch retains the manual entry
# point for backfill.

name: Release Tools

on:
  workflow_run:
    workflows: ['Release Desktop']
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to attach assets to (e.g. v0.2.1)'
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Resolve the tag once — for workflow_run we read the upstream's head_branch
  # (which is the tag for tag-triggered runs); for workflow_dispatch we read
  # the input. All downstream jobs gate on this and read the resolved value.
  resolve-tag:
    runs-on: ubuntu-latest
    name: resolve / tag
    timeout-minutes: 5
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      ref: ${{ steps.tag.outputs.ref }}
    steps:
      - id: tag
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          UPSTREAM_BRANCH: ${{ github.event.workflow_run.head_branch }}
          UPSTREAM_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
            REF="refs/tags/$TAG"
          else
            TAG="$UPSTREAM_BRANCH"
            REF="$UPSTREAM_SHA"
          fi
          if [ -z "$TAG" ]; then
            echo "::error::No release tag resolved."
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

  build:
    needs: resolve-tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    name: tools / ${{ matrix.target }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.resolve-tag.outputs.ref }}

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # pinned for rust-toolchain.toml lockstep
        with:
          toolchain: '1.95.0'
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          shared-key: tools-${{ matrix.target }}

      - name: Build spec-compiler
        run: cargo build --release --target ${{ matrix.target }} --manifest-path tools/spec-compiler/Cargo.toml

      - name: Build registry-consumer
        run: cargo build --release --target ${{ matrix.target }} --manifest-path tools/registry-consumer/Cargo.toml

      - name: Build spec-lint
        run: cargo build --release --target ${{ matrix.target }} --manifest-path tools/spec-lint/Cargo.toml

      - name: Build policy-compiler
        run: cargo build --release --target ${{ matrix.target }} --manifest-path tools/policy-compiler/Cargo.toml

      - name: Build codebase-indexer
        run: cargo build --release --target ${{ matrix.target }} --manifest-path tools/codebase-indexer/Cargo.toml

      - name: Determine extension
        id: ext
        shell: bash
        run: |
          if [ "${{ matrix.target }}" = "x86_64-pc-windows-msvc" ]; then
            echo "ext=.exe" >> "$GITHUB_OUTPUT"
          else
            echo "ext=" >> "$GITHUB_OUTPUT"
          fi

      - name: Stage and strip binaries
        shell: bash
        run: |
          mkdir -p dist
          EXT="${{ steps.ext.outputs.ext }}"
          TARGET="${{ matrix.target }}"

          for tool in spec-compiler registry-consumer spec-lint policy-compiler codebase-indexer; do
            # Each tool has its own target dir under its manifest path
            SRC="tools/${tool}/target/${TARGET}/release/${tool}${EXT}"
            DEST="dist/${tool}-${TARGET}${EXT}"
            cp "$SRC" "$DEST"
            if [ "${{ runner.os }}" != "Windows" ]; then
              strip "$DEST" || true
            fi
          done

          ls -lh dist/

      - name: Upload tool artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: tools-${{ matrix.target }}
          path: dist/
          retention-days: 5

  # ── Attach all tool binaries to the GitHub Release ─────────────────
  publish:
    needs: [resolve-tag, build]
    runs-on: ubuntu-latest
    name: publish to release
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write       # spec 117 — Sigstore identity
      attestations: write   # spec 117 — provenance upload

    steps:
      - name: Download all tool artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: tools-*
          merge-multiple: true
          path: dist/

      - name: List artifacts
        run: ls -lhR dist/

      # Create archives per platform for cleaner downloads
      - name: Package archives
        shell: bash
        run: |
          mkdir -p release
          cd dist

          for target in aarch64-apple-darwin x86_64-unknown-linux-gnu; do
            tar czf "../release/oap-tools-${target}.tar.gz" *-${target}
          done

          # Windows gets a zip
          if ls *-x86_64-pc-windows-msvc* 1>/dev/null 2>&1; then
            zip "../release/oap-tools-x86_64-pc-windows-msvc.zip" *-x86_64-pc-windows-msvc*
          fi

          ls -lh ../release/

      # Spec 117 — SBOM scoped to the tools/ source tree so syft reads each
      # tool's Cargo.toml + the shared frontmatter Cargo.toml for crate-level
      # component data. Scanning the staged dist/ binaries (the prior scope)
      # produces an empty SBOM because release binaries are stripped.
      - name: Checkout source for SBOM scan
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.resolve-tag.outputs.ref }}
          path: src

      - name: Generate tools SBOM (CycloneDX)
        uses: anchore/sbom-action@61119d458adab75f756bc0b9e4bde25725f86a7a # v0.17.8
        with:
          path: src/tools
          format: cyclonedx-json
          output-file: release/sbom-tools.cdx.json

      # Spec 117 — provenance attestation per archive.
      - name: Attest tools provenance
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2 # v2.2.3
        with:
          subject-path: 'release/oap-tools-*'

      # M8 fix: with workflow_run gating on Release Desktop completion the
      # release is guaranteed to exist; the prior 10-minute poll-then-create
      # fallback is removed. workflow_dispatch users still get the upload —
      # they must have created the release themselves first.
      - name: Upload tool archives + SBOM to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.resolve-tag.outputs.tag }}
        run: |
          gh release upload "$TAG" \
            release/* \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
