# CD for deployd-api-rs: build Docker image, push to GHCR, deploy to Hetzner K3s.
#
# Required GitHub secrets:
#   KUBECONFIG_HETZNER  -- contents of platform/infra/hetzner/kubeconfig (base64-encoded)
#   GHCR_PAT            -- PAT with read:packages scope for pulling images from GHCR
#
# Required GitHub environment:
#   "production"         -- create with protection rules for manual approval on deploy

name: CD deployd-api-rs

on:
  push:
    branches: [main]
    paths:
      - 'platform/services/deployd-api-rs/**'
      - 'platform/charts/deployd-api/**'
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy after build (true/false)'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

concurrency:
  group: cd-deployd-api-rs-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/stagecraft-ing/open-agentic-platform/deployd-api

jobs:
  # -- CI gate ---------------------------------------------------------------
  ci:
    uses: ./.github/workflows/ci-deployd-api-rs.yml

  # -- Build & push Docker image ---------------------------------------------
  build-and-push:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.sha-tag }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Compute image tags
        id: meta
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "sha-tag=sha-${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "Building tags: sha-${SHA_SHORT}, latest"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: platform/services/deployd-api-rs
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.sha-tag }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # -- Deploy to Hetzner K3s -------------------------------------------------
  deploy-hetzner:
    needs: build-and-push
    if: github.event_name == 'push' || github.event.inputs.deploy == 'true'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Helm
        uses: azure/setup-helm@f0accbfd55e3332a28f721b8202b1016cecf90d5 # v5

      - name: Deploy to Hetzner
        uses: ./.github/actions/helm-deploy
        with:
          namespace: deployd-system
          release-name: deployd-api
          chart-path: platform/charts/deployd-api
          values-files: platform/charts/deployd-api/values.yaml,platform/charts/deployd-api/values-hetzner.yaml
          helm-set-args: >-
            --set image.repository=${{ env.IMAGE }}
            --set image.tag=${{ needs.build-and-push.outputs.image-tag }}
            --set "ingress.host=deploy.${{ secrets.DOMAIN }}"
            --set "oidc.endpoint=https://auth.${{ secrets.DOMAIN }}"
            --set "oidc.audience=https://deploy.${{ secrets.DOMAIN }}"
          app-label: deployd-api
          kubeconfig-b64: ${{ secrets.KUBECONFIG_HETZNER }}
          ghcr-pat: ${{ secrets.GHCR_PAT }}
          ghcr-username: ${{ github.actor }}
          pull-secret-name: ghcr-pull-secret
          timeout: '300s'
