# Spec: 136-tenant-hello-demo-service
#
# CD for tenant-hello: build Docker image and push to GHCR. tenant-hello
# is the deliberately-minimal reference fixture (spec 136 FR-001); the
# image needs to exist on GHCR for stagecraft's tenant-deploy pipeline
# to round-trip the C-001..C-005 contract against it. No deploy step:
# tenant-hello is deployed by stagecraft + deployd-api per project, not
# by a static CD pipeline against a fixed namespace.

name: CD tenant-hello

on:
  push:
    branches: [main]
    paths:
      - 'platform/services/tenant-hello/**'
      - '.github/workflows/cd-tenant-hello.yml'
  workflow_dispatch:

concurrency:
  group: cd-tenant-hello-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository }}/tenant-hello

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.sha-tag }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Compute image tags
        id: meta
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "sha-tag=sha-${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "Building tags: sha-${SHA_SHORT}, latest"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: platform/services/tenant-hello
          file: platform/services/tenant-hello/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.sha-tag }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
