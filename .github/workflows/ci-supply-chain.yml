# Spec: 116-supply-chain-policy-gates
#
# Supply-chain gates: cargo-deny across every Rust manifest, plus pnpm/npm
# audit at the package-manager layer. Mirrored in Makefile `ci-supply-chain`.
#
# Posture: blocking from day 0. The 30-day warn-only window planned in the
# original spec was collapsed on 2026-05-02 after a clean dry-run (zero
# `--audit-level=high` findings across all three audits). See spec 116 §9.
#
# Cron: Monday 12:00 UTC pulls a fresh advisory-db even on a quiet week.

name: CI supply-chain

on:
  push:
    branches: [main]
    paths:
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '**/package.json'
      - '**/pnpm-lock.yaml'
      - '**/package-lock.json'
      - 'deny.toml'
      - '.github/workflows/ci-supply-chain.yml'
  pull_request:
    paths:
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '**/package.json'
      - '**/pnpm-lock.yaml'
      - '**/package-lock.json'
      - 'deny.toml'
      - '.github/workflows/ci-supply-chain.yml'
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  cargo-deny:
    runs-on: ubuntu-latest
    name: cargo-deny / advisories + bans + licenses + sources
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # pinned for rust-toolchain.toml lockstep
        with:
          toolchain: '1.95.0'

      - name: Cache advisory-db
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cargo/advisory-db
          key: advisory-db-${{ github.run_id }}
          restore-keys: advisory-db-

      - name: Install cargo-deny
        # 0.19 added support for CVSS v4.0 advisories (now common in
        # RustSec); 0.16 fails to parse the advisory-db on first hit.
        run: cargo install cargo-deny --locked --version '^0.19'

      # No top-level Cargo.toml: iterate over every Rust manifest the
      # rest of CI compiles. Workspace `crates/Cargo.toml` covers all 16
      # member crates in one pass.
      - name: Run cargo-deny
        run: |
          set -u
          manifests=(
            crates/Cargo.toml
            platform/services/deployd-api-rs/Cargo.toml
            apps/desktop/src-tauri/Cargo.toml
            tools/spec-compiler/Cargo.toml
            tools/registry-consumer/Cargo.toml
            tools/spec-lint/Cargo.toml
            tools/codebase-indexer/Cargo.toml
            tools/policy-compiler/Cargo.toml
            tools/adapter-scopes-compiler/Cargo.toml
            tools/ci-parity-check/Cargo.toml
            tools/shared/frontmatter/Cargo.toml
          )
          rc=0
          for m in "${manifests[@]}"; do
            echo "::group::cargo deny check ($m)"
            if ! cargo deny --manifest-path "$m" check; then
              rc=1
            fi
            echo "::endgroup::"
          done
          exit $rc

  pnpm-audit:
    runs-on: ubuntu-latest
    name: pnpm-audit / desktop + packages
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@4f4305e1fe60ad818b8ae6fc4a697cc47eab0b2d # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: pnpm audit
        run: pnpm audit --audit-level=high

  npm-audit-stagecraft:
    runs-on: ubuntu-latest
    name: npm-audit / stagecraft
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: platform/services/stagecraft/package-lock.json

      - name: npm ci
        run: npm ci
        working-directory: platform/services/stagecraft

      - name: npm audit
        working-directory: platform/services/stagecraft
        run: npm audit --audit-level=high
