# Spec: 116-supply-chain-policy-gates
#
# Supply-chain gates: cargo-deny across every Rust manifest, plus pnpm/npm
# audit at the package-manager layer. Mirrored in Makefile `ci-supply-chain`.
#
# Posture (until 2026-05-28):
#   - 30-day warn window: jobs run with `continue-on-error: true` so
#     violations surface as advisory annotations, not blockers.
#   - On 2026-05-28 a follow-up PR sets `vars.SUPPLY_CHAIN_BLOCKING=true`
#     (via a repo variable) and removes the continue-on-error block.
#
# Cron: Monday 12:00 UTC pulls a fresh advisory-db even on a quiet week.

name: CI supply-chain

on:
  push:
    branches: [main]
    paths:
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '**/package.json'
      - '**/pnpm-lock.yaml'
      - '**/package-lock.json'
      - 'deny.toml'
      - '.github/workflows/ci-supply-chain.yml'
  pull_request:
    paths:
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '**/package.json'
      - '**/pnpm-lock.yaml'
      - '**/package-lock.json'
      - 'deny.toml'
      - '.github/workflows/ci-supply-chain.yml'
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  cargo-deny:
    runs-on: ubuntu-latest
    name: cargo-deny / advisories + bans + licenses + sources
    timeout-minutes: 15
    continue-on-error: ${{ vars.SUPPLY_CHAIN_BLOCKING != 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # pinned for rust-toolchain.toml lockstep
        with:
          toolchain: '1.95.0'

      - name: Cache advisory-db
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cargo/advisory-db
          key: advisory-db-${{ github.run_id }}
          restore-keys: advisory-db-

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked --version '^0.16'

      - name: Run cargo-deny
        run: cargo deny check

  pnpm-audit:
    runs-on: ubuntu-latest
    name: pnpm-audit / desktop + packages
    timeout-minutes: 10
    continue-on-error: ${{ vars.SUPPLY_CHAIN_BLOCKING != 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@4f4305e1fe60ad818b8ae6fc4a697cc47eab0b2d # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: pnpm

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: pnpm audit
        run: pnpm audit --audit-level=high

  npm-audit-stagecraft:
    runs-on: ubuntu-latest
    name: npm-audit / stagecraft
    timeout-minutes: 10
    continue-on-error: ${{ vars.SUPPLY_CHAIN_BLOCKING != 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: platform/services/stagecraft/package-lock.json

      - name: npm ci
        run: npm ci
        working-directory: platform/services/stagecraft

      - name: npm audit
        run: npm audit --audit-level=high
        working-directory: platform/services/stagecraft
