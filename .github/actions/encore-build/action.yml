name: Encore build (stagecraft)
description: >
  Composite action: build the React Router frontend, install a pinned Encore
  CLI (cached), then run `encore build docker` against the given infra config.
  Caller must run actions/checkout, actions/setup-node, and `npm ci` before
  invoking this action.

inputs:
  working-directory:
    description: Path to the stagecraft service root
    required: false
    default: platform/services/stagecraft
  encore-version:
    description: Encore CLI version to install
    required: true
  config:
    description: Path to infra.config.*.json (relative to working-directory)
    required: true
  image-tag:
    description: Full image reference to tag the built image with (e.g. ghcr.io/foo/bar:sha-abc or stagecraft-ci:pr-123)
    required: true

runs:
  using: composite
  steps:
    - name: Build frontend
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: cd web && npx react-router build

    # Cache the installed Encore CLI to avoid hammering the installer on
    # every build. Cache key is scoped by OS and version so a version bump
    # invalidates cleanly.
    - name: Cache Encore CLI
      id: cache-encore
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: ~/.encore
        key: encore-${{ runner.os }}-${{ inputs.encore-version }}

    # Install from the CloudFront tarball directly rather than piping
    # install.sh from encore.dev. The Vercel-fronted installer has
    # intermittently returned 403s, and install.sh itself just downloads
    # this same tarball. curl --retry covers transient edge failures.
    - name: Install Encore CLI
      if: steps.cache-encore.outputs.cache-hit != 'true'
      shell: bash
      env:
        ENCORE_VERSION: ${{ inputs.encore-version }}
      run: |
        set -euo pipefail
        install_dir="$HOME/.encore"
        mkdir -p "$install_dir/bin"
        url="https://d2f391esomvqpi.cloudfront.net/encore-${ENCORE_VERSION}-linux_amd64.tar.gz"
        curl --fail --location --silent --show-error \
          --retry 5 --retry-delay 5 --retry-all-errors \
          --output "$install_dir/encore.tar.gz" "$url"
        rm -rf "$install_dir/encore-go" "$install_dir/runtimes"
        tar -C "$install_dir" -xzf "$install_dir/encore.tar.gz"
        chmod +x "$install_dir"/bin/*
        rm "$install_dir/encore.tar.gz"
        "$install_dir/bin/encore" version

    - name: Build Docker image (Encore)
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        ~/.encore/bin/encore build docker \
          --config ${{ inputs.config }} \
          ${{ inputs.image-tag }}

    # Rust helpers that stagecraft's API shells out to at runtime:
    #   - artifact-extract        (knowledge advance endpoint)
    #   - factory-project-detect  (project import endpoint)
    # Built once here so the post-encore layer can COPY them into the image
    # alongside git. Missing-binary failures surface in-cluster as opaque
    # `failed_precondition` errors, so treat this as part of the image.
    - name: Rust toolchain
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

    - name: Cache Rust build (stagecraft helpers)
      uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      with:
        workspaces: crates
        shared-key: stagecraft-helpers

    - name: Build Rust helpers
      shell: bash
      run: |
        cargo build --release \
          --manifest-path crates/Cargo.toml \
          -p artifact-extract \
          -p factory-project-detect

    # Factory upstream sync shells out to `git clone` (api/factory/clone.ts).
    # `encore build docker` produces a Debian-based image without git, so we
    # layer it on here and retag to the same ref. Keeps encore as the primary
    # builder and adds ~50 MB for the git binary + HTTPS deps. The Rust
    # helpers built above are copied in the same layer so there is a single
    # post-encore retag.
    - name: Install git and Rust helpers in image
      shell: bash
      run: |
        work="$(mktemp -d)"
        cp crates/target/release/artifact-extract "$work/artifact-extract"
        cp crates/target/release/factory-project-detect "$work/factory-project-detect"
        cat > "$work/Dockerfile" <<'EOF'
        ARG BASE=scratch
        FROM ${BASE}
        USER root
        RUN apt-get update \
            && apt-get install -y --no-install-recommends git ca-certificates \
            && rm -rf /var/lib/apt/lists/*
        COPY artifact-extract /usr/local/bin/artifact-extract
        COPY factory-project-detect /usr/local/bin/factory-project-detect
        RUN chmod +x /usr/local/bin/artifact-extract /usr/local/bin/factory-project-detect
        ENV ARTIFACT_EXTRACT_BIN=/usr/local/bin/artifact-extract
        ENV FACTORY_PROJECT_DETECT_BIN=/usr/local/bin/factory-project-detect
        EOF
        docker build \
          --build-arg BASE=${{ inputs.image-tag }} \
          -t ${{ inputs.image-tag }} \
          "$work"
        rm -rf "$work"
