[package]
name = "open_agentic_policy_kernel"
version = "0.1.0"
edition = "2021"
description = "Deterministic policy evaluation kernel (native + wasm32)"
rust-version = "1.74"

[lib]
crate-type = ["lib", "cdylib"]

[[bin]]
name = "verify_proof_chain"
path = "src/bin/verify_proof_chain.rs"

[dependencies]
hex = "0.4"
regex = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"

[dev-dependencies]
criterion = "0.5"
serde_json = "1"

[[bench]]
name = "kernel_eval"
harness = false
