[package]
name = "open_agentic_policy_kernel"
version = "0.1.0"
edition = "2021"
description = "Deterministic policy evaluation kernel (native + wasm32)"
rust-version = "1.74"

[lib]
crate-type = ["lib", "cdylib"]

[dependencies]
regex = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
serde_json = "1"
